嶽隍兵馬四品帶都督嶽瀆兵馬三品帶節制九天兵馬二品帶紏察三界鬼神判洞天福地靖廬事一𥘉真受法必先受籙許輔從九品其正九品未受籙人不許任之一凡行齋醮雖有他品復而未受都功籙無祭酒職者謄誠不逹七品以上不受盟威籙不許任之五品以上不受洞淵籙不許任之四品以上不受神霄籙不許任之三品以上不受大洞籙不許任之一法與籙相須不可相違天心法宜受都功籙五雷法宜受髙上神霄録靈寶法宜受紫虗陽光籙及靈寶中盟籙天蓬法宜受北帝伏魔籙天樞法宜受上清回車畢道籙趙候南法自有正𣲖宜受趙侯籙一天心乃萬法之祖都功盟威總二十四品先可進受一南北二院謂之文階雷司謂之武階初真先冝參文由入武階易武階入文階難一五雷者天雷上天侍衛之司神雷雷霆號令之所龍雷海藏之拱衛水雷雨澤之所司社令雷則名山大川精忠血食之神上奉帝命下親民事可以指役也一四司者玉府五雷使院中有玉府五雷使院真君乃雷之主專司玉樞五雷院及雷霆都司主行刑掌蓬萊都水司專司水澤三司皆總于玉府五雷使院諸解送刑獄毋得僣紊于樞府止于雷霆都司其五雷使院額母得妄用一𥘉真受法須擇當代明師行淳學正者拜之師亦當擇弟子委有道器者授之先召保官保盟齋誠申狀取保應分曉方與依式奏申撥度授以神霄照帖及版劵等次與設醮謝師受將歸壇一如年內有功合該與循資升擢即召同品法官保狀繳由度師如前奏申付度非可慢褻若師非正學弟子躁妄苟簡行之仙籍未必紀名則天將不臨惟淫祠下鬼纂名妄興災禍真司檢察貽罪非輕一初真受法有功及遷轉既投師傳受仍須詳述始末年月師資姓名所職某法所積何功所遷該何品秩具伏投嗣教天師正一玄壇敷奏給帖庶得玉籍紀名神人皈仰其或不揣已功躐等以夸世及不務投師輒便詭撰階位妄加升擢及有不經師付謾寫職階視同虗文有誤玄壇敷奏給牒有何效之科律照然戒之謹之幹運造化章三五飛步罡品師曰三五之祕夫豈易知自一生二二生三蓋三氣分而三光明三光明而三才具自太極生兩儀兩儀生四象四象備而五行全五行全而五星明五星明而五嶽峙是以在道則為三清在世則為三才在神則為三元在人則按三部又在道則為五老在天則為五星在地則為五嶽在人則為五臟人有天地貌分隂陽氣道備一身而兼有之自不能使三田孕秀五臟納靈則去道始逺矣能修之者三田聚寶五氣朝元魄制魂拘神全氣滿是謂仙道貴生也不修之者使三魂為三尸五氣謂五賊五賊為五苦是鬼道貴終也是以天地之間人為萬物之靈故手指足履莫非合真步罡之法所由生也夫步罡者飛天之精躡地之靈運人之真使三才合德九氣齊并一切鬼神轉旋天地一步一指一轉一旋造化中全神明在左故一步象太極二步象兩儀三步象三才四步象四時五步象五行六步象六律七步象七星八步象八卦九步象九靈乃萬罡之祖也師曰禹步之法世皆失其真也蓋世人多能言之不能得之得而不行行之不專故多不驗今世所行豁落斗乃三五禹步之樞要總河圖錯綜之數豈可輕視為尋常但所傳差誤而不能變化通靈余今特正其訛以傳其直師曰一氣分三號玄元始三氣分判則立三才人身象之清濁之體分為三部部各有神亦曰三田田各有寶故一而二二而三吾身之真也總謂之三元元者大也首也故易乾卦謂元者善之長也師曰二五之神貫通天地總歸一身運用之間有生尅制伏之法應期求禳謝則相生制伏驅治則相尅凡步罡之際先運出三元五行之神然後迹履也師曰五行之祖氣是為五老老者始也祖也引五老之精為五星流五星之精峙而為五嶽配人之身是曰五藏上應五星中應五嶽故神住其間五行五德相生木生火五行五氣相殺金尅木上元屬天罡步上元罡呪步天之精役使萬神上元蔽身唐宏將軍輔吾正氣辟伏魔神敢有害我還著本人邪魔見者化作微塵急急如律令中元屬人罡步中元罡呪步人之精長陽消隂強我三魂滅鬼除精禍不能及災不能侵中元隱影葛雍將軍領兵千萬來衛吾身急急如律令下元屬地罡步下元罡呪躡地之靈人道安全天回地轉上魁下乾隂闔陽開正氣綿綿鬼不能害人不能傷天為我蓋地為我載敢有加害押送魁罡下元藏形周武將軍隨吾所到速衛喜真急急如律令師曰凡有制伏凶惡尅代災危當先步上元罡順例𨑰畢再入中元罡次變為下元罡若有制伏凶惡則又變五行相殺罡尅制天龍鬼神隨心感召萬無失一祕之五行相殺罡師曰凡有制伏凶惡尅復災危則步此罡謂水能尅火之類故臨時加治也如制伏火殃則步金步水至火制之餘皆倣此如後學未曉則準步成罡而巳不必增損呪曰五行相滅圡水相絶水火相滅金木相伐鬼妖見者斬頭截腳魔王忍懼上下推裂敢有犯者永沉幽穴急急如律令此罡是金尅木木尅圡圡尅水水尅火火尅金也此制伐則用之五行相生罡師曰相生罡是木生火也一生一煞皆按水一火二木三金四圡五計一十五步三五之道也呪曰五行相生萬事吉昌水木成就火圡相得金木同行禍變為吉鬼不能害人不能侵死者復生枯者復榮急急如律令禹步九靈斗罡日月明乾坤配吾從天蓬入天內略過天衝逢輔退反歸天禽與心對抱天柱兮任英會斗道通兮鬼道潰急急如律令師曰豁落斗也乃謂之小三五罡世多不知其詳亦以習見為常不知其玄妙也此罡可伏狂邪指揮鬼神破廟等用世多返用之今正誤矣斗要妙兮十二辰乘光明兮威武陳氣髣佛兮如浮雲七星變兮上應天知變化兮有吉凶入天宿兮度天門合六律兮持甲乞履天英兮乘天任清泠淵兮可陸沉倚天柱兮擁天心從此過兮登天禽倚天輔兮望天衝入天內兮出天蓬斗道通兮剛柔濟添福祿兮留後世出幽𡨋兮千萬嵗千鬼萬神自回避急急如律令師曰此罡世所行以出斗入斗相反用之所以不應今特正之則可以伇使鬼神驅邪魔道祕之祕之金光範圍罡師曰凡登壇闡事存巳身為神禹口念呪手搯訣從玉文起午文終足步罡遍履天地之內金光繞身化形制魔口作唵吽吒唎之聲存面前虗空中有紫氣一團須臾見青氣自天而下沖開紫氣忽見雲中有金殿樓閣心叩頭三禮朝謁請奏如儀步此罡當念金光呪一句一步呪畢仍加斗罡禹王三步九迹罡師曰存巳身立在禹鑿龍門之上在風霆雲氣之中承上帝命左手玉訣右手劍訣勑召萬神隨事發遣搯訣師曰搯訣者所以通真制邪役將治事訣各不一罡訣有七百餘目今所用者不多四維八方自四指根逐節數共十二目以按十二辰于內又分出八卦七星九宫三臺各主其所行之事又當約而言之惟中指中文為玉清訣側左為北帝訣名大煞文此二訣總三界萬事宜按行之叩齒訣師曰凡叩齒者是集真而集神凡人體氣散心氣耗真氣不應須用集之所以叩齒者擊動天門而神氣應故左叩為嗚天鐘右印為擊天磬凡制伏驅降用之至于當門齒上四下四共八齒相叩謂之嗚法鼓者所以通真格上帝凡朝奏用之上下三叩成二十四通謂之鳴法鼓常當知此入戶訣師曰凡立壇有戶在東南乃巽地戶若靖中入戶則以靖門為戶舉步從此入先于巽上叩齒十二通心三拜右足先進左足隨之先存功曹使者四人龍虎君二人立左右又存滿室青黃白三色雲氣次存香煙成五色氣直上至金闕前次九拜或心拜亦可燒香訣師曰先以左足入戶勿得回顧回顧則致邪當一念寂然存左青龍右白虎前朱雀後玄武功曹玉女乘吾五臟五色之氣竟上三天當一舉思之更無滯礙覺身中煥燠然微暖是真氣合德也凡燒香並令烈火次多捻香入爐中謂之豐香豐者多也令煙氣猛一舉上逹無留滯若香煙斷滅火力微眇不能超真逹靈矣應捻香尚左手左手者淨手也右手親穢不可拈香也奏香訣師曰當存心無外思內無雜想只見目前皆是真光𣑽氣紫碧之氣彌滿前後一切不思直上十方香十方真氣下映與香煙接于氣中防佛見無鞅真仙官君細雨密霧來降各方次至洞案前見香成五色功曹符吏在空中巳身恍如升上三天親見三清玉帝叩齒三十六通咽液九過然後依科行事師曰𥘉階入道性易流蕩則心疑不可示以繁文也于簡易中存觀妙在不言之表矣若能進品升玄自此而至嗣宗神仙不難學也啓奏訣師曰凡啓奏治病行符先存上丹田元始中丹田道君下丹田老君次三宫三真並如巳形先存下丹田內君與心中道君合而為一立在頂中如金殿中坐巳身跪拜密奏所行之事立有感應朝真謁帝訣師曰小兆凡人也飲食男女其欲與人不異今乃得佩籙行法稱為法師或星冠霞𥚑欲似仙聖蓋心末寧一氣仍肴亂淫愛觸穢葷汚臊腥當知若何可以謁上帝于虛無之表也苟無清明之法則不能感格反以招愆耳故曰雖有惡人齋戒沐浴亦可以事上帝此之謂也齋醮對越訣師曰凡醮中朝謁須按儀式及身與心混融常存見金闕于髙穹之上已身不覺在壇惟覺在九霄之上凡口誦心存絶一切妄想如此則大有感格非止外儀也祈請訣師曰宜于常時數數點檢巳身入靖點坐不思凡俗之事氣宇既定頂中虗濶有金摟玉殿見天尊金容坐其中久久存之覺真氣映頂門嚮內微熱此常時訣也有事之時亦如之存運巳身恍然跪于天尊前默禱所祝之事萬無不應此宗師節文訓後學之士𥘉階此乃升堂入室妙訣宜祕之毋泄凡俗也書符訣師曰書符者惟要心定不思外事又要點紀散形庶幾下筆時神不走氣不亂若對本念誦下筆成符眼動意隨心馳筆亂必不能感應須心與符一符與心俱取氣不必回顧吹氣不得作聲下筆書符謂之自傳喜神蓋言心定而端的也後品亦言之甚詳凡𥘉階先宜知此玉堂直指師曰玉堂乃天心祖法之內袐萬法之所宗三界所仰自漢天師以來獨傳心印别無雜術惟正而巳正者不邪之謂歟天以正而覆燾地以正而載持氣以正而運行鬼神以正而役使人以正心而正身心不正則邪念生六欲起流為禽獸沉為鬼爽在世不正身為姦邪為悖逆道不可入真仙之閫域也今玉堂大教之出世原于正一天師正則不邪一則不二嗣吾教者有五等凡在世厭塵希真之士𥘉入壇受天心正法十卷行之三年無輕師慢道之心無始勤終怠之念則許再詞受階七品行及無過進二品佩玉壇正品印受髙奔玉京行及一紀驗得即非編庶市井庸流及不是輿臺皂𨽻刻胥虐吏及非是宫觀愚蠢𥨸食方許傳付無上宗旨二十四品并三奔寶籙玉堂三景之印玉景升堂之印為嗣教支師支者分𣲖别流之謂也此傳不限名數但係有官君子儒墨俊士皆可佩持禁傳市井道流也今世道流多是無告困極四民不收始投名進納黃冠蓋非本心入道恐輕賤玄文遺失祕旨罪罰不赦巳上係四等傳度獨于苐五等係的傳系代嗣師帷正傳一人付二十四禁典玉書付宣和斬邪劍降真制魔之印經三十年方許傳代今以𥘉品𥘉階傳度其文省其用簡人人皆可奉行亦可望洋于玉堂也登壇之日弟子肘步齎信誓詞雖官髙位貴不得慢真侮道當九拜盟壇而受也從此佩玄旨不違師旨自此登神仙路入希夷之門也若或不遵此訓妄傳輕受則三官紏愆四司録過天司示憲七祖受報于風刀考身充役于長夜萬懴不洗千真難贖在謹于傳付而巳夫行𥘉品宗旨口傳心印計二十事一日當虔謹修習漸與世事相踈不得混同塵俗作諸不軌事久久戒行昭著當次第傳度也一存服鬱儀結璘之氣惟勤于存運久而真氣灌注噓呵成真不待容心而鬼神畏服矣既受法巳畢當以大道為宗祖動心正念勿起邪心一每旦習誦真經祕呪蚤作奏香點而存之不得出聲惟心相應不可以事奪而失其常規也一遇有凶邪惡祟害民者當一準正教務在必行若有畏心及有諂心反求告于鬼神者是執心不專得罪至大三官紏罰不赦不原一當以正念役使天神將吏不得稍用血食以雜靈氣違者三官罰罪一當以三光為主蓋三光者天地之眼目陰陽之根本造化之宗祖當存心運真與帝真三景相混為一不惟制伏三界束縛魔靈則自巳身有光明萬神畏伏辟尸逐病得道長生以入仙真矣一日存三光而服氣夜間存斗以斗罡使身與神為一神與身同氣神氣混融方可為嗣教之士矣一當先行三八謝罪之法凡半月一節氣當出身中官將拜表存修如本法行之不怠則身為無過之人始可言嗣玄教一每日服三光符以俟感應一戒在淫怒常以慈善應世割己周人不得攻師伐本妬賢嫉能口是心非嚚訟爭鬪素或有之截自今日攺行率德常以一念逺財利去姦諂寡色欲持齋守戒為心也一凡奏香時存五色氣自五藏出結為華蓋上通空玄上帝在空中倣佛瞻見如此則所奏必逹也一凡書符當入室存定染筆成符閉息心呪不得作聲握固勃然有勿犯之色身正而心正心靜而神應矣一當以一真合道當離一切外事勿得千心見物莫生貪念當思世事無常惟道長久當在一真則虛無當應一靈矣一每出入當存天丁將吏功曹玉女右左羅列座下邪不敢侵正氣縱私動止存之如故一如每月十直庚申甲子本命三元三會朔望八節五臘當異寢思真常能各居敬如賔友則尤為至妙一不得內藴狡賊之心外示慈詳之態不得貪非巳之物應營求當以義合得之違者許自省愆攺行謝過不許重犯忌之一事父毋以孝不以貧冨易其心順奉常令喜恱一咈所親之意是謂不孝不孝罪大無所貸原一父毋殁當隨力精思祈告上帝拔度出幽上生天堂若父毋不出幽隂自巳仙功亦不能成矣一兄弟宗族外親逺戚待以和好不許各黨其一而生事生嗔怨以失骨肉之恩違者三界鬼神不伏使役冝謹之一當行規矩凖繩之內存心一有不合冝事隨心攺正期與聖賢比肩不可自卑常萌妄作之心醮事儀範章太乙齋帝王修之以展禮配天也九天齋金籙齋國家建之祝延國祚也玉籙齋修之以保祐后妃六宫也黃籙大齋皆有品第要當參考成法勿得女為之其士庶所建止可謂之醮儀河圖玄靈等醮總有數十名目皆醮也古謂醮者祭之别名也降天帝致萬神莫大於醮一國家建醮有三日七日之儀按靈寶經齋法凡二十七目杜光庭醮品有七十二等皆國家所用如三洞品格俱有定式一官民士庶之家設醮齋止以一晝夜為則亦有建三晝夜七書夜者不無褻瀆反為招譴如官長尚不至於士庶之家經宿久留况上帝髙居九重下臨凡俗豈有經三七日晝夜而不𨑰乎今定醮例凡修醮一日先陳設至期則以黎明肅啓深夜解散庶幾不致瀆聖也其科儀品格載諸玉宸玄範行移等書臨事取而觀之可也一開壇建大醮必須洞天福地宫觀之中為上其立壇須是方位端正坐北面南如宫觀元有壇處坐向方位或偏别淨宇下依式立壇行事亦可一凡建醮須是量力所為冨則備物貧則隨冝所巿醮需母用非義之財及與人爭較價直之物及力有餘而苟且營辦力不及而勉強經營者皆為不誠難於感格如齋主係忠孝之家誠殫力之師為代出龍繒之屬凡事從省應干文字醮獻等亦自然感徹矣一醮儀中修用存思詇法並載幹運造化章其樂具仙仗見天樂儀仗章更不于此詳注一文字行遣俱依玉宸玄範行移所行及酌參古式檢目用之如奏帝尊前用奏狀餘並用申狀神司用公牒之類一奏狀並稱臣申狀稱名天樞院狀稱本司前用司額關帖牒等稱當司一奏申狀前空一掌後空兩掌紙髙一尺四寸餘則用展劄紙為隹醮請獻狀止用狀𥿄如式一奏狀內聖位並用黃簽帖臨時書填一奏狀前帖黃髙三寸二分濶二寸四分或髙三寸六分濶三寸為則分單行寫貼黃後合縫處書臣名用印一奏狀內倚黃用小黃簽側貼太歲下古式如此今少用一奏申狀可漏單聖位者用黃簽側貼兩位三位四位者用稍濶黃簽當中貼三位五位以中為尊兩位四位以右為尊聖中寫䘖前及聖前或止寫最前一位亦可下界神祗狀用白簽在人審而用之一奏申方函面上並不用貼黃亦不稱臣止書姓名章詞表外函同此如申狀內聖位多者方函止題最前一位一奏申狀上帝狀稱道慈勑旨帝尊稱聖慈𧇖旨二后稱宸慈聖旨三清四帝稱陛下二后稱殿諸帝尊稱御前諸真稱聖前下界神祗稱神前治前之類一牒關劄後並批朱公牒書名押字關劄只押字牒皮正面上書謹字中印法階書名押字下書封字用二印背書司額牒上書主者用二印關劄正面印法階只押字下書封字前用一印後用一印奏申狀並半年用印合縫者書臣名後用一印可漏下用一印方函正面上下通用三印凡牒關帖榜等押字並用印公牒并榜太歲一行用四印前用三印關劄半年用一印凡用印並從後起一符簡告文年月一印可漏正面用二印後用一印一符文作方函發者依方函式用印一奏狀及上界申狀用三氣飛玄玉章或用都天大法主印方函兩頭一同或用通章印正面用靈寶大法司印中下界申狀用靈寶大法司印一長生符用元始一氣印救苦印用青玄救苦印玉札用玉魁司主印凡符文屬玉清者並用元始印屬東極者並用救苦印屬上清者並用三天太上印一章表並用九老仙都印青詞用三氣玉章外函同奏狀式用印當中用三氣玉章兩頭或用三天太上印或通章印亦可一書章每行十七字相去一寸四分乃為一行紙髙一尺二寸書表每行二十四字為則紙數及行數要合竒數為佳前空兩行後空三行依常式書一書青詞與章表同格不拘字數前空一掌後空兩掌為則可漏用黃𥿄三寸套封外用方函一書奏申童表等專擇靜僻一室中設香案母令外人得入書寫人須令沭浴更衣入室凡書章奏等並用𥿄遮護兩頭母令衣著其上務在至誠嚴潔一寫奏申文字不得以人姓名與鬼字為首不得垂生露死抽破人姓名一齋官上奏有官位具官無官稱奉道弟子若父母之喪則稱孤子哀子是不忘古人之規範也一寫文字之人到局日便令沭浴浣濯衣服務在清潔方可立局下手繕書寫人并幹局人不許歸家宿食别委一人與之供備飲食宿卧去處仍專委一人掌管書寫如有錯誤不許剔輔並要寫換一副母得苟且一髙功法師須備受三五都功籙正一盟威籙靈寶中盟五法籙靈寶十部妙經及行靈寶大法方可依科修建如止受都功盟威二籙靈寶衆經及行天樞天心追攝錬度等法亦許攝行奏申儀中稱靈寶太法司去處及齋科稱盟受三洞寶文玉字金書等皆合隨文換易一法師止受都功職籙及升玄陽光洞淵等籙却不受盟威籙或止受都功職籙及中盟五雷法籙不受盟威籙或止受都功籙及上清籙不受盟威籙或止受都功籙不受盟威籙或止受盟威籙却不受都功籙並不許開建靈寶齋科蓋出三五正一官吏二籙不備受則出官有礙皆不可行齋事一都講以下之職亦須備受三五正一靈寶陽光等籙方可同預壇席一請同齋道衆須是平日耐于拜跪甘于淡泊專修香火不貪貨財方可結立誓盟俾登壇席要與醮主各殫誠慤祈叩穹旻以昭感格若只務聲音韻美注念不專非惟枉役精神虗費財寶切恐反遭咎責勞而無功修建之法全在擇人不可不謹一執威儀道童須要先習步虗詞舉唱華夏吟令熟登壇旋繞時隨聲讃詠一建醮當竭誠恪營辦龍繒璧劍之類務在精好香花油燭一一所需並要潔淨不使穢觸若臨用有缺則反招譴矣凡設醮以精專為先龍繒為上香燭虔潔次之苟若有一闕亦醮之瑕玷也修奉之士尤宜謹守一若停樞在室不宜開壇建醮如屋宇深濶喪在别處不干壇界亦可修奉若有生死厭穢未經解除者亦不敢于家庭建立醮壇深宜戒之一燒香不得用灶中灰火焚燎錢幣等不得用油燭燈火點發天心玄祕章昔元始天王懸黍珠于黎圡命皇人以演洞章太上老君升玉局于成都張道陵而受經訣道法四十二壇醮科七十二等流布塵寰宣揚教化後之歷代嗣教之士積功纍行與道合真心動神隨法靈教闡是以道法符章分枝異𣲖延蔓繁多流傳于世法術有三千餘階不能備載今以一二略舉其大概耳天醮一十四壇黃帝醮告章曰凡世人禳禱祭告薦拔祖你及禳災救病除道家奉天之士有祈天醮告之儀其後非奉道教者若有禳禱薦拔之事止許召請城隍社令圡地地府𡨋官母母請天帝神祗是以雷霆乃立斬勘之司敢有非道教奉天之士而冒干天帝者斬神誅魂奪算滅夀可不畏乎金籙普天大醮三午六百分位玉籙周天大醮二千四百分位黃籙羅天大醮一千二百分位大乙醮九天醮河圖三十六天醮玉匱盟真醮靈寶自然醮洞淵三昧醮消災醮祿馬轉案醮九幽醮遷拔醮報孝追薦醮按道門定制云金籙玉籙黃籙三醮聖位醮狀分數巳有定式其常醮有四十八壇奏獻錢狀或設二十四分三十六分四十二分六十分七十二分一百二十分二百四十分三百六十分位醮事之禮像世威儀道在人弘不可執枸道法三十九階靈寶度人上經大法無上三天玉堂大法清微元降大法清微神烈大法上清天心正法北極天心正法靈寶六丁祕法魁罡六鎖祕法三辟五解祕法六甲祈禱祕法貫斗武侯祕法玄一五雷祕法協神五應祕法𣑽氣雷法上清靈寶大法玉清真王紫宸大法淨明忠孝道法五雷考召大法玉清總攝法五雷斬勘法洞玄祈禱法先天一氣大法回車畢道正法九老伏魔法天地教燈水法混元攻氣法紫庭追勞法飛神謁帝法通章大法六丁六甲遁法掌心雷法祈晴禱雨祈雪法㔶蓋法五雷法靈寶法天蓬法天樞法趙侯南法結幡祈禱法考之道法各有傳𣲖不一今以世人多行者録之及有天雷鄷嶽諸將之法其名繁多難以盡述錬度法七階清微煉度法太極祭錬內法玉陽祭煉法淨明一暘煉度法靈寶錬度法玉宸經煉法三光煉度法告斗法一十四階清微玄樞奏告太乙火府奏告灌斗五雷奏告玄靈解厄奏告清微紫光奏告神霄奔宫奏告清微祈禱奏告神霄火鈴奏告淨明奏告璇璣九光奏告允天奏告孫真人竈告開雲現斗奏告擁雲現斗奏告天髓靈章大法一十二階混天法此法能開天門役使天神住日留月變晝為夜夏雪冬雷移地法此法能指地地動指山山搖指海海竭晝地成河移山塞海降伏鬼神萬勝法此法能令決勝無窮變化章木金石皆能化人隱體藏形降龍法此法能乘龍飛空變物成龍騰雲入霧躡氣凌虗伏虎法此法能伏虎豹一切猛獸蛇蟲起雲法此法能興雲起霧化生五色祥雲駕雲升天逰日宫月府去住自然生風法此法能生萬里威風行船遇寇起塵迎敵吹砂走石障蔽太空隨機而應伏刃法此法能使刀劍自碎入兵不傷萬刃不于如遇賊寇能禁止刀劍不能出鞘弓弩反折不能為害變物法此法能生一切草木及乘駕空中能使用木人木獸從波法此法能使山陵變湖漲溢江河滔天之濤拍山之浪興雲致兩躡波渡江入水不溺烈暘法此法能生烈火巨𤔵燒天焚營燋寨蕩滅妖邪神火一過萬禍俱消長春法此法能頃刻生一切草木五穀瓜果蔬菜之類能變土成金化石為玉隱身入圡前十二法上天祕傳之靈文出世離塵之妙法必遇天人授受方得行之縱得其書𥿄上虗文枉勞心力玄圃山靈金籙大法三十六階發籟震霈缶覆星決雲壅水凝河滅火馭雲震陳伏申出泉火箭結華隂草木化人坐馭水行起光隱質變物附夢祛毒禁唇斬妖怪金剛札無礙通神行無盡丹不竭壺水火瓢盆取魚煮水石佯死飛空住𥿄鶴飛鐵其身入壺玉虗天書大法一十八階隱形藏體驅神入室逰魂三界超脫生死借尸火假尸體水假金假火假木假圡假木牛流馬不用火湯瓶自沸喝石石行煎泥成金化銅鐵為寶移樹移物可至千里木雞報曉泥犬吠夜通靈祕術大法一十六階變化附夢變形空中飛行入石壁隱形救死回生夜行不照燭長生不死呆賊不去縳賊自至役五通追萬物招神穿地尋尸神怪耳報通天寶籙大法三十三階長生久視延年益夀升天入地出幽入明神逰月宫一葦渡江千里神會借潮生風其舟日可至萬里投胎奪舍日行萬里躡鴻毛騰空騎草龍飛空煎泥成金九轉靈舟乾汞成銀點銅鐵化金銀養砂澆淋湧泉丹頭縮貨成寶糝制點化靈砂寶鼎點辛為庚召鶴圓光附體舞仙童過隂追攝降筆太極鵉筆架鵉懸絲鵉封匣鵉道門官制章國朝品級正二品嗣漢天師真人正六品道録司左右正一從六品道録司左右演法宫觀提點正八品道録司左右至靈從入品道録司左右玄義從九品道紀司都紀未入流道紀司副都紀道正司道正道會司道會真人漢張道陵以天師賜號真人唐李泌以承相歸道賜號真人加正一品余酒周成王時以彤伯為祭酒以主親屬後宣王時大祀南郊以仲山甫為祭酒以主祀事故後世以道士為祭酒之職以主郊天祀事之禮以統道教此道士有祭酒之職自此始道官周穆玉以道士髙栱宸為祭酒祀元始天皇於尹真人草樓此道官之始也道録宋太宗增道副録都監首座通舊為入員巳上總知教門公事道封後周武帝時衛元嵩封蜀郡公蓋道士受封之始也葉法善玄宗時亦封越國公道贈唐王知逺贈升玄先生葉法善贈金紫光祿大夫越州都督道士之褒贈蓋自王知逺始也道諡陶弘景羽化梁帝賜諡正白先生此其始道紀老子曰能知古始是謂道紀故以僧官設僧綱道號黃帝稱牧馬童子曰天師始也漢張道陵亦有天師之稱道家立名立號皆取老子道德經中之旨道字玄字妙字今非中國之教外夷皆竊取之衣紫唐李必生而神靈自孩童時身輕能舉母嘗聞空中絲竹之聲恐飛升而去母以蔥蒜為汁灑其首後代宗時拜相時李輔國專政常妬之泌知其不可久處其位乃告歸隱乞為道士帝乃賜紫衣金𢃄之服道士賜紫自泌始也黃冠道士黃帝內傳曰凡奉天道者曰道士周穆王于尹真人草樓之觀召幽逸人祀其香火以奉天帝謂之道士此道士于宫觀祀天帝自此始蓋道士之衣冠皆黃帝之衣冠故名黃冠所行者黃帝之事所言者老子之道故名道士不異服非先王之法服不敢服不異言非先王之言不敢言不去姓不忘親也不毁形不忘孝也以道為教不悖天也不事外教不悖土也以中國人奉中國之道是體天之道因地之利以修身也故能飛升沖舉慿虛御風神超物外上朝太清得造化之妙與天為徒可以通天地之靈格神明之德役鬼神驅雷電致風雨握星辰斬邪精消疫癘致太平此自三皇開闢以來試之驗者也道之為教見于此都監隋文帝始以玄都觀主王延為威儀之官如今之監齋之職是也周避諱攺為道録監義宋真宗時置首座監義分領本階事上座宋太宗始之法官漢張道陵始有驅雷役鬼之事行其法者曰法官赤文天律章止取生人所犯天條者録之其鬼神所犯者不録見女青天律一法官四季天地赦日不得行符呪水看閲條律違者先滅一身後殃九祖一法官行法並陽行隂報不得始勤終怠違者滅身殃及九祖一行法官輔奏弟子銜位籍注左判官方許輔左大判官次許補右大判官違者並各徒九年知而保奏者並各除名滅身罪殃三代一法官及道士俗人六戊日而燒香進章上表關申天曹者滅身知而故犯者殃及九祖風刀萬劫不原非佩籙者滅三等一行法官非斬鬼而口中非時稱急急如律令者滅夀半紀一行法官篆符而以筆頭指左者徒九年知而故犯者滅夀一紀一行法官敕水而以水盂左轉者徒九年知而故犯者滅夀一紀一行法官妄以正法示之非人者滅夀一紅一行法官不得私祀鬼神惟二月八月祭竈違者徒三年故犯者加一等一行法官所在去處見水旱盜賊若為害于民者狡猾之人許令立便申奏待天譴誅戮違者徒三年若差官誅戮而其人不如所申狀內之意者加一等若有人果如申狀內坐説者加二官一行法官行持不精到處行役神吏不擇𥿄筆便寫符敕水者天司奪飬道之資令使見身窮窘一行法官非時妄動袖吏侵害生民者滅夀半紀一行法官無故不得妄入正神廟宇及持正法而妄擒正神者徒二年如是法官出入正廟前後不迎送加罪者非一行法官受民間詞狀而不能即時行遣者徒一年如狀不合格式者非一行法官出入見民間私𣏌邪神淫鬼者仰即時遣神吏擒縳依律斷罪如或見聞而不根治者徒三年一行法官持齋奉戒而或犯者徒七年一行法官被人陽病而故意行陽符隂病而行隂符或左煞而右生有傷于人徒九年如未有昭報不辨隂陽者非一行法官妄以行法增崇一言毀及同寮應行法者徒五年如辨論公事曲直及探正法而爭者非一行法官妄以正法傳之非人意求財利者減夀一紀一法官職列七品者録功不書過若能進章表知其官職恃而作過者減夀半紀一法官以正法而為戲者徒三年一行法官被民間請符乞水而妄以人情艱阻者徒六年被請符而反輕正法不給付者非一行法官篆符故意倒書橫寫及朱書不從左墨書不從右者徒一年一行法官奏弟子傳法度師北院出官者令從北院計銜南院出官者令從南院計銜違者徒八年一行法官奏弟子傳法看其人心術正方可保奏如或人情或以勢力而亂奏者並各徒三年若得其人者補三官一行法官奏弟子名姓用庚申甲子二日保奏不論有無品人並得參佩正法及便宜申請令入四五品官者聽一行法官非庚申甲子日而輒欲申請非次遷擢者並各徒九年再三申請者減夀半紀一行法宫傳弟子正法者須得巳身佩受一千日外方許保奏違者除名落職徒三年一法官傳受弟子正法須得給統兵印并都攝符令其統制袖吏驅役鬼神統兵印文仙都總攝之印作兩行疊篆都攝符即三元符也以黃絹篆之于符兩節寫墨敇給付某人收執驅斬一切神鬼後度師寫姓名僉押違此者神吏不聼傳法人驅使遂為虗設非徒行法無益又且天譴必臨一法官傳受弟子有始而無終者不盡其所學者徒九年如弟子學而有始無終者亦如之知而故犯者加一等若弟子而不問師而不傳者非一法官傳受弟子不問男官女官並須得人而傳不得妄泄違者徒三年一法官説話口是心非者徒二年如事出不得巳者非諸法官妄以巳身尊崇斥叱弟子者徒三年一法官見世間有異常人者許令上章表或申狀被坐此人所為外函上寫朱表不下天曹直進太上御前以待差官超擢填上元八品仙官見缺如是常日章表申狀而不經諸司檢驅者徒八年一法官傳受弟子祕訣而隱真出偽或傳而留一字或呪是而訣非或訣是而呪非者徒六年知而故犯者加一等一法官職列仙卿者許奏斬伏魔等使違者準前律一法官職列帝君品者許辟奏五嶽四賣等官及充替應有司仙官鬼官者許一法官職列髙真者許奏洞陽等帝君違者準前律一法官職列上章典者許進章表違者徒六年一法官不受都功籙者不得申黃剌及進章表違者徒三年知而故犯者滅身或不知者積罪愆貫盈差三官追取令使萬劫受罪或入石炭等獄一法官職列七品不許牒天曹并五嶽及六品官方許違者減夀半紀知而故犯者加一等一法官職列南司及品官者許令其便宜申奏一法官職列北司及品官者許遷入南司從别計銜違者除名落籍舉過不論功一法官職列九品者不許牒地司及八品方許違者徒三年一法官職列八品者許奏左大判宫違者準前律一法官職列五品者許奏七品官職違者準前律論罪一法官職品者許奏從六品官職違者準前律一法官職列四上仙者許奏上宰違者準前律一法官職列真人者許奏使違者準依前律一法官職列四相者許奏仙卿違者準依前律斷罪法官職九天諸使者許奏仙卿違者準依前律一法官職列諸司君者許奏上宰及真人并判鄷都等使違者準依前律一傳法人見度師純懷精粹不以師禮相待者徒三年説謾師保者徒八年知而故犯者加二等一法官不能相思于人責望弟子輔報其功徒二年一法官有功于人而自稱説者徒一年一弟子妄罵師保者減夀半紀知而故犯者加一等一法官以勢而欺辱下賤及不孝父母者減夀半紀一法官行符呪水符篆未曉者須得務求勝巳之師問之如或未曉為曉未通為通妄以已勝他人者徒三年一法官進章上表朝禮而失儀減三官官卑者徒九年一法官道士俗人為人設醮衣冠不整肅而輒登壇者減夀半紀茹葷酒者永入鄷都七祖受罪如未開壇而登壇者非一法官道士行持滅裂為人關奏進上表章而不如式希求財利及不至誠者減夀半紀知而故犯者加一等一法官道士入壇關白章表言語重疊及朝禮非儀存念雜真并以手觸天門先以右足登壇者徒三年一行法官道士申狀內坐説某時拜上朱章而非其時者徒九年一法官道士受三洞大洞籙經者不論天下極品仙官及鬼神並可指揮驅使或受經而無籙或受籙而無經者同一法官道士能以祕文呪法而身歷天曹進章上表朝禮上真者須得經諸司取稟然後方得前往如官及七品者非得經歷諸司者聽違者除名一法官道士能以太上祕文呪訣進章拜表得報應而泄人者減夀一紀一法官道士進上章表惟天樞院申狀玄都黃剌章表頭上醮意不得差錯一字違者醮為虗設章表不逹上醮官關奏名各徒五年一法官道士列銜差錯及冒稱官位者減夀半紀一法官道士俗人受正一籙者方許關行文牒及申黃剌違者徒九年一法官道士拜表上章而不五重下封者徒四年一法官道士申狀不合稱臣而稱者減夀半紀知而故犯者加一等一法官道士申狀合稱臣而不稱者徒三年知而故犯者徒九年一法官道士進章表醮意不得過一百七十六字違者並各徒四年醮詞冒瀆聽者同知而故犯者加一等一法官道士為人申章進表須得如法其餘醮筵隨力建功請行法事如或貧窮下賤力所不及一燈一花亦自足矣但不至誠者徒五年一法官道士設醮登壇而下恭謹反語笑喧譁斜目曲視背立唾痰呼童呌僕不以臣禮者減夀半紀知而故犯者加一等一法官道士進章上表而不合格式者徒二年錯二字者加一等錯二字者不逹髙功醮主並徒九年一法官道士進遷拔章只填金籙白簡八十副黃籙齋只得奠簡八十副進八十一説章只得奠八百副過此數副者並不執用醮主關奏並各徒九年知而故犯者加一等一法官道士不及五品已上並不受都功籙而關行女青詔書追魂者減夀半紀知而故犯者加一等一法官道士官及五品而行詔書者須得朱書牒內云伏覩混洞赤文女青詔命許令告下十方無極世界禱官之庭遷柭亡人進人道宫以副太上好生者如違此語詔書隂界並不執用關奏醮主各徒三年一奠簡每面長九寸厚二分濶二寸四分正而寫呪背面篆符外用青絹或紗盛之如力不及𥿄亦可用違此式者南昌地府並不許執用遂為虗設關奏醮主並各徒二年一民間設醮不得燒檀香安息香乳香但只以百和香則上真降鑒有力者燒降真香足矣違者三代家親責罪巳身受殃法官道士減夀三年一生民毁謗正法背正向邪者誅五代巳身萬事不遂父母妻子咸受其殃身殁之後送下鄷都萬劫不原一生民以正為邪以邪為正謾罵法官如此之人身殁之後考入鄷都七祖九先咸受其禍巳身見在必多殃咎如佩籙者加二等巳甚者校罪多寡減夀一生民恃勢損壞宫觀毀經罵道侵尅良民者減夀巳甚者滅身殃九祖一生民狡猾為害于人者九祖受殃身謝之後淪沒隂司萬劫不原法官道士見滅巳身一生民于觀宇名山及經書符篆所在之處腥言穢語者徒一年法官道士加一等一生民妄效法官步履星斗者徒二年履真人星者減夀三年法官道士加一等一生民呪詛天地日月裸露三光呵風指雨怨咎天地者徒九年法官道士加一等一生民以灶內火燒香對比小遺被人持戒者徒三年法官道士加一等一生民茹葷飲酒登上三清殿及對上真者徒六年知而故犯者加一等法官道士加二等一生民妄祀淫鬼及不干祀典神鬼者徒二年一生民病苦求覔符水而不至誠者徒二年一生民建齋設醮反不至誠者徒三年一生民將經書文字祕訣符篆入穢汚之處者徒二年行法官道士加一等一生民不奏名姓傳受祕法盜視靈文者徒三年一生民不行正法若家盜藏祕法者徒二年一生民怨望君主不孝尊親不友兄弟不信師友不睦夫婦不恤貧窮反憎凌辱者徒二年甚者滅身清規儀範章陪四太極法師曰夫齋醮清規威儀至重凡此禁制皆玄都上宫明科舊格戒其隋慢檢其愆違察其行藏觀其誠志若有過失隨事紏舉蓋不𣣔使其因齋獲罪故開紏罪之門知過能改罪亦消焉庶得弘整紀綱恢宣玄化登壇之士勉而戒之醮壇職名髙功一名左闡道其職也道德內充威儀外備天人歸向鬼神共瞻躡景飛章承領宣德惠周三界禮絶衆官都講一名右闡道其職也洞輔德通法度明錬讃唱儀矩領袖班聮玄壇步趍升座講説昭符人望默契人心監齋一名左輔教其職也總握憲章典領科禁紏正壇職振肅威儀周密察非從容受簡有嚴有翼毋濫毋隳侍經一名右輔教其職也嚴潔几案整齊卷軸開函啓奏收櫝敷陳調和衆音表儀庶職觀聼允睦幽顯交歡侍香一名左拱宸其職也精飾䁀彛潔嚴案席巡行焚炷始終芬芳玄鑒昭彰丹誠露逹母獲中絶有越初忱侍燈一名右拱宸其職也整辦缸篝嚴潔燈燭髙下照徹內外輝華際夜續明華晨收𤔵上明道境下煥幽都錬師其職也內外貞白心若太虛德體好生誠推惻隱致坎離之妙用合造化之元功煉質升真超凡入聖攝科其職也嚴格威儀宣揚玄範端臨几席密邇道前音傳金玉之聲嚮答琳琅之韻必敬必戒以謝以祈正儀其職也通貫科儀整肅玄綱務在老成之士方嚴中正之規髙功對越之有虧尤資輔協監齋紏舉之或失必藉考稽監壇其職也激濁揚清攝邪輔正升壇𨽻事先須嚴潔之功通真逹靈必假監臨之力事須虔恪母令差遲清道其職也肅清雲路蕩滌塵氛祛魔魅不侵于黃道斥妖邪勿近于仙班母或後貽屇期先導知爐一名左司儀其職也玄教威儀仙班領袖從容禮節持誠必在于端莊嚴整規繩臨事勿違于先後禮宜周偹事勿參差知磬一名右司儀其職也吟詠洞章歌揚玄範調和氣宇步虗聲徹于雲霄淨一身心華夏音傳于壇墠弘敷至道會感真靈詞懴一名左直籙其職也宜堅正念對越天皇通誠意于上穹懴愆嘏于下庶真儀嚴重勿致怠荒表白一名右直籙其職也奏陳虔恪注念精專宜罄竭于一光庶誠通于三界威儀敬慎規矩宜遵醮壇清規登壇失儀者清規有例當罰香油以贖其過止罰拜以準之若登壇之士各賫巾褐簡履不得臨時交換彼我公事有闕勿得牽引非巳之服若登壇起居皆當關白法師一拜禮香三拜而去還入如之若升壇履屨不整罰二十拜若坐起不庠序罰五拜若倚斜不正坐罰五拜若臨壇唱讃法事與外人交言罰二十拜若翻覆香火罰十拜若講及世務罰二十拜若語言戲笑罰十拜若綺言互䀨罰五拜若翻覆燈油罰五十拜若巾褐不整罰十拜若都講讃唱失儀罰二十拜若執紏見過不彈私隱罰六十拜若侍經不整飾髙坐觸物有闕罰十拜若侍香香煙中絶罰四十拜若侍燈燈火中滅罰二十拜若醮主內外不相檢叱音聲髙厲罰五十拜若聽經倚據不執簡罰十拜若不注念清虗心想意倦為衆所覺罰三十拜若出入醮壇不關白監齋罰二十拜若垂髮馳步罰二十拜若誦經或亂請問敗句罰三十拜若唱讃聲不齊罰二十拜若升壇不洗手漱口罰二十拜若坐起揖遜失儀罰五拜若旋行不依次第及逆行罰十拜若起行來及還坐不禮經罰三拜徑去者罰二十拜若臨燒香突行罰十拜若醮主供辦觸事有闕罰二十拜若受關不啓上罰三十拜若醮次擅自下壇罰一百拜若犯威儀彈罰不伏者逐出醮壇下用若下坐衆官法事有虧從一至三依科彈罰從三以上退出齋次執紏不彈與犯同罪若上坐法師于事有虧自取愆失送簡監齋從一至三依科彈罰從三以上斷功三百日不得又在法坐官觀職名古制宮觀道士之職真人祭酒道録道紀道統道正道會觀主提點提舉副宫副觀講師都監玄義知事書記諌議監臨戒師上座掌藉都表監齋法師副表直歲表白知庫司鑰南極長生宫新增十五職藏史管藏殿經籍知院管道院一切事僉院同前主翰職專修撰文章教授道童讀書訓師管教訓道童齋法科教司籍管錢糧簿籍一應文書直殿管殿宇廊廡一應房屋直堂管齋堂飲饌之事知賔管倍迎鵉儔鶴侣之士司廪管一應糧儲司戶管門戶出入之事司工管修造之事司圃管藥圃菜園果園之事司牲管犧牲畜飬之事社主管莊田春種秋收之事宫觀清規禁言道化賢釋化愚晉成帝咸和間雲門等郡有學佛者八十人告入寺為僧嵩山等處有道士二百人告除名入道帝謂王導曰嘗謂人身難得中圡難生今中國之人反棄中國之道願往生西方為胡人不願生于中國何愚之至也昔漢章帝所謂道化賢釋化愚是乎王導曰誠實言也可為萬世之戒故世方有道化賢釋化愚之説自此始雖世常有是言其道士切不可言恐生函矢大宜忌之按皇甫真人曰聖人設教各隨風圡稟受之性所立性識愚鈍者本乎地則以死為樂性識聰慧者本乎天則以生為樂周易所謂本乎天者親上本乎地者親下是也以兔為樂者𣵀槃經佛謂坐滅滅矣寂滅為樂以生為樂者老子謂我命在我不在于天死生之道賢愚皆有其樂又何必究其賢愚哉此篇極説得有理故取之忌爭論一大忌與人爭論其教道德經曰夫惟不爭故天下莫能與之爭清淨經曰上士不爭下士好爭或有橫逆而來于言談中用言詆毀則應之曰嘗謂人身難得中圡難生既生中圡正道難遇我中國人也生于中國奉中國聖人之道是不敢悖所生之天又不敢悖所生之圡以中國人奉中國之道理也若是背了所生之圡而奉别教便是畜生一般忘了天地生成之德了豈是修行之人教之髙下吾不知也只這等回答理不出于人上矣道釋坐次凡釋氏至于宫觀道士當讓釋氏坐于上道士至于寺院釋氏亦讓道士坐于上是以生客賔禮之待也如或他處相遇道釋皆以年長為尊讓坐于上雖教有夷夏之别其理以和為貴在人謙退為德僧道之稱唐髙宗永徽五年因胡僧與道士爭稱其名曰只聞人呌僧道未聞人呌道僧胡僧反列于道士之上帝曰道士乃朕中國人也爾胡人也豈可以夷狄之人列于中國之上乎中國禮制之所尊外夷冠履之不加貴賤分也帝謂于志寧曰且如世之稱夷夏者夏是中國反居于夷狄之下可乎如言隂陽隂是小人也不吉也陽是君子也吉慶也反居隂之下乎言禍福者何不先言福而後言禍豈是禍為吉乎如言鬼神鬼是下鬼也神是天神也何下鬼反在天神之上乎如言曲直斜正者正之與直皆善事也斜之與曲皆是不善之事也反以不祥之名而為先乎凡世之所稱必用先凶而後吉是以不吉不祥之事在先言之其僧之與道髙下之先後亦猶是而論也其吉凶之名貴賤之分夷夏之别可得而知矣舉此例知道之尊貴何嘗汚馬禁説因果唐武宗曰昔在梁武天監間立義學生之名每人要編捏地獄因果之事十篇誑惑世人以化愚俗而求布施共八百餘條散在法苑珠林等胡書之內原有經教之傳肉祖跣足持鉢乞食而為修行之事豈有誑惑世人而求財利者其世之愚夫愚婦莫不懼之乃傾財蕩産而施之者有之而道家乃中國聖人之道切不可言神鬼妖異地獄因果之事沿街抄化玷辱宗風此乃無籍小人無耻之徒非中國人之所為大宜禁革禁止陽精舍利道士陶元素者遇一道士自稱皇甫昕領至一松下見一白髯者捫其頂曰此子頂有竒骨異日可學道父毋遂舍于昊天宫與道士滕碧霄為徒十九遇一老者授以天髓靈經之書後逰崆洞復入太華而居之至梁天監十三年甲午年一百八十二歲矣帝聞有超神太虗之道遣使以璽書迎之不就乃作詩曰歷晉齊梁將二百不妨塵務猶相隔今朝脫却這皮囊走入太羅天帝側遂囑其徒曰吾今逝矣當以火化勿留遺骸乃解衣跌坐而逝時天監十四年乙未正月之一日也其徒遂焚之其骨上皆有紅白二色之珠太如上粒者光瑩耀目其堅如石得三百九十九顆使者奉獻于朝范雲曰西胡房中祕密之法以合氣而採隂者得之其色紅紫而躰重也胡言舍利西胡有堅固石與之無異多有以堅固石用血竭䤾于骨者燕辨中國善修飬者以童躰全陽之精結而成者有紅白二色名曰陽精即舍利皆是死人之穢物豈可獻于朝耶既言得道必飛升于天不以枯骨遺于人間既有其死焚其尸穢物尚在何為得道其庶人之家凡有一死人枯骨于宅謂之伏尸故氣不祥之物必用巫祝以驅之况持之入朝使者可斬帝遂不納于是天師移文天下宫觀曰中國聖人自黃帝立教未嘗以死為得道若言得道何又有死不免為下鬼之稱况留死尸枯骨之上結成陽精誑惑世愚今後敢有以陽精舍利惑人者當以妖論焚修警語按焚修宗旨云其職也朝暮焚香燃燈酌水獻花誦經禮懴以求褔力常使殿內聖像器物潔淨齊整勿令一塵所染時時拂拭勿缺灑掃殿宇房屋勿令有塵垢積地是謂勞心于天帝之前委身于清髙之境此道士之職也苟能如是必蒙福報缺此一事天必殃之尤當盡力于蔬圃竭心于炊㸑採薪汲水苦其身心勞其體膚是謂打勤勞之功者所以報天地生成之恩也使其功大則福報不淺若此二者無一于身則虗負道士之名暗受天人之福身謝之後受畜類報不免刀砧之苦拷罰之殃可不懼哉今以潭州白謹微所蓍警語應驗附示于篇末其略曰昔冦謙之謂凡人生于世值遇晦星命當貧天者皆由夙世業根深重稔積過譴應當捨身出家奉事天帝以求福力然後得免貧天此焚修出家之説由此盛焉昔有京兆徐謐者自幼多疾術者推曰此兒非但多疾尤不免貧天父母且未信至十一嵗相者曰此兒夀不過十五嵗父母始驚愕曰願求法以免之相者曰若𣣔免厄無非出家庶免苟免于是捨于城東玄元觀為道士謐乃朝暮勤奉香火潔掃殿廡挾箕擁帚不憚勞於廽廊之間携鎌荷鋤常盡力於園畦之內夜則誦經拜懴回向端坐焚香稽首致懇當日修墻輔屋勿有虗時手足胼胝皆為龜裂况不食常住之物自化日糧不燒常住之柴薪自採薪汲水而自食人有憐其勞苦者曰子何勤苦之多也答曰修行之士為生免事大豈可用人服事而自不為乎是以人為我奴反受天人之福也如此者四十餘年一日遇一道士于松隂執手謂謐曰子勤久矣天帝賜汝夀錫汝爵未幾名京師朝廷擢為景霄宫道録總領賜號通玄輔化真人至南齊廢帝欎林王𨺚昌元年夀一百有一嵗北魏主聞之皆遣使遺以金帛道將成遇三道士呼之同逰遂往梁元帝時有棄佛而學道者入茅山遇謐騎巨羊謂曰汝歸告吾京兆玄元觀諸道衆吾今為玄天幕府內臺左相由是傳其事于世天下出家奉道者始知勤恪吁出家之士始因命運刑沖父母慮其難飬方捨六親委身宫觀後世不知因果出家者類多慵惰傲蕩之士食人饈饌受人恭敬求人施捨不生慙愧不顧殿上香火之有無不視階砌塵埃之潔否不顧殿屋垣墻之頽漏徒知幽間快樂以優逰不肯勞苦供奉而誠敬以徐謐之事較之豈不揣于心乎况夫天律嚴峻神目炳窺暫時得安飽暖不免墮為異類鄷都之考庸可逃乎余自八嵗出家今巳白首常對食思𢙨無補教門恐罪戾罙深殃加九祖是以普告出家之士咸宜猛省母墮昏慵庶幾可共躡于仙梯同振于玄綱也大宋建𨺚二年三月既望嗣三洞正教清微伏魔使潭州夀星觀出家道士白謹微拜書晨昏朝修道衆凡栖琳宇當以焚修祀事為先宫觀之住持每日集衆升殿焚香諷經朝真禮聖當體祀天奉教之心以罄修真學道之志翔望凡遇翔望之辰先日沐浴至期清晨住持領衆衣道服壇簡升殿序班諷經一以祝延聖夀一以敷揚玄範節屇凡遇節屇日辰當行朝真之禮朝修既畢宜追上古之風以禮會筵恪遵宗範莫致怠荒晨昏啓閉宫觀門戶最為緊要所以啓閉有時朝則待明而啓暮則猶光以閉其鎖令所司者掌之其鑰于常住收掌凡遇啓閉依時關領晨昏鐘鼓晨鐘暮鼓以召百靈壯官觀之威儀弘山陵之氣象每日晨昏不可有缺清晨會湯道士道童每日升殿訖須會方丈擺班請揖於住持前次分兩班大衆對揖道士依次序坐道童朝上揖遞湯訖拱立于下住持敘一日之事若有公私等因該管職事及事干及者稟知住持對衆從公議擬事畢普揖而退以正清規勿隳玄教常住常住者宫觀之綱領必擇碩德寬弘公正之人任之凡錢糧金穀收支耕布田地山園祗待往來官客一應等事分設各職輪流執掌或一年二年三年更換務使允當必盡心于公堂勿故意于私巳玉蟾真人有云常住金穀有神司之捨者取者各獲果報斯言不虗宜當戒慎齋堂宴會赴堂宴會坐依次序其尊卑上下之禮不得差互齋堂日食每人一日常住給米一升蔬菜魚肉隨其豐儉三餐依時擊雲板會衆赴堂食之如遇雲逰客道照依古例止管飯七日若坐鉢過冬過夏者常住管飯百日若于本宫觀參管職事者與本宫觀道士支采同不在是例京師及上清名山有大德有道之士至本官觀欵留倍加其禮供給所需不拘嵗月齋庫日支巳有定例不許私為人情擅自支出與人食用或有粗俗無耻之士索要酒食其管常住者當執法謹守清規違者罰設齋一席自出巳財合宫之衆禮當要到收飬徒弟凡收育徒弟必擇喬木故家聲名昭著鄉里崇道積善之人子孫無𢙣疾違礙者取之以禮結為道親方可與進若若慵俗伎藝之人子孫及有𢙣疾胡臭臭瞎眼疤面六指瘸跛殘疾之人不可為徒請給度牒凡道童自幻入于玄門習本教經書長立果有道器者如遇該年請給預先呈稟道可申送請給庶不乏人使代代相承悠久之意醮事若有施主賫香詣宫觀建醮事干常住差委該管道衆分幹一應等事務要虔恪冝遵祀天之禮莫負施主之心化緣宫觀興修須慿檀樾常住請能事者持疏化緣金谷以助修造之用先冝訪問逺方殷實有德之家能結善緣果有歡喜布施之心敬叩題緣若雖有資財慳吝不捨者免過其門若不拘髙丁多助寡助隨緣布施者尤佳修造修造一事常日不可廢弛委數人時常巡察殿宇墻垣溝渠路道但有損壞即便修理其磚瓦竹木釘鐵石灰等件俱于常住關領化緣金榖預先準備上庫收貯以備修造之用灑掃各殿堂去處若欲灑掃必先以水灑之候片時以帚掃量濶方圓五尺攢灰塵一堆不得遍亂混掃不然使塵灰飛揚蒙蔽聖像幡花切宜忌之納糧宫觀有錢糧者干于糧里會計或兌運或起運或存留必先請議定奪不得遲悮輸約之時委老誠之人管運赴倉須先完納免致催徴守莊田田圡有離宫觀窵逺者須立莊屋倉房收貯谷米農具等件必要本圡誠實之人看守不得用外郡無籍之人住居不免鼠竊狗偷日久必有異事纍及宜先詳察免後招愆收田租凡宫觀有田地廣多須召無田之人佃布必先立約議定還淨租谷若干秋收之時委人臨田眼同收割管押登場照約依數趂時取討先禁佃人不得私自割收如此則租糧無虧放榖常住榖積有多餘者宜放借鄉間本分之人食用秋收之時照例起息收取非求利于常住實周急于鄉民倉庫積收常住器用之所須與住居間隔不得連甍接棟以避風燭之侵掌其事者必須嚴謹園圃日用家常蔬菜不可有缺常宜栽沃一切菜皆可食但不宜栽蔥蒜韭薤荽謂之五葷菜修道之士不可食爾雅云持齋不食五葷者即此五葷也非魚肉類修道持齋者察之告假凡省親訪交出外雲逰必須請假務要詢問所土之處果無違礙方允其請不得托故非為夾𢃄他人牽引是非玷辱教門各宜慎之雲逰道家出逰尋真問道謂之雲逰道士奉天之士也謂本乎天者親上故曰雲逰其雲逰之士必會祈睛禱雨祛邪斷怪極災拔難及善風水能風鑒會星命能吟作會書𥁞方可出逰不然則凡俗之士也不取舉薦凡宫觀之主直事之人務要擇其有德有道行者以主其事不肖者不可以私恩保之有德者不可以𥝠隙如之務在從公可以服衆參職事不論逺方近處有道行能管辦事務者當以禮請入宫觀以參職事觀主凡宫觀之首領如有過衆皆舉之三舉不悛當退堂以薦有德者繼之道衆有犯當會衆發落輕則面諭其非使之攺過遷善有法所難容者必以清規治之紀其過於簿籍紀三次者凡敘坐列于末席如建大醮不許登壇有𢙣極重者難以於宫觀共處會衆逐出後以帚隨少掃其地絶其蹤迹使不復再入宫觀故也教成法自古宫觀齊教之法立規矩有之其制法論過擬罪比常人犯笞杖律者減半論之如常人犯不應罪笞四十者道家清規止笞二十使之攺過修省而已若有他犯則量其罪過輕重比律議擬此道家教戒之法也若罪犯到官比常人有犯律加一等何也以其修道之士當積行纍功卑體賤身含垢忍辱是其職也故有犯者為無修道之心處于華屋不耕而食以享天人之福故比常人罪加一等可不懼乎清規戒尺式用木造濶一寸四分厚四分長三尺正面背面違犯法律唐髙宗乾封二年戒諭爭論勑朕承天命𡘤有萬方敢不欽崇天道以宣天德比者昊天觀祭酒楊太玄華嚴院僧人宗敬爭論後先亦嘗戒諭尚不遵行朕嘗稽之古典乃命儒生校其優劣詳知道佛之後先見夷夏之輕重準今酌古貫理窮源且以天人論之道乃天地萬物之母佛乃修道而成道以天稱佛在人列孰敢以人加于天地之上哉以夷夏斷之開道教者朕中國之黃老始佛教者彼西胡之罽賔黃老中國之大聖佛乃西胡之善人以夷夏論之豈可以外夷加于中國之上哉又以先後論之道乃先天而先地佛乃後出而後興道始於盤古之先佛生于周莊之世上下相距三百萬七千餘年孰敢以周莊加于盤古之前哉又以朝代斷之道闡於軒轅之世佛出于漢明之時道在龍馬之先佛來卯金之末孰敢以後漢為尊而以黃帝為卑哉又照僧家舊例首明後先先入寺者雖幼必列於上後入寺者雖老必列於下此清規不易之理天地自然之勢也况道先佛後又何疑焉朕今敷諭之後二教咸體朕言敢有不遵仍前爭論重則加以極刑輕則罰為城旦之㫪令下有司俱從朕斷弘道元年禁絶黨𢙣勑朕以菲德祇紹鴻圖嘗謂立教不明弊流萬世知弊不革厥罪帷鈞旁求輿論之詳大建扶綱之議昔在軒黃之世巳有道統之傳逮乎漢季之時始有佛法之説原其為教本以化暴歸仁誘𢙣為善夫何自漢靈帝中平𥘉巨鹿人張角𥘉以符水治病救濟疾苦無不應效可為理矣及乎期年之內四方之人雲輳而歸之角乃頓發侈心𣣔希大位因是作亂自稱大賢良師天公將軍弟寶稱地公將軍梁稱人公將軍聚衆千餘人皆以黃巾為號擾亂天下漢之國本幾動兵敗被擒黨衆伏誅至若僧徒之弊梁天監間僧法慶等與其徒李歸伯作亂自稱大乘皇帝以歸伯為十住菩薩平魔軍司定漢王兵火連亘數千餘里干戈遍野數年不止民遭𡍼炭社稷動搖幾至殞國又若魏太武時奉佛人蓋吳與長安寺僧衆僣號稱帝而反事覺伏誅隋大業年間群盜數十人自稱彌勒佛皆戴毗盧之帽焚香持花入建國門奪衛士兵器驟然為亂兵交闕庭血流殿陛幾至大禍其可畏歟至我朝髙祖武德元年僧髙曇晟與僧五千人反自稱大乘皇帝以尼淨宣為耶輸皇后攺元法輪攻破州縣殺戮官軍近者又有僧志覺娶陶氏之女以應桃李之讖與契丹結謀自稱天子又有事佛之徒鐵余等為亂曰聖佛出世自稱光明大聖皇帝殺官軍焚民居以是觀之其二教之為天下患蓋不細矣朕歷考古典自開闢至於今日上下百千萬年道之所犯者帷一其禍乃淺自漢明至于今日不千年而其禍非一而亂且大朕𣣔追上古之風復羲農之治中國之人則奉中國之教夷狄之人則奉夷狄之教𣣔使中國絶其蹤迹以杜前禍使道有邪正之辨人有夷夏之别奈何以聖人之心而行外夷之教豈可以姑息之意不忍以廢之也歟今後道釋之徒已有定額敢有私蓄門徒藏匿逃亡誘惑良善聚為黨類更相倣效者許諸人執赴法司推究其故苟有不軌誅族無赦故勑朝謁禮凡朝會天師當衣法眼冠俯仰之冠執簡愛舄如臨上帝凡為道士者勿論少長當皆衣金襴之服正一之冠執簡常日見帝王不執簡素服不拘全真褐衲如常譬如僧人勿論少長貴賤皆衣金襴袈裟况道士入朝見君反不為禮乎自漢以降大忌雷巾小衫小衫乃流俗之衣也雷巾乃野人之巾山中幽隱之士以謢短髮大概修道之士存神聚氣會三華于泥丸以避泥丸之開恐風邪之所襲也豈宜戴雷巾入朝謂之無禮出家以簮戴為名不戴簮冠而戴雷巾禮乎謭薄好矜飾者為之有純德者必不失其簮戴之禮昔鄭莊公殺子臧以其冠之不正故也是以孔子作春秋首載其事凡為道流者不可不知又見冠服儀制章按元中統四年中書省劄行下諸路行省云自宋季喪亂天下𥘉定禮法未行其梗化者獨僧道也考之僧人以髠首為修行道士以簮戴為出家今僧徒見僧官及師長入其寺皆去帽及入朝門反不去帽見君方去其帽有是禮乎且僧官道官自古例無冠帶止以髠首簮冠為職自三公六卿見君尚皆免冠叩頭况出家修行之士以卑弱為先謙退為德反不去帽而髙抗自尊今後僧道凡見官長不去帽者笞十七歸俗入朝不去帽者笞七十徙吐蕃其服制也道士不當用蒙古出袖比甲之衣當用軒黃之冠服僧人不當唐扮用武氏之媱衣毗盧之帽教僧當用西畨之紅氁衫禪僧當用梁武之皂布衲不得衣絲蠶紗羅綾假之衣尼姑止許照依女冠在家出家不許群居立院因而藏匿男僧雌雄不辨媱風大扇以致嬰孩祐骨堆于後園事發者數矣致使濁亂風化悉宜禁革敢有仍前違犯者斬一晨昏上殿當鳴鍾鼓早在昧爽之時晚在日沉之後道士先擊聚衆之鼓以齊道衆焚香誦經一過二禮乃退不到罰油五斤準拜五十造言不服者罰油十斤準拜一百下聽拜者會衆笞四十不許共食住支糧一年一道士有過者輕則罰之或香燈之屬重則鞭之鞭之不攺罰之以供炊㸑飯堂之役或園圃之勞又不攺再犯罰為直厠之奴罰削杖以供厠內之用或一年二年以待更過乃免一道士有纍𢙣不悛罪之重者莫大于不服教訓不守清規及偷盜賊害為凶暴不仁之事者黜之永不許再入本宫觀其本宫觀籍册以紀其罪傳于不朽一四方雲水有慕山川之勝福地之靈𣣔修道于宫觀者供給所需與本宫道士同不可分别敢有嫁言謗訕讒毀是非而相間諜者笞二十貶往守庒不許入宫觀一雲逰道士至宫觀倍留十日供給飲饌不可有缺如𣣔過冬過夏者聼如要居住不去者聼果有能事者許參職事若非有淳德性剛躁者勿許恐惹禍端一逰方僧人至宫觀如𣣔挂搭結夏過冬供給飲饌常住館榖不可有缺亦當驗其有無度牒真假明文方可安下一凡宫觀當置一薄名曰雲水籍如遇四方雲逰道士至主宫觀者驗其度牒紀其簿曰某州其處道士某人幾年月日至如起單紀其幾年月日起單恐有逃亡罪人隱名逸姓者以纍宫觀如無度牒者或有公據帖文亦當辨驗不可久留當紀簿籍恐官中挨捕逃亡罪人以慿查照庶得無纍天皇至道太清玉册上卷終天皇至道太清玉册下卷南極沖虛妙道真君遐齡老人臞仙製宫殿壇墠章宫宫者帝王深居之所曰宫黃帝祀上帝於昊天之宫祀三清於太極天宫故黃帝之受命上天眷命凡有天下者皆曰奉天以承天運此宫之始也觀下仰上曰觀音官上俯下曰觀音貫帝王臨政之所明堂是也居高以臨下之意故曰觀音貫按黃帝內傳西王母授帝白玉元始真容置於高觀之上此觀之始也殿演義殿法也取衆屋擁從摯虞決疑要注曰殿則有階陛堂有階無陛春秋謂之路寢禮記白虎通俱曰天子之堂史記秦始皇作朝宫渭南先作前殿阿房啇君書有言天子之殿則是秦自孝公來巳云然矣蓋秦如曰殿也後世祀天帝者有金闕寥陽寶殿無極寶殿太極殿其名極多此殿之始也閣韓詩外傳曰黃帝時鳳巢於阿閣閣亦肇于黃帝也世有祀天帝宫觀建通明閣紫虛閣玉皇閣等名此閣之始也余於長生宫建夀星閣天皇閣為民祈夀祈榖樓史記方士言於漢武帝曰黃帝為五城十二樓以候神人帝乃升幹樓然則樓蓋起于黃帝之時世之祀天帝宫觀多建鐘鼓樓及有棲真等樓此樓之始也道藏始老子為周文王守藏史以東觀藏書後世道家皆有道藏藏經焉鹿皮公置以轉輪懸閣動則鐘鼓自鳴中藏其經外則刻以天神像置之此其始也後世有輪藏殿曰雲章寶室天章寶藏飛天法輪等名此藏之始余攺藏殿為璇璣殿謂其斡運天道如璇璣玉衡以行天也堂古者羽流建天醮有演法堂堂列六幕設六師位於內以主醮事此堂之始也余攺堂為泰玄殿天關天關之名自余始之余於南極長生宫建玉宸天關左右列四天帝君一曰承天輔教青靈帝君一曰安邦柱國皓靈帝君一曰保鎮國祚丹靈帝君一曰制御萬神玄靈帝君關之前兩楹有對曰閶闔雲開來三界朝天之仙侣穹窿日霽列四靈輔弼之神君天門皇圖要紀曰軒轅造門户然則門户之制其在上棟下宇之後晨昏啓閉以禁除暴曰門古制有用二龍虎君者有用二天丁者今余所制凡有天丁龍虎君者為之天關無者為之天門以其祀上帝二清之所乃太羅玉清之境故以天門稱之世俗不明理者呼為山門又曰三門去道逺矣鉢堂其堂乃四方鵉儔鶴侣栖真之所自古名山仙迹之所有之余於南極長生宫建造鉢堂名曰棲真館揭其名于門楣對曰世間雲水皆居此天下全真第一關堂之前軒扁曰華靈隱靄之額軒柱對曰闡中國聖人之大道襲上天仙子之遺風軒之中立啓關閉關之牌中祀王重陽真人後案設金木水火土以相五行造化及金蓮七朵以表七真玄機供列于前中立全真鉢架下列水鼎上懸五鈴一鉢架有對云五鈴齊振弘開太極之關一鉢暫停再入泰玄之室兩傍對列坐龕一十四單以鉛汞子丑寅卯辰巳午未申酉戍玄為號堂之柱對句云默朝上帝升金闕靜守中黃閉玉關左右有二廂房左曰鶴巢右曰麟藪內設雲床一十四坐卧事身品具齋饌器用等物悉皆周備以俟雲水全真棲息之用世之作鉢堂者體此為法圜室以磗砌為室方圓一丈無門止留一竅以通飲食後留一穴以便出穢全真入圜砌其門謂之閉關坐百日乃開謂之開關此圜室之製也其張道陵漢留矦子房之後沛豐巳里中人本太學生舉賢良方正直言極諌科晚乃嘆曰此無益年命遂學長生之道得黃帝九鼎丹法入蜀鶴鳴山坐圜精思鍊志著道書二十四篇三年丹成謂弟子王長曰神丹服之必當沖天吾更須為國為民興利除害即臣事三境則吾無愧焉帝聞有道授太傅封冀縣矦永夀元年九月九日與夫人雍氏同升天其圜室自此始也菴匡續夏禹之裔弟兄五人生而神靈長曰續周武王時與老子同為柱下史受老子之道隱於潯陽三人結廬于天池之峯二人結廬於虎溪道成沖舉故名其山曰匡廬漢武帝封為大明君國朝攺君為公此菴之始也後遁世之士潛修至道者結茅於岩壑之間亦其事也余故體其製結茅於遐齡之南峯其地産靈芝故名之曰芝菴書其對曰我居方外當離俗誰信菴中别有天其菴內對曰一室斗大寸心天寬默坐凝神妙思玄造菴之下建白雲之丹室書其對曰栖白雲而煉大還避紅塵而為小隱以俟有道者居之其路自飛升臺之南地齡峯之西有松杉之徑周回曲折而至其處其徑中有額曰白雲深處書其對曰一壷天地小無限野雲深將至菴所其徑有額曰紅塵不到處書其對曰靜裏日月長間中天地闊臺古之修道之士有功成道備沖舉者必隱名山仙地而上升余於是立飛升臺於遐齡洞天遐齡峰之上以俟成道仙儔必躋臺上而沖升矣臺上石柱有對云九轉丹成舉步高奔紫極大還錬就騰身直上青旻寺寺者六卿之爵人臣之位大夫居之故秦有太常寺以主祀天之禮漢武帝以道士凌太沖為太常卿乃攺太常寺為承天寺以祀上帝自是祀天以道士為太常之官以主祀事又設祭酒一員以掌醮事以承天寺為道士之官衙祠道家古聖之祠自峨嵋山天真皇人之祠始之古有三山祠是也蜀之峨嵋山昔天真皇人之宫在焉潯陽匡廬之天池及虎溪有大明君二祠在焉晉之五臺山有二祠一祠紫府鴈門君之宫在焉一祠乃王子晉之弟眉夀修道之宫在焉其三山皆有放光之石遇日生白雲則有五色之光自五胡亂華中原雲擾因其有光皆為石勒姚長所奪為胡廟而中國三山神祠始絶矣館天真有玄館有道之士所居之宅謂之玄館院道衆聚居之宅曰院天宫周穆王太子奉天尊上帝之室名曰天宫自漢晉以下凡奉道之家供奉天尊上帝之室皆名天宫雷壇凡行雷法祈禱之家奉雷神之室名曰雷壇壇墠方氏注曰祭地為墠築上為壇書金縢武王有疾周公為三壇同墠黃帝內傳乃有築壇墠事是其始也皇壇科曰齋莊謹肅祕密混融內真之事也幡幢旌節折旋回還外儀之事也然誠心合真運用無間與天地為徒則猶待外儀以變化境界凡一俯一仰一進一退眼見耳聞莫非正事邪心無自而入則可通天真格上帝故曰法天象地像世威儀則無往不肅敬也凡壇墠其制三級蓋分天尊地卑之設上一級立虛皇玉京山天寶華臺供三寶帝師左列建天真命魔之幢右列建獅子辟邪之節左之左設通真之符以降千真右之右設逹靈之符以召萬靈中設三晨之符以通萬氣辟除妖氛壇之東植青龍幡符壇之西植白虎幡符壇之南植朱雀幡符壇之北植玄武幡符五方又敷鎮安玉符此上之一級也若不用三級則就堂殿依方設之中一級設八門西北標云玉虛通真之門正北標云清泠玄一之門東北標云鎮靜自然之門正東標云青華始生之門東南標云純和剛陽之門正南標云純陽烜赫之門西南標云坤順金和之門正西標云剛眀皓華之門下一級列十二氣子位玄天鬱初之氣丑位北元自然之氣寅位辟非蕩邪之氣卯位始青茂元之氣辰位黃靈高玄之氣巳位鎮靜靈寧之氣午位炎真下明之氣未位中一凝真之氣申位厚和肅明之氣酉位剛堅素和之氣戍位真元飬靈之氣亥位返隂回真之氣巳上三級之壇則成矣皇壇之設非特度生用之凡修詞請命禮聖朝真禳災謝過為國為民祈夀請福薦拔宗祖錬度幽靈祈天建醮悉宜用之三級皇壇圖奉聖儀制章天神尊號天尊號書曰天曰神地曰祗人曰鬼天曰神者純陽青靈之氣造化自然鍾氣之靈故曰神地曰祗者秉天地鍾海嶽之靈自然之妙故曰祗人曰鬼者凡人有死皆曰鬼雖修道而成不免有死遺枯骨於人間者緃高不妙終為下鬼之稱故曰鬼乃以上天之神尊曰天尊元始天尊造化之主生物之始也莫得其名老子強名曰道乃立其神之名曰元始昊天玉皇上帝即天也不得其名乃曰昊天黃帝稱為玉皇居上天故曰上帝后土皇地祗其山川海嶽必有神以主之不得其名黃帝稱為后土皇地祗曰黃帝稱為太陽帝君月黃帝稱為太隂皇君北辰天之樞機也為萬象之主衆星拱之居子位故號北辰五方五帝天有五星以配五行五行之神以主五方東方神曰青靈帝君南方神曰丹靈帝君西方神曰皓靈帝君北方神曰玄靈帝君中央神曰元靈帝君九宸九宸曰長生大帝青華大帝普化天尊雷祖大帝大乙天帝洞淵大帝六波帝君可韓真君採訪真君即元始九氣化生也故號九宸上帝代天以司造化主宰萬靈奉聖儀聖像中國神像以玉黃帝以白玉元始真容置于高觀是也後世無玉止以土塑按申失之土也飾以五彩兼備五方之屬以正中國之氣凡東方之神像以木雕西方之神像以金鑄南方之神像亦用木取木生於火也北方之神像亦以金鑄以金生於水也皆取像於所屬聖像寶座龍床之式屏風用龍頭口㗸五色結綵屏風皆用衮龍不許用靠光花草之飾當以中國體製為正三清殿兩旁當塑九宸九帝玉皇殿兩旁當塑三十二天帝二殿之壁上當𥁞以萬聖朝元之班像玄帝殿兩旁當塑雷部諸神殿內壁上當𥁞玄帝修真事迹許真君殿兩旁當塑列仙殿內壁上當𥁞拔宅飛升沖舉之乘鵉跨鶴御風馭龍浮逰仙侣故事祈夀宫觀殿內正面堂塑長生大帝左長生保命天尊右延夀益算天尊為主兩邉用南北二斗左南斗益算右北斗延生南斗六尊當用夀星湊七尊以對北斗夀星閣以福星祿星置于閣上其下塑夀星之像龍牌道家龍牌不用玲瓏余更其制度實刋如碾玉狀龍在外全身現脊為邉粧用金龍雲用五色以表兼備五方之德自余始之龜鶴爐丹陛上兩傍宜用銅鐵鑄成龜鶴二對為爐凡建醮事焚香於內可以通仙靈香氣可逹上蒼幡道家所用之幡以表天地人三才之象吾更其古製幡頂用桐梓之木為之上用日月星辰雲霞內𥁞天尊像於二以表天也幡腹書天帝之名腳俱用龍鳯兩邉帶取象於手皆以雲龍飛鳳為副之取象于人也墜腳亦用桐梓之木𥁞山河大地五嶽四瀆取象於地也自古未有此製自余始之世俗之幡皆用荷葉為頂蓮花為墜鄙亦甚矣日月燈凡殿兩楹之間必用魚魫為燈以雲霞覆之高聳於楣枋之間左用紅以象日右用白以象月自余始供花用桐木刻以靈芝以表仙瑞之物也牡丹一莖而花五色高九尺飾以金縷以按韓湘子頃刻之花自成五色仙瑞之應也供物當用五行金木水火土以表天地造化相生相尅之治而合神明之德金以銅鐵造成錠金鉑貼之若用真金恐盜所窺木香是也以香刻成假山供之水淨水是也以盂盛之火燈是也土以黃土取方一塊八方刻以八卦供之供果當用木雕夀桃交梨火棗玄圃梅崑崙瓜供香降真香乃祀天帝之靈香也除此之外沉速次之信靈香可以逹天帝之靈所忌者安息香乳香檀香外夷所合成之香天律有禁切宜慎之信靈香品降真鬱金沉香速香各五錢藿香八錢藁本甘松白芷陵零各一兩六錢大黃香附玄參各二錢凡合香於甲子前一日於靜室合香之所置五子牌位以香燈供飬務要潔淨其神主有五甲子之神丙子之神戊子之神庚子之神壬子之神合信靈香法甲子日攢香品丙子日碾戊子日和於一處庚子日丸成供於天壇之上壬子日裝入葫蘆挂起至甲日焚一丸以祀天其後不許常用凡遇有急禱之事焚之可以通神明之德如出行在路或遇惡人之難或在江湖遭風浪之險危急之中無火所焚將香於口內嚼碎向上噴之以免其厄天樂儀仗章天樂乃殿上陳設之樂也天樂之始昔黃帝會羣靈於崑崙之西山命伶倫取嶰谷之竹作笙竿簫笛以引鳳鳴作鐘磬以叶律吕以定嵗之閠餘取夔之皮作鼓以享天帝乃取伏羲所製之琴瑟合之為樂於是羣神皆集百獸率舞鳳凰來儀至堯大祀圓丘以享天帝用之去古既逺失於其真漢武帝乃命樂師矦調作箜篌以配神靈之音重訂是樂乃命道士大合天樂於昊天之宫以祀三清上帝命其名曰三清天樂三清天樂章仰瞻龍馭兮昊穹帝陟降兮琳宫霓旌羽蓋兮天人景從臣率羽士兮下方奉迎鑒臣愚忱兮精誠上通謹拜首稽首兮祈生民夀算增崇祝皇圖萬世兮家國興隆願千秋王業兮福夀無窮以此寶香上告穹蒼普供養天皇一縷祥煙繞上方黎庶音仰望恩光願賜夀無疆樂具震天集靈之鼖焱豐鼓也焚碧霄震空之鏞洪鐘也萬金錚鏦之鐘架上十六應候之鐘羣玉琳琅之磬架上十六應候之磬瑶池靈明之鼗音扛鼓也桃逹悃通真之磬手磬也玉霄紫金之鐘金鐘也玉清天球之磬玉磬也太昊咸和之琴琅霄遏雲之管即葭管湘靈空漬之瑟太虛仙音之籟似箜篌而𥱧絃瑶臺夜月之阮檄龍命鴉之柝青華瑶天之笙玄洲洞靈之簫嘯風凌雲之笛靈鼉嘯風之𥀷杖鼓也名玉禮璚臺碧玉之板震空丹霄之璈叶和衆音之塤保合太和之箎五音翕和之祝八音九成之敔此樂黃帝祀三清之樂也今之所用但鐘鼓笙簫雲璈仙籟而巳凡升壇朝真謁帝則用之其行道誦經止用常日之仙樂帝鐘黃帝會神靈於崑崙之峯天帝授以帝鐘道家所謂手把帝鐘擲火萬里流鈴八衝是也天丁之所執者又謂之火鈴代宗時令胡僧不空設盂蘭會取道家帝鐘以代磬後攺其首為鈴用之鐃鈸蚩至尤驅虎豹與黃帝戰黃帝作鐃鈸以破之其虎豹畏鐃鈸之聲故也况亦驚逐魔怪唐武后時僧懷義謂佛在世日有魔申日申波旬匿之衆設毒飯火坑陷佛以糞血戲佛以象踏佛佛欲滅之其魔有曰吾種類甚多日後當破爾道故懷義凡建齋用之以為驚逐魔怪之器武后日鐃鈸雖能驚去魔鬼其所薦祖宗之魂靈安得來享魔怪尚爾况其鬼不驚乎令道門亦有建隂陽醮者皆用之大宜禁革天真皇人曰昔元始天尊演法靈寶玄妙超度法門會集群仙於虛星天寶之臺諸天隊仗紛紜日月星宿璇璣玉衡靈獸鸞鳳丹輿緑輦幡蓋霓旌來朝夫行道之士開建壇陛亦遵上天之儀以度下世兆民者也余嘗於空中見天人之羽幢絳節龍旗鸞輅乃體其製攺其古法創為仙仗今列其像如左肅清黃道之斾一封昭告萬靈之幡一對震攝百魔之帗一對九皇萬齡之縷一對三清神霓之旌一對太微命靈之麾一對太清極玄之幢一對一面𥁞龍一面𥁞虎五靈綘霄之節一對九天伏魔如意一對九霄雲翰之扇一對鬱羅慶雲之扇一封神飈飛霞之蓋一對破暗燭明之燈一對丹霄神𤔵之燈一對天衢欎霄之燈一對丹鳯呈祥之輦香亭是也巳上仙仗用硃竿寶蓋珠綱綿帛繒綵為之務在裝𥁞整肅列於外壇四面每朝奏步虛旋行之際則道童各執仙仗和華夏吟隨班旋繞皇壇之上非登壇朝奏不用則列于壇之四面架之後世道運否塞其教弗興皆以𥿄為之醮終焚化與𡨋器無異大宜忌之天真命魔之幢命魔幢身六面符一面二面三面四面五面六面獅子辟非之節符節右天真命魔幢設於天寶臺左辟邪獅子之節設於天寶臺右用硃竿寶蓋珠結幢身桐木造成六面每面篆符一道硃𣾰裝金餘各依式造之凡法師步虛旋繞之際二道童執之侍於法師左右同行旋繞是故道以威儀而尊嚴心因法像而敬畏不致荒迷妄亂也夫學仙之士心虛性靜道備真王一念感通天心混合亦何假外儀之可通真耶然古制既有今豈可廢焉故取之天壇燈圖醮壇所用燈圖古有一百餘樣其式繁多難以備載今取常用者一十樣録之于左玉皇燈圖周天燈圖本命燈圖北斗燈圖南斗燈圖斗三曜燈圖九天玉樞燈圖火德燈圖九宫八卦圡燈圖血湖地獄此燈染紅砂鋪燈圖錬度燈此燈染紅砂鋪圖太微回黃旗無英命靈幡全真儀式章凡坐鉢一鉢或八人或十二人或二十四人止大鉢堂者或百人不在此限設四職一主鉢二副鉢領左右兩班坐於上座以主其事又設左右直堂二人在於兩班近門向上坐之以主坐功進退起坐安鉢起鉢以定時刻不巡堂不提坐不挂針不見責既入圜堂道衆坐鉢之功自畏生死之大修煉身心欲出生死之苦而躋超凡入聖之階豈可以勢力逼責而為之悉皆革去坐鉢有用六時者運用不至多致風癱之疾莫若止用子午卯酉四時取天地之正氣為妙入圜中者是下死工夫習以靜㝎煉柛錬形百日方啓若非真師口訣自已運用不至者名致成疾反為害身之術切宜慎之坐鉢自二月十五日起至五月十五日止自七月十五日起至十月十五日止自十月十五日起至正月十五日止一年止坐二鉢夏天炎熱不坐鉢堂外置雲版一木魚一左右直堂坐單前置小鐘二右曰動鐘𡉄曰靜鐘凡每日子午卯酉時至期升堂入單聽直日者敲擊以㝎啓關閉關動靜次序每日升堂入單禮見後外門設一啓閉關之牌用紅牌金字如上座以閉關二字朝于外一應人等不得入如下座聼雲版之警乃以啓關二字朝於外定鉢之法天色晴明之日先以鉢置於水鼎之上以日晷定之如日影方至午時初初刻逺以鉢置於水鼎之上至午未交未初時鉢務要沉以墜五鈴相擊之聲方淂一時乃可起座如時至而鉢不沉者將鉢下水眼稍放大如未至時而先沉者水眼大也再整之以小務要與時相對如午時初𥘉刻下鉢道衆上座至午末將未初鉢既沉水五鈴之聲乃振方可起座依此定之則時刻不差後之作者當體此為法鉢架式古制作一小房如香亭樣用一太極之圈以繩繫於亭之梁上圈中懸一鈴以鉢繫於圈下用一水缸以盛鉢而定時刻余今更其制度改為一架架之兩頭懸以綵結中懸寶蓋置一磬以五鈴安於內以鉢又繫於寶蓋之上如時至水滿鉢沉則五鈴齊振不與世俗所有者同自余始之全真參堂禮全真有雲遊者初至宫觀入鉢堂參見祖師司賔者引領至祖師前先三上香司賔白參堂文畢行九拜禮然後退堂與大衆相見會茶參堂文為覔知音飄然湖海短笻輊笠半生散誕無拘野水間雲十載遨逰已倦佩一柄椅天之長劔使萬靈振服於空中抱三尺橫𣍿之枯桐發靈籟一天之爽氣使猿驚鶴唳於空山虎伏龍吟於秋水乃與太虛為鄰風月為友如斯清致偉矣仙哉况杖頭點破了無限青山腳跟踏破了十方雲水雖然未能打破虛空須要錬成凡骨鐡杵尚可磨針金丹如何不就倘投機祕道合希夷所學者非傍門不經之異端所修者乃中國聖人之大道可以破鬼關削籍於黑書可以升天府注名於金籙待他年上青霄騎白鶴翶翔於琅風之上且如今啖黃精茹紫芝栖遲於岩壑之間也曽切清風批明月曽咀道妙也曽扣金鐘揮玉塵曽究玄機遍天涯去訪高人頑鐵尚未逢磁石針芥故未可相投是以今日特為尋真偶然到此敢僣參師祖之圜堂有愧行野人之村禮謹以信香上告道祖軒轅黃帝道祖太上老君南比二派歷代得道仙真聖衆恭惟鉢堂上座尊師琳宫之內仙侣真儔道骨巳成仙風久著某等草木微軀煙霞賤質宿以毫𨤲之根氣得同無上之妙門大許升堂庸行初禮暫移瓢挈笠以相從論道談玄而共處從兹參禮敢乞㮛携夜寒𥘉共守庚申與相伴説來生話下拜禮畢受茶生鉢安單禮太香案於鉢前大香爐一手爐二主鉢副鉢左右直堂同大衆照依班次兩座合班擺定朝上拱立令一道童白致語入圜致語伏以金蓮獻瑞七真傳底藴之言雲篆垂芒萬世仰希夷之妙蓋圜定之設所以歸根而復命而鉢堂之坐所以捨妄而歸真四大端時頓覺乾坤在我五鈴振處審知體用同源尚祈天地加默佑之功造化助精微之念山靈鎮靜境界清間十方清淨瑩無瑕闡幽微顯一點紅塵飛不到煉神歸虛道通象帝之先身在清都之上今道衆宿因微善得處名山愧無仙葩真乳之奇徒有夜月碧潭之想勇於修進當不讓於他為非道弘人乃自加於克巳洞天在平地看呼鸞喚鶴於青𡨋世界即吾身且人馬拴猿於圜室今日也試教默朝上帝升金闕旦看靜守中黃閉玉關致語畢左直堂執手爐引主鉢詣香案前三上香退復位右直堂執手爐引副鉢詣香案前三上香退復位次同大衆朝上總行九拜禮左直堂引左班自主鉢起至下座止一一安單上座每位止行一揖禮乃退方自上本座單位右直堂亦執手爐引右班安單上座其禮同前止行一揖之禮不行拜大右直堂擊動鐘三通畢直日出單放鉢出門擊雲版三聲畨牌閉關可堂詣香案上香三大畢次上手爐香執爐至主鉢前一揖次至大衆依次序皆一揖畢至香案前上香三拜畢左直堂擊靜鐘三下直日方入單坐候鈴響畢右直堂擊動鐘五下直日者起身開門擊雲版五下畨牌啓關每日升堂入單禮但遇子午卯酉時至期直日者先擊木魚六聲集衆升堂八單畢右直堂擊動鐘三通畢直日放鉢出門畨牌以閉關二字向外次擊雲版三聲回堂詣香案三上香三禮畢次上手爐香執爐至本鉢前一揖依次序各單大衆前皆一揖不行拜禮復至香案前上香三拜畢直日方入單坐左直堂擊靜鐘三下候鈴太右直堂擊動鐘五下直日者起身開門擊雲版五下畨牌啓關大衆出單冠服制度章陪六冠服古之衣冠皆黃帝之時衣冠也自後趙武靈王改為胡服而中國稍有變者至隋煬帝東巡使於畋獵盡為胡服獨道士之衣冠尚存故曰有黃冠之稱通天冠余所製也內用束髮冠頂用三台前南斗後北斗左右用日月上用捲雲之冠以纓繫之衣通天服則戴之謂之主冠非王者不敢用通天服余所製也服用玄色黃裏上衣下裳胸前用朱雀背後用玄武左肩用青龍右肩用白虎以表四靈皆用織金前用龍虎二帶下裳用十二幅以應十二月用邉襴所以取範圍之象乃帝王得道飛升沖舉之冠服也及奉天祀神用之非常人所宜也結巾余始製也以玄色為之冬夏各有二樣不拘紗帛自成一家製度不同於俗非王者不宜用雪巾余始製也以玄色紵絲為之以天鵝皮為裏凡雪天嚴寒皆用之以護腦雷巾山中道士燕居之巾野人冠服之屬古無網巾戴之以籠亂髮各則護寒以褁其首豈宜入朝堂見帝王而為禮哉山野修道之士不論貴賤皆戴之今之謭薄之士欲為自尊以為有直事者戴之吳草廬有雷巾詩曰山野猥慵可護寒豈宜褁却謁時官時澆世態非純俗反棄玄門正一冠正謂此也網巾古未有之自我朝洪武開創始製有也圈用大環不同於俗帽帽之製任用絁巾縵飾即同世用藤竹輕羅細紗裝之亦可漆帽如雲笠樣布台黑漆不用幕雨笠織竹箬及樺皮為之以禦雨露日光最輕省世以藤竹䔷根作之亦甚輕妙而嫌其太華也其大而置肩謂之簦此尤為修道全真雲水之用也雲笠頂六方上小簷闊用皂絹或紗幕其上以避風沙日色尋真問師雲逰用之野笠以竹為台用小槲葉鹽水煮過砌之於上以隔雨雪山居可用法服黃帝見天人冠金芙蓉冠有俯仰于上衣金星斗雲霞之法服執玉圭而前曰帝勞心天下為生民主可謂德矣帝始體其像以製法服為道家祀天之服上清法服紫青作帔紫於外青於內帔廣四尺九寸以應四時之數長五尺五寸以法天地之氣表裏一法表當令二十四條裏令一十五條以應三十九帝真之位爾者身佩帝皇之服故也無此服不得妄動寶經此法服給玉童各十二人不得妄借異人并犯厭穢輕慢神服女真衣紫紗之褐用二丈四尺身袖長短就令取足當使兩袖作十六條身中二十三條合三十九條又作青紗之裙令用紗十五尺作八幅幅長四尺九寸餘作攀腰分八幅作三十二條此則飛青之裙也無此法服不得詠於上清寶經此服給玉女十二人不得妄借異人并犯厭穢輕慢神服洞衣寇謙之所製袍經云鶴翅森霜之袍今世人襦之安下襴廣尺者其製與鶴氅同鶴氅凡道士皆用其色不拘有道德者以皂為之其尋常道士不敢用裘上古之世皆衣毛革道士多用鹿皮為裘取其仙之物後世多用狐褐襖襖者襦之異名自古有之凡出家之人及居山修道者既未能逃隂陽却寒暑故冝備此以禦風寒之用不可有缺半臂半臂之製短袖衣也道家用之以為灌花種藥之服也抱肚其制亦同世間者綿夾之厚任其所宜居山學道之年老者尤切用之汗衫汗衫刀近身之服最須洗濯潔淨使不褻穢可也短衫其制以蔽至腰者名為短衫山居野外所以便登涉之用古之修真者或指以為採芝之像也襡道經曰青裙羽襡龍文鳳衣古有明光飛雲之襡今謂綽袖耳蓋大袖而身短下裙之裝也學道者必服之裩渾如裙形兩頭各安腰及帶每日一洗易之修道出家之人夜暫寢息勿脫內裩大小綿夾皆須清淨常使香氣薰蒸免生穢氣袴單夾綿各時製洗易亦宜勤數臂衣衣之所設一取護淨二則禦寒修道之士不可缺行縢今謂行纏修行入山飛步特宜具之尤緊靴圓頭闊底之製古謂之靴履諸穢處耒皆勿登堂蓋人間所用山中則不宜矣鞋鞋以木皮竹苧麻葛芷等各任所為不當用結絲錦綵繡綺皮類過於侈靡則不宜坐褥道士女真體佩經戒符籙天書在身真神附形道氣營衛仙靈依託所著之衣名為法服神靈敬護坐卧宜清淨或赴人間不可將法身混同俗事凡人牀席穢氣稍多宜各作坐褥方四尺素裏帖緣若大德法師及具上法者用紫餘皆瓌色不得用綺錦繡𥁞珠絛帖絡其道士女真尋常敷設單祫坐褥以隔淨穢分别尊卑應須自隨不得暫離及登壇入宣行道就齋香爐坐褥亦帶隨之各宜自勉毋得妄用修真器用章如意黃帝所製戰雖尤之兵器也後世改為骨朵天真執之以辟衆魔仙鉢鉢之製甚古唯仙家雲水之士有之多用鐵為凡入山採藥採芝終日不𨑰可以炊飯居家齋堂用者皆以木淶為之陽燧古者以陽燧取火爇香降靈也凡修丹者皆用此火不用凡火故道家皆用之蓋火出於燧燧圓而火不圓參同契謂陽燧以取火非日不生光以燧向日以艾承之可以得火方諸水出方諸方諸方而水不方參同契亦謂方諸非星月安能得水漿其法以之向月以杯承之可得水也凡道家修大丹不用凡水故用此水震靈杖其全其皆用淨鏟為便於除糞也甚鄙之太俗余乃以銅為如意其簳長六尺下用鐵鑽有鈎搭挂包於上上挂藥壼丹經於如意之上自余始之卧具卧具皆用細布絹為之其出家之人卧被不得用緋紫青緑雲碧纈間褥錦綺繡𥁞珠條帖絡正與科戒相違不可用之褥褥之製所以却地尸惡氣也隨人所用若坐卧之褥但雅淡典淨而巳氊氊者非出家人之衣服蓋羊毛有羶穢之氣觸突真聖深宜慎之若入壇行道不用氊矣此道家科條嚴謹可知其常用雨具則隨人用之被被宜取輕細布作之不帖緣弦蓋以淡素不尚華侈也單即卧單也以輕細絹為之不須緣飾亦不用過闊枕枕用木或紀𣾰正四方作之不得斜曲為異形木履木履之製七魄化為龍虎伏在履屐之下今道士朝拜宜躡屐舄也散行則著屐令七魄有所棲也屐凡受受法者三魂五神之氣常薰於巾服之中七魄九靈之神常棲於履屐之下故上道之人勿令他人犯履屐弄巾褐者此也屧屧在浴室濯足處著之餘皆不得著履架凡履下皆有龍虎神伏夜可置於版簀牀杌上不得遽爾頓地學道之人宜持受道冠履衣服不得輕棄薰衣籠衣服常須香氣薰之務使芳盛香潔庶得登齋演法與道合真牀坐卧牀四腳長八尺正方高三尺巳上令絶地邪氣不得雕飾又謂紫玉榻三素玉榻高三尺離地蓋地尸惡氣五毒之薰常起一尺不然則煙翳形身心念不感徹於上聖也牀最為栖形之器大抵欲其高仰明潔也繩牀繩牀曲機蓋吐納導引安居穩便所前賢已有舊制常以白檀香作紫絳條裝其制亦佳道家之風清高如此席席宜用新淨者席有多種各隨時所有笙蕟之屬皆須清淨不限粗細任意置用梳箱髮者星辰之象也又玄雲華蓋血之餘也亦云髮者紫館之璚林腦神依棲之所而梳理有法道家故須立梳箱以貯乎梳也梳梳者齒之踈者以理髮踈通血液之要器也不可暫時闕之壯年老日始終梳理則有延夀之道也枇齒之密者除頭中垢穢用之以黃楊或柞木金荆作之大士適宜道家其骨角牙玳皆不宜用鑷鼻為天門氣之出入所由常當開通令氣流行則神眀隆也鑷以銅鐵為之所以拔鼻中毫也刷刷故用之除梳箟中垢膩以棕絲或馬蘭根等為之最佳剜耳杓耳者魂門魄户也使之清淨則魂魄往來不去身也耳乃皮之餘用金銀銅鐵竹牙等物作之以除耳之之垢穢也剔甲刀天騶甲卒之神在手之爪端甲者筋之餘道家皆以吉日剔之則三尸沉零穢惡不生故須畜其刀也以備修甲之用爪袋上清經所戒不得燒除爪髮博物志云梟夜收人爪置目中知金吉凶干金方亦曰甲入腹成病治之不愈按靈書經十敗不許燒爪髮或言鬼得人爪髮則繫三魂多魘魅以此詳之故爪袋不可不設髮袋身體髮膚不可毀傷梳得亂髮當作袋貯之多則理之不可亂自拋擲歷古所戒修道之士切宜記之箆登壇入靜皆洗濯手足整理鬢髮然後朝禮先須篦以沐略垂髮也牙竹木等隨宜製之澡豆袋世之去油膩者多方其沐浴所用皆不如烏豆麵也契作袋或盒貯之以備洗濯之用鹽盆齒者骨之餘常須洗濯口齒使諸陽聚首周旋口齒之間則自然通格神真也况鹽者凝血去風堅齒所以貯鹽末數揩拭之為佳拭巾梳髮之時須一巾藉腖復以一巾拭手面學道之人常須澡漱口齒剪替爪髮薰香清淨則神靈降附思念感通鹿反袋貯藥物之用雲水雲逰之士用之非鹿皮則不宜也水羅凡道家用水皆先濾過後用以緻絹細紗為之若粗踈物則漏小蟲不免傷生矣鼎鼎之制不備言其詳皆載於丹書而學道者首當究之不待載于此也釡古者有金釡九鼎丹釡之名凡道家錬丹藥用之盆仙家當用陶冶者為隹甕與人家用者同但以潔淨為用忌其葷腥油膩甑金釡玉甑之名修仙者有是名爾雅甑謂之甗又名鬵京洛用瓦為之即盆之無底者江淮吳楚以木為之嶺表人有截大竹箘作者以備蒸炊藥物之用道門所用亦不可缺瓶道經云玉京金瓶京洛間呼罌之小者之牙盤供飬穩便又作大圓盤安腳皆佳上𥁞飾雲華蟠龍舞鳳自鶴翔鸞之彩擎盒今世罍下安堂舉者曰擎上下相蓋曰盒並天尊前供養器具其類實繁注碗凡道士女真居處先須備澡盥注碗或盆器貯淨水舉動運為須漱口洗手其器金銀銅瓦任時所有皆安㔶蓋無使風塵蟲物穢之令其精潔尤非常器之比漱盤登壇入室皆清水漱口吐水壷盤中勿噀地上蓋奉天如奉君事師如事神也對經像不得涕唾漱口吐水高語大聲恆若對明君焉且奉師尚如之况經像乎登壇入靜不宜洗漱狼狽穢濁左右宜畜漱盤以隨之衆生食盤古制凡齋堂前置衆生盤臺每食所出之食使淨人巡行斂之然後散旋於外一者獻先二者薦地祗三者斷邪謂不出此食則鬼物兢侵毒入人腹四者慈仁憫念一切衆生同得法味普皆飽滿故謂之衆生食盤自鄭思逺葛洪諸公以來有此盤矣今不可玉笈靈文章仙道辨南極翁問於遐齡老人曰儒者謂神仙之説荒唐渺茫不足論也凡物之於天地也有為瓶瓶則罌甀之異名其用於人尤為不可缺也匿音旋去聲匿者竹器也圎而淺江淮間用簸掦簡擇米麥乎為匿箕者亦此道門山居之所不可缺箕京洛間以柳作之後勾而圎前方而綽用以㨂米麥者曰簸箕深廣其腹又竹作而蜜闊腹深肚大者名為篣箕楚人呼為筲箕炊蒸所要又曰撮箕帚几殿堂皆以細帚掃拂不得雜用仙家用騏毛鳯羽赤隨其所有耳其貴者用龍鬚江淮多用茅華京洛用穄苖各隨土所出也然上殿貴乎細膩者掃殿宇不㸸粗者皆用殿宇用者他處不敢用笊今世為𥭲箽也漉藥及米麥等俱為山居所用藇音郁古謂之竻䉛以竹為之狀如螺容三二斗漉米所用道士修真之處皆不可缺齊器凡齋醮天尊前皆有供獻隨時花果以盡虔心其器真所用並須清淨不得穢𢙣及非法之器皆不得上齋列供真誥云道士受齋之食勿令非士動之犯則尸注魄刑餓鬼來侵神也所以特立齋器者此也盤今卋所製之盤皆方大其下安牙腳謂榮必悴有成必改有生必死豈曰神仙可得不死而與天地齊年不亦謬乎道成而有沖舉升入天關列為上真不亦欺乎是欲握無影之風捕難執之影索不可有之物行不得到之路不亦難乎子學仙之徒也必知其説為我辨之老人曰吾嘗聞之草木皆春生而冬枯獨松柏而不凋禽獸皆有生而必死獨龜鶴而長年草木禽獸尚爾况人為萬物之靈其若是乎又若水性涼也而溫谷有湯泉出焉火性熱也蕭丘有寒熖出焉石況物也而南海有浮石生焉羽毛輕物也東海有弱水況焉此天地生物之理亦有不凡於常物者又若雉化為蜃雀化為蛤壤蟲假翼川蛙翻飛水蠆為蛤荇苓為蛆田鼠為鴐腐草為熒牛哀成虎楚嫗為鼉鼉能化虎蛇能化龍枝離為柳麥化為蝶楓化為人秦女化石此皆得天地之靈異世人之所莫測堅人之所難明此天地之所神其神變化之理有也又何况人稟賦天地川嶽三光之靈秀得其道者莫若草木無情之物乎且如甘矢以藥置于魚口烹於釡申無藥者巳熟而食之矣而有藥者逰於釡中終日如在江海又以藥摻於桑葉之工而銅蠶蠶食之經年不老又以駐年之藥喂新生之雞雛及新生之犬子終身則不長又以返白之藥喂白犬百日其毛皆黑此皆藥之神也豈庸人得其方乎此又知丹藥之可至長生之驗也又若黃帝煉九鼎於荆山丹成有黃龍垂髯下迎帝御八十一女乘龍上升群臣攀龍髯抱帝弓而上升者七十一人今星宿之次有軒轅十七星在焉共工氏之于勾龍爽者得其道上升南極今井宿之次弧南有老人一星在焉其傳説奚仲皆湯之相也得其道也乘箕尾而上為列星今尾宿之次有傳説一星在鳥女宿之次有奚仲四星在焉王良造父周之善御者也得其道上為列星王良五星列于奎宿之次造父五星列于危宿之次此皆天文之所載天象之所見明明日星萬目可視萬手可指豈得無仙哉且又以變化論之夏之世宫中女子化為龍復化為婦人商之世女子化為丈夫周敬王時女子化為丈夫漢哀帝建平中男子化為女人嫁其夫而生子漢獻帝建安中男子化為女人此皆變化之理有矣魏明帝太和間太原人發古塜棺中有一女子年及三十猶生出之妻其夫復生子晉武帝咸寧間琅琊人顔畿死期年聞其聲開棺視之如生晉惠帝元康中梁國女子巳聘其夫其夫戍于邉經年不歸女家以更適之女不樂而死乃葬之數年其夫還至其墓開棺視之女遂活娶之此皆死而復生之理又有矣死者尚可復生况生者得造化之妙豈得不仙乎此皆出於典籍班班可考也今又以畜類而論之龜千歲而五色具焉其額上兩骨起似角能解人之言浮於蓮葉之上千嵗之鶴色純白而腦盡成丹能登於木未千歲者不集於樹獮猴夀八百歲變為猿猿五歲變為玃攫千歲而不死蟾蜍夀三千歲騰黃吉光之夀皆三千嵗麒麟夀二千歲鹿兔夀千歲滿五百者其毛變白狐狸狼八百歲滿五百歲者善變為人鼠三百歲滿百歲者變之為白善憑人而卜名曰仲能如一年終之吉凶及千里外事蛇有無窮之夀凡人面鳥身之禽皆有萬歲此皆禽獸得天地之靈氣者尚能夀延千萬之歲而不死又况人為萬物之靈而不仙乎此皆出於志書之可考只以此而辨之神仙之説有矣翁曰終古以還未聞有是言也今聞子之言則可以破其惑矣得遇道難按真誥曰夫人離三惡道得為人難也既得為人去女為男難也既得為男六情四體完具難也六情既具得生中國難也既處中國值中國好道父母國君難也既得值好道之君生好道之家有慈仁善心難也善心既發信道德長生者難也既信道德長生值太平壬辰之運為難也可不朂哉論道緣金碧龍虎古經云凡宿世前生從夷狄中來者及從禽獸報緣中轉生為人者不得聞至道也其宿生不種善根不積功行者今世縱遇正道亦修之難而失之易也蓋緣分輕淺隨景而轉鮮見有所成馬修無上至真妙道者由其昔積功德行隂隲為人方便救人患難天地鬼神自然扶助贊襄方得遇至人易成易就所謂道有邪正遇之不難而守之尤難也鍾離子曰人求道易道求人難謂不得其人而傳也後之學道者雖專於道尤防邪教異端之外誘心不專一則去道逺矣可不慎而究竟哉論秉賦抱朴子曰命屬生星則其人必好仙道好仙道者求之必得命屬死星則其人亦不信仙道不信仙道則亦不自修其事也所樂善否判於所稟移易于奪非天所能譬猶金石之銷于爐冶瓦器之甄於陶竈雖由之以成形而銅鈇之利鈍罌甕之邪正適遇所遭非復壚竈之成也道有邪正在天地未判之先與天地並立化生萬有亘萬古而不息生民日用者皆道也故曰天生蒸民又曰惟天隂隲下民故為之正道是以黃帝乃宣其道自堯舜萬湯文武三伐之世所有周公孔子之世所行莫不奉天道正人倫有君臣之禮有父子之親有綱常之道此所謂中國聖王之道也故謂之正道非堯舜周孔之世所有孔子謂索隱行怪後世有述焉吾弗為之矣異端起而大義華也故為之邪僧義安問道晉成帝攺元咸康元年有僧義安問於陶侃曰世之奉佛者多奉道者少何也侃曰麟鳳不易出蓂莢不常生凡物少者必貴多者必賤如人之賢者常少愚者常多道之為教出五行陶冶之外得之者白日上升起天地以獨存歷萬劫而不朽故其教幽奧玄遠愚者難學非人不傳所以奉之者常少若爾之教止是一箇話頭於二三十年或四五十年靜中悟得謂之打破疑團蓋以色身是幻貴乎寂滅為樂大概不欲復生人間得阿羅漢果謂之不來果是也其法雖至愚下士人人可得而為之所以奉之者常多義安曰誠實論也故棄僧學道更名曰杜守靜此篇極説有理故紀之勾庚點茅太上丹竈鉗槌云勾庚點茅乾汞縮貨與賊無異不特害已而且害人尤甚故以賊名之可謂痛切矣而或有為者而甘心為賊貨悖而入者亦悖而出吾見其折盡前程終身益困而巳葛仙翁𥘉學丹竈時曾有人傳點茅之方用藥點銅非惟透白又且軟而不燥後見仙翁造為酒器皆就底鐫不堪典賣四字有客問其故則曰此茅銀也家雖薄無以備器用以代一時之用慮盜者以典以賣遂鐫而知之使不致陷溺矣仙翁晚年悉毀之後之修煉者悉宜禁革按宋仁宗景祐二年毫州僧人福清上言臣僧徒不務祖風悖毁本教皆慕長生久視之道希望飛升天闕乃傳黃老之道今雖有坐禪之名實非有觀心究性之旨內則皆竊道家煉身中之鉛汞以求長生久視外則修青黃白之術貪其財利原其所為皆是勾庚點茅乾汞縮貨為假金銀騙許世人取獲財利與賊無異不懼天譴不畏王法不避神誅豈是出家修行之事其丹道之事本道士為之宜也而道家知其丹經之禁戒天律甚嚴故不敢為獨臣僧家竊而為之操心險惡陷害世人破家廢産者多矣先儒所謂道家寶藏盡為釋氏偷去正為此也悉冝禁革帝乃下令道士敢有勾引僧徒貪其財物傳授道法及僧敢有不務祖風竊修道教私造假金銀點茅勾庚乾汞縮貨者悉皆遷徙遼西邊戍以備契丹自是丹道不傳下士者自此始論尸解人死必視其形如生人皆尸解也視足不青皮不皺者亦尸解也要目光不毀無異生人亦尸解也頭髮盡脫而失形骨者皆尸解也白日尸解自是仙非尸解之例也方諸國按真誥曰東海之外有修佛道者其國曰方諸其人以長生為道不死為樂其方諸之國其國四正一面長一千三百里四面合五千二百里故謂之方諸上高九千丈有長明太山夜月高丘各周回四百里其地草木茂蔚而華實有不死草蒨粲而不凋萬歲常青食之不死有甘泉水所在有之飲其水亦不死人皆長生其國有青帝君宫在東華山上方二百里中有天仙上真宫室在烏金玉璚瑶雜為棟宇又有玄寒山山上列為外官宫室周二百里中方諸東西二面各有小方諸去大方諸三千里小方諸亦方面各三百里周回一千二百里亦各别有青帝君之宫室在焉中有天真居之一云開闢有之矣莫知其歲其山出靈鳥靈獸莫知其名大方諸對會稽之東南看去會稽七萬里東北看則有湯谷建木鄉又去方諸六萬里大方諸之西小方諸之國多有奉佛道者有浮圖以金玉鏤之或數百尺而層樓突起其工人極孝而不死是食不死草所致也皆服五星之精日月之華晝服日光夜服月華讀夏歸藏之經用之以飛行大方諸之東小方諸上多奇寶甚靈異有玉酒金漿在馬青帝君畜積天寶之器物盡在於此亦多有仙人食不死草飲此酒漿身作金玉色常多吹九靈簫以自娛樂能吹簫者聞四十里簫有三十孔竹長二三尺九簫同唱百獸抃舞鳳凰群至鳴舞以和簫聲此國之樂也與西胡之佛法大不侔矣西胡之法謂吹大法螺擊大法鼓其樂不同况其法也𣵀盤經云生滅滅矣寂滅為樂是以生為幻死為樂方諸國以生為樂死為患也故稱佛法不稱佛道出真誥按文獻通考曰東海之外有浮鵠山者梁武帝時其山漂至浙東海中上有修道者女仙三百餘人皆三四百歲有二師各千歲其山出朱草以為席獻於帝言草中皆有赤鳥帝命繪其像乃丹鳳也旬日其山復浮而去夷狄奉道朝鮮之國自武王封箕子於其國其中國之禮樂制度衣冠文物醫巫卜筮皆在焉周人有半萬啇人渡遼水之説是也所帶中國五千七百八十八人至其國至今禮樂制度詩書文物皆在焉頗有中國之遺風非可與夷狄之邦共語也惜乎天道之祕不傳異言之域故無道教又按道鑑載新羅人金可奇者耻其國言語之鄙有夷狄之俗乃入中國習中國之言學黃老之道二十四年忽遇異人授以天心靈祕之要飛升變化之道於是精思妙道誦道教諸品仙經九年不輟天帝鍚以靈範於是隱於終南山至唐宣宗大中十一年二月十五日上表於朝言臣奉玉皇詔升臣為英文臺侍郎明年二月十五日臣當上升帝異之遣中侍視之其飛升之日居民環堵而觀者萬計皆聞空中神人之語曰新羅王尚仁柔多大德不以強凌羽侵鄰國之地無欺大國之心母遏中國之貢不尚戰攻而殘殺生民之命金可竒者新羅王之族人也上帝有詔白日沖舉升英文臺侍耶其新羅朝鮮耽羅百濟東海之濵所有國土皆有王以主之皆屬東華帝君所掌凡強國奪其地為屬郡遏中國之貢為巳有尚𢧐殺而殘生民之命者死乂九幽風刀考身萬劫不赦侵人之國工者子孫生則天殃其身死則為彼國之狗過刀砧百世以償之除勑各國山川之神往𨑰之報不赦獨新羅人有功於世故能上升天闕言畢忽聞簫鼓震空鸞鶴翩躚幡幢自空而下迎之升天而去以是論之新羅朝鮮百濟耽羅皆在東海之濵得天地清靈之氣皆可學道是其驗也皇南真人曰東海之濵其髙麗耽羅新羅百濟等八國其國與篷萊之境地脈海泉相接其人皆可學道學者皆能長生久視惜乎反棄東方生氣之國仙源之脈而奉西方金氣肅殺寂滅之教以死為樂以生為幻以金尅木之故自喪真仙道而不能長生久視獨新羅金可奇者知東方之國皆有仙氣屬春屬水其天地發生之所太陽所出之方皆可學道故入中國尋師問道乃得白日上升碧霞翁曰夷狄之邦福氣所薄其人宿生無有修積者善根淺薄不能生於中土故語言不通其道難以筆舌所言是皆口口相傳心心相授要在心與妙融道與契合故言不通故不可傳也回鶻之教按回鶻謨素兒馬儀教門之經漢譯其名曰太上老君往西域化胡得道天經曰人子之道在於忠孝既知忠孝要知身體從何而來乃是父母之遺體以成子身既有此身便要知孝道之理用於君必要盡人臣之義不敢悖乎天道其大道也獨主一元造化為天地日月星辰萬物之主至廣至大至尊至貴無極無一之道是以包含萬象萬教千門皆從此出故為天地萬物之母其為人也天之所生天之所覆只知有一箇天故曰奉天為教偈曰有物先天地無形本寂寥而為萬象主天道自昭昭以是論之太上之設教雖蠻貊之邦異言之域莫不化之以仁而教之以義備見於此矣故回鶻之人修其教者三百嵗者有之是其驗也故回鶻之人不悖其天而奉其教焉其教也止知有天更不奉其他神每日朝暮何天呌天而求福以手接之捫之於面揣之於懷謂天賜福矣此回鶻奉天之教也宋理宗皇帝御製化胡辨朕嘗觀滅儒道諸書胡人皆忌其老子有化胡之説言老子生於定王之世佛生於老子出關之前在昭王之日因與中國儒書所載不同朕以儒典考之通鑑內當幽王之世洛河竭有老子嘆河竭之説皆載之史籍矣幽王乃定王之十世祖也在定王前相隔十世之前何先有老子之名也又考之漢劉何所編老氏傳載老子在啇為西伯之守藏史又考之儒典曰老彭啇之賢大夫也又考之回回經書皆載老子化胡成道事迹以是推之老子生於啇可辨矣蓋當是時受天命而君天下者曰天王周以文王之德皇天眷命奄有四海為天下君其德澤化被萬方無思不服是以萬方來朝皆沐天子之德澤所致也其老氏乃周天王之臣也以天于之德化西出函谷化被羌酉其治教皆出於中國如言修道學道者道之一字乃老子所起既曰修道即老子所化而無疑矣豈非老氏之徒乎中庸曰修道之為教既言修道即是修老子之教也復何疑焉其佛也載諸梁武帝與昭明太子所編文選其佛生之日巳有證矣其文曰周魯二莊親昭夜景之鑑謂恆星不現也漢晉兩明並勒丹青之飾謂其教始興也謂佛生於周莊王之九年當魯莊公之七年佛法漢明帝時始來其教晉明帝時始興故曰二莊而生兩明而興此梁武帝命載諸儒典為天下萬世之證此萬世之公論不可改也豈非天意之有在是知中國聖人誕生之迹化胡之事天道有不可泯者矣鳴呼艱哉今故考之道釋二教函矢之生者始於王浮初為生因其聰慧絶倫衆僧妬之鴆之不死浮遂畜髮為黃冠升為祭酒因與僧家有隙乃攺古本化胡經增其偽説互相抗壓於是移老子生於㝎王之世移佛生於昭王之時在老子西化出關之前自是亟矢之生非一日也余謂其化胡之事不可憑道釋二家之書當以儒典證之則知何人為之立教為何人所化也其事見乎括地志四夷部魏略西戎傳陏史西域傳裴楷上漢桓帝疏及所注三國志崔元山瀨鄉記皇甫謐嵇康等傳范蔚宗書宋雲南行記唐太宗實録八學士議狀歷代帝王之贊唐玄宗宋光宗之序俱有載也皆出於儒書及見回回謨素兒馬儀經事之虛實昭如日星不可掩也此天下萬世之公論明矣吾復何言哉校其佛氏之教導之以慈愛黃帝之教導之以仁義老氏之教導之以道德陳之以忠孝孔氏之教導之以禮樂陳之以綱常此三教開化之本莫過止於一善而巳豈可以同藝相妬而相攻耶陮夷夏之不同風俗之各異而其為善一也自漢之先中國止知有儒道二教儒者尚以楊朱墨翟為異端而攻之至宋亦以濂洛諸儒為偽學因其各立門庭不循先王之軌轍也蓋聖人立教必有妙理如孔門尚謂理有未窮知有未盡聖人尚爾况庸夫俗士安能測識哉豈可妬其所長而毁天帝貶孔老而嫉之也是謂非聖人者無法此大亂之道也豈不然乎元學士吳澄諌追薦冥福按吳草廬文集其略曰英宗至治三年勑寫金字佛經既完乃命中書左丞速速傳旨令翰林學士吳澄撰佛經序傳奉勑旨曰寫經者專為追薦列聖為人主祈天永命為萬民祈福三事可作序澄曰主上寫經之意為國為民甚盛舉也惟追薦𡨋福臣所未知蓋釋氏因果之説自古未有蠱惑世人愚者莫不喜聞且國初以來凡寫經追薦之事不知其幾若超拔未效是無其理矣若超拔巳效是誣其祖矣撰為文辭不可以示後世左丞曰上命也先生請俟駕還自奏之英宗至柳林為御史大夫帖失弒於行幄帝即位澄泣告於帝謂祈福返至於滅身之速而死於賊臣之手梁武齊襄亦其事也其無益可知矣况追薦祖宗要皆往生西戎不願生中土誠可為萬世笑帝乃命道士建祈夀醮有曰朕昔荷祖宗之積德上天之眷命受天明命為華夏主奄有四海願與生民同躋夀域使無天札之災咸遂生成之德上帝好生允兹所請又建薦祖醮有曰朕聞人身難得中土難生朕祖生於朔漠受命上天朕生中夏曩者前聖皆薦祖往生西戎今復因朕所薦願使九廟神靈悉上升于天闕勿使往生西戎於是令天下諸省每遇節屇聖夀之日令道士禱天為天子祈夀為萬民析福薦祖宗升天其薦拔祈夀二醮乃命道録郝沖霄重編儀式布諸四方凡建國醮當依是理行之修真口訣凡服食藥物不欲食蒜及石榴子豬肝犬頭肉至忌都絶為上道士自不可食豬犬肉而交房中既令藥力不行又計食一斤損算百日子其慎之此彭祖弟子撰傳者凡服神藥勿向北方大忌亥子日不可唾亡精失氣減損年命藥勢如土出神仙傳凡道士求仙勿與女子交一交而傾一年之藥力若無所服而行房內減算三十年出青童君日訣凡修道之士服食勿食血物若食之使不能去三尸止可食乾肉耳見葛洪內篇凡學道之士有疾閉目內視使心火燒身身盡存之使精如倣佛疾病即愈若痛處存其火至必驗出神仙傳凡修道求仙不欲見死人尸損神壞氣之極人君師父親愛不得巳而臨之耳所以道士去世不事王矦是無君也塊然獨存是無友也唯父母師主不得不臨喪致感極之哀不要性命之傷耳苟以此故而傷是以無傷之也吾其祕之故口傳焉出神仙傳凡學仙者三月九日六月二日九月六日十一月三日是忌日若入室不可見女子六尸亂則藏血擾潰飛越三魂失守神雕氣逝積以致死所以忌此日者非但塞遏淫泆而已特以安女宫女宫在申男官在寅寅申相刑刑殺相加是日男女三尸出於日朱瞳之中女尸招男男尸招女禍害往來喪神𧇊命雖人不自覺而形露巳損由三尸戰于眠中流血于泥丸也若至其日雖至寵之女子親愛之令婦固不可相對昔先師但修此道而仙矣復不及至親無心者矣子其慎之凡修道之士夜卧側睡存斗覆身坐則存日在泥九月在臍臨卧兩手用雙雷訣閉氣提縮下部九次如忍大小便狀方睡如睡覺再作睡必屈二足則無走失之患切宜慎之凡遇甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席大有所忌凡山居修真學道者慎勿言有多為山神百精所試夜卧閉目存眼童子在泥丸中令內視身神長生升天昔劉京亦用此術出神仙傳凡山行必用雲笠以皂絹寵之以障風日塵沙冬則有雪巾鹿裘左腋必用鹿皮袋以貯藥餌丹砂拯生救人之物不可缺或步行用震靈杖以辟邪氣或乘騾則令童子挾其杖而後隨自是道人標格不與世俗同也凡山居有幅巾者俗謂一字巾以一幅褁於首布衲草屨長絛是山中幽隱學道之士所用也凡採藥入山未至山百步先却行百步反足乃登山山精不犯人衆邪伏走百毒藏匿出神仙傳凡行經山及諸靈廟祠間存口中有真人字赤靈丈人侍以玉女二人一女名華正一女名攝精丈人著赤羅袍玉女二人上下黃衣所存異乃叱吒曰廟中鬼神速來使百邪詣赤靈丈人受斬死衆精却千里此是三天前驅使者捕鬼之法出劍經神仙傳凡夜行先默念金光呪出戶存巳身之光籠罩其身念天蓬呪勤數叩齒以兩指捺人中上鼻孔內則邪鬼不敢犯若有鬼現形則曰吾奉天帝勑主管鄷都六天宫門一曰紂絶隂天宫二曰泰煞諒事宗天宫三曰明辰耐犯武城天宫四曰恬照罪氣天宫五曰宗靈七非天宫六曰敢司連宛屢天宫敢有犯我者女青有律勿赦復叩齒念天蓬呪則鬼逺遁百里魔無干犯也凡修真之士理髮及飲食施履屐枕褥勿令非道之士見其理髮干其飲食動其履屐用其枕褥彼俗尸魄形中之鬼來侵我神也所以道士棲山林而幽身者皆欲逺兹囂穢絶放人間之業是恐外物凡百犯其性命也祕之出神仙傳朝修吉辰章陪七正月元日天中節會之辰元始天尊登九玄天太極金書于天帝君太上老君降現昊天上帝統天神地祗朝三清東方七宿星君下降徐來勒真人於會稽上虞山傳經于葛玄真人初二日天曹掠剩下降𥘉三日太白北斗星下降初四日開基節玉晨大道君登玉霄琳房四盻天下
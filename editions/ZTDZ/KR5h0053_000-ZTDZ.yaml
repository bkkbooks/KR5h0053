嶽隍兵馬四品帯都督嶽凟兵馬三品帯節制九天兵馬二品帯紏察三界鬼神判洞天福地靖廬事一𥘉真受法必先受籙許𥙷從九品其正九品未受籙人不許任之一凡行齋醮雖有他品復而未受都功籙無祭酒職者謄誠不逹七品以上不受盟威籙不許任之五品以上不受洞淵籙不許任之四品以上不受神霄籙不許任之三品以上不受大洞籙不許任之一法與籙相湏不可相違天心法宜受都功籙五雷法宜受髙上神霄録靈寳法宜受紫虗陽光籙及靈寳中盟籙天蓬法宜受北帝伏魔籙天樞法宜受上清囬車畢道籙趙候南法自有正𣲖宜受趙侯籙一天心乃萬法之祖都功盟威緫二十四品先可進受一南北二院謂之文階雷司謂之武階初真先冝叅文由入武階易武階入文階難一五雷者天雷上天侍衞之司神雷雷霆號令之所龍雷海蔵之拱衞水雷雨澤之所司社令雷則名山大川精忠血食之神上奉帝命下親民事可以指役也一四司者玉府五雷使院中有玉府五雷使院真君乃雷之主專司玉樞五雷院及雷霆都司主行刑掌蓬莱都水司專司水澤三司皆緫扵玉府五雷使院諸觧送刑獄毋得僣紊扵樞府止扵雷霆都司其五雷使院額母得妄用一𥘉真受法湏擇當代明師行淳學正者拜之師亦當擇弟子委有道噐者授之先召保官保盟齋誠申狀取保應分曉方與依式奏申撥度授以神霄照帖及版劵等次與設醮謝師受將歸壇一如年内有功合該與循資陞擢即召同品法官保状繳由度師如前奏申付度非可慢褻若師非正學弟子躁妄苟簡行之仙籍未必紀名則天將不臨惟滛祠下鬼纂名妄興灾禍真司檢察貽罪非軽一初真受法有功及遷轉既投師傳受仍湏詳述始末年月師資姓名所職某法所積何功所遷該何品秩具伏投嗣教天師正一玄壇敷奏給帖庻得玉籍紀名神人皈仰其或不揣已功躐等以夸世及不務投師輙便詭撰階位妄加陞擢及有不經師付謾冩職階視同虗文有誤玄壇敷奏給牒有何効之科律照然戒之謹之幹運造化章三五飛歩罡品師曰三五之祕夫豈易知自一生二二生三盖三氣分而三光明三光明而三才具自太極生兩儀兩儀生四象四象俻而五行全五行全而五星明五星明而五嶽峙是以在道則為三清在世則為三才在神則為三元在人則按三部又在道則為五老在天則為五星在地則為五岳在人則為五臓人有天地貌分隂陽氣道俻一身而兼有之自不䏻使三田孕秀五臓納靈則去道始逺矣能修之者三田聚寳五氣朝元魄制魂拘神全氣滿是謂仙道貴生也不修之者使三魂為三尸五氣謂五賊五賊為五苦是鬼道貴終也是以天地之間人為萬物之靈故手指足履莫非合真歩罡之法所由生也夫歩罡者飛天之精躡地之靈運人之真使三才合徳九氣齊并一切鬼神轉旋天地一歩一指一轉一旋造化中全神明在左故一歩象太極二歩象兩儀三歩象三才四歩象四時五歩象五行六歩象六律七歩象七星八歩象八卦九歩象九靈乃萬罡之祖也師曰禹歩之法世皆失其真也盖世人多能言之不䏻得之得而不行行之不專故多不驗今世所行豁落斗乃三五禹歩之樞要緫河圖錯綜之数豈可軽視為尋常但所傳差誤而不能変化通靈余今特正其訛以傳其直師曰一氣分三號玄元始三氣分判則立三才人身象之清濁之体分為三部部各有神亦曰三田田各有寳故一而二二而三吾身之真也緫謂之三元元者大也首也故易乾卦謂元者善之長也師曰二五之神貫通天地緫歸一身運用之間有生尅制伏之法應期求禳謝則相生制伏驅治則相尅凡歩罡之際先運出三元五行之神然後跡履也師曰五行之祖氣是為五老老者始也祖也引五老之精為五星流五星之精峙而為五岳配人之身是曰五蔵上應五星中應五岳故神住其間五行五徳相生木生火五行五氣相殺金尅木上元属天罡歩上元罡呪歩天之精役使萬神上元蔽身唐宏將軍輔吾正氣辟伏魔神敢有害我還着本人邪魔見者化作㣲塵急急如律令中元属人罡歩中元罡呪歩人之精長陽消隂強我三䰟㓕鬼除精禍不能及灾不能侵中元𨼆影葛雍將軍領兵千萬来衞吾身急急如律令下元属地罡歩下元罡呪躡地之靈人道安全天囬地轉上魁下乾隂闔陽開正氣綿綿鬼不能害人不能傷天為我盖地為我載敢有加害押送魁罡下元蔵形周武將軍随吾所到速衞喜真急急如律令師曰凡有制伏㐫惡尅代灾危當先歩上元罡順例𨑰畢再入中元罡次変為下元罡若有制伏㐫惡則又変五行相殺罡尅制天龍鬼神随心感召萬無失一祕之五行相殺罡師曰凡有制伏㓙惡尅復灾危則歩此罡謂水能尅火之𩔗故臨時加治也如制伏火殃則歩金歩水至火制之餘皆倣此如後學未曉則准歩成罡而巳不必増損呪曰五行相㓕圡水相絶水火相㓕金木相伐鬼妖見者斬頭截脚魔王忍懼上下推裂敢有犯者永沉幽穴急急如律令此罡是金尅木木尅圡圡尅水水尅火火尅金也此制伐則用之五行相生罡師曰相生罡是木生火也一生一煞皆按水一火二木三金四圡五計一十五歩三五之道也呪曰五行相生萬事吉昌水木成就火圡相得金木同行禍変為吉鬼不能害人不能侵死者復生枯者復榮急急如律令禹歩九靈斗罡日月明乾坤配吾從天蓬入天内畧過天衝逢輔退反歸天禽與心對抱天柱𠔃任英㑹斗道通𠔃鬼道潰急急如律令師曰豁落斗也乃謂之小三五罡世多不知其詳亦以習見為常不知其玄妙也此罡可伏狂邪指揮鬼神破廟等用世多返用之今正誤矣斗要妙𠔃十二辰乗光明𠔃威武陳氣髣髴𠔃如浮雲七星変𠔃上應天知変化𠔃有吉㐫入天宿𠔃度天門合六律𠔃持甲乞履天英𠔃乗天任清泠淵𠔃可陸沉倚天柱𠔃擁天心從此過𠔃登天禽倚天輔𠔃望天衝入天内𠔃出天蓬斗道通𠔃剛柔濟添福禄𠔃留後世出幽𡨋𠔃千萬嵗千鬼萬神自囬避急急如律令師曰此罡世所行以出斗入斗相反用之所以不應今特正之則可以伇使鬼神驅邪魔道秘之秘之金光範圍罡師曰凡登壇闡事存巳身為神禹口念呪手搯訣從玉文起午文終足歩罡遍履天地之内金光繞身化形制魔口作唵吽吒唎之聲存面前虗空中有紫炁一團湏㬰見青炁自天而下冲開紫炁忽見雲中有金殿楼閣心叩頭三禮朝謁請奏如儀歩此罡當念金光呪一句一歩呪畢仍加斗罡禹王三歩九跡罡師曰存巳身立在禹鑿龍門之上在風霆雲氣之中承上帝命左手玉訣右手劍訣勑召萬神随事發遣搯訣師曰搯訣者所以通真制邪役將治事訣各不一罡訣有七百餘目今所用者不多四維八方自四指根逐節数共十二目以按十二辰扵内又分出八卦七星九宫三䑓各主其所行之事又當約而言之惟中指中文為玉清訣側左為北帝訣名大煞文此二訣總三界萬事宜按行之叩齒訣師曰凡叩齒者是集真而集神凡人体炁散心炁耗真炁不應湏用集之所以叩齒者擊動天門而神炁應故左叩為嗚天鐘右印為擊天磬凡制伏驅降用之至扵當門齒上四下四共八齒相叩謂之嗚法鼓者所以通真格上帝凡朝奏用之上下三叩成二十四通謂之鳴法鼓常當知此入戸訣師曰凡立壇有戸在東南乃巽地戸若靖中入戸則以靖門為戸舉歩從此入先扵巽上叩齒十二通心三拜右足先進左足随之先存功曹使者四人龍虎君二人立左右又存滿室青黄白三色雲炁次存香烟成五色氣直上至金闕前次九拜或心拜亦可燒香訣師曰先以左足入戸勿得囬顧囬顧則致邪當一念寂然存左青龍右白虎前朱雀後玄武功曹玉女乗吾五臟五色之炁竟上三天當一舉思之更無滯碍覺身中煥燠然㣲煖是真炁合徳也凡燒香並令烈火次多捻香入爐中謂之豊香豊者多也令烟炁猛一舉上逹無留滯若香烟断滅火力㣲𦕈不能超真逹靈矣應捻香尚左手左手者净手也右手親穢不可拈香也奏香訣師曰當存心無外思内無雜想只見目前皆是真光𣑽炁紫碧之炁彌滿前後一切不思直上十方香十方真炁下映與香烟接扵炁中防彿見無鞅真仙官君細雨宻霧来降各方次至洞案前見香成五色功曹符吏在空中巳身恍如升上三天親見三清玉帝叩齒三十六通嚥液九過然後依科行事師曰𥘉階入道性易流蕩則心疑不可示以繁文也扵簡易中存観妙在不言之表矣若能進品升玄自此而至嗣宗神仙不難學也啓奏訣師曰凡啓奏治病行符先存上丹田元始中丹田道君下丹田老君次三宫三真並如巳形先存下丹田内君與心中道君合而為一立在頂中如金殿中坐巳身跪拜宻奏所行之事立有感應朝真謁帝訣師曰小兆凡人也飲食男女其欲與人不異今乃得佩籙行法称為法師或星冠霞𥚑欲似仙聖盖心末寕一氣仍肴乱滛愛觸穢葷汚臊腥當知若何可以謁上帝扵虚無之表也苟無清明之法則不能感格反以招愆耳故曰雖有惡人齋戒沐浴亦可以事上帝此之謂也齋醮對越訣師曰凡醮中朝謁湏按儀式及身與心混融常存見金闕扵髙穹之上已身不覺在壇惟覺在九霄之上凡口誦心存絶一切妄想如此則大有感格非止外儀也祈請訣師曰宜扵常時数数㸃檢巳身入靖㸃坐不思凡俗之事氣宇既定頂中虗濶有金搂玉殿見天尊金容坐其中乆乆存之覺真炁映頂門嚮内㣲熱此常時訣也有事之時亦如之存運巳身恍然跪于天尊前黙禱所祝之事萬無不應此宗師節文訓後學之士𥘉階此乃升堂入室妙訣宜祕之毋泄凡俗也書符訣師曰書符者惟要心定不思外事又要㸃紀散形庶㡬下筆時神不走炁不亂若對本念誦下筆成符眼動意随心馳筆亂必不能感應湏心與符一符與心俱取炁不必囬顧吹炁不得作聲下筆書符謂之自傳喜神盖言心定而端的也後品亦言之甚詳凡𥘉階先宜知此玉堂直指師曰玉堂乃天心祖法之内袐萬法之所宗三界所仰自漢天師以来獨傳心印别無雜術惟正而巳正者不邪之謂歟天以正而覆燾地以正而載持炁以正而運行鬼神以正而役使人以正心而正身心不正則邪念生六慾起流為禽獸沉為鬼爽在世不正身為姦邪為悖𨒫道不可入真仙之閫域也今玉堂大教之出世原扵正一天師正則不邪一則不二嗣吾教者有五等凡在世厭塵希真之士𥘉入壇受天心正法十卷行之三年無軽師慢道之心無始勤終怠之念則許再詞受階七品行及無過進二品佩玉壇正品印受髙奔玉京行及一紀驗得即非編庻市井庸流及不是輿䑓皁𨽻𠜇胥虐吏及非是宫観愚蠢𥨸食方許傳付無上宗㫖二十四品并三奔寳籙玉堂三景之印玉景陞堂之印為嗣教支師支者分𣲖别流之謂也此傳不限名数但係有官君子儒墨俊士皆可佩持禁傳市井道流也今世道流多是無告困極四民不收始投名進納黄冠盖非本心入道恐軽賤玄文遺失秘㫖罪罰不赦巳上係四等傳度獨扵苐五等係的傳系代嗣師帷正傳一人付二十四禁典玉書付宣和斬邪劍降真制魔之印經三十年方許傳代今以𥘉品𥘉階傳度其文省其用簡人人皆可奉行亦可望洋扵玉堂也登壇之日弟子肘歩齎信誓詞雖官髙位貴不得慢真侮道當九拜盟壇而受也從此佩玄㫖不違師㫖自此登神仙路入希夷之門也若或不遵此訓妄傳軽受則三官紏愆四司録過天司示憲七祖受報扵風刀考身充役扵長夜萬懴不洗千真難贖在謹扵傳付而巳夫行𥘉品宗㫖口傳心印計二十事一日當䖍謹修習漸與世事相踈不得混同塵俗作諸不軌事乆乆戒行昭著當次第傳度也一存服欝儀結璘之炁惟勤扵存運乆而真炁灌注嘘呵成真不待容心而鬼神畏服矣既受法巳畢當以大道為宗祖動心正念勿起邪心一毎旦習誦真經秘呪蚤作奏香㸃而存之不得出聲惟心相應不可以事奪而失其常規也一遇有㐫邪惡祟害民者當一准正教務在必行若有畏心及有謟心反求吿扵鬼神者是執心不專得罪至大三官紏罰不赦不原一當以正念役使天神將吏不得稍用血食以雜靈炁違者三官罰罪一當以三光為主盖三光者天地之眼目陰陽之根本造化之宗祖當存心運真與帝真三景相混為一不惟制伏三界束縛魔靈則自巳身有光明萬神畏伏辟尸逐病得道長生以入仙真矣一日存三光而服炁夜間存斗以斗罡使身與神為一神與身同炁神炁混融方可為嗣教之士矣一當先行三八謝罪之法凡半月一節氣當出身中官將拜表存修如本法行之不怠則身為無過之人始可言嗣玄教一每日服三光符以俟感應一戒在滛怒常以慈善應世割己周人不得攻師伐本妬賢嫉能口是心非嚚訟争闘素或有之截自今日攺行率徳常以一念逺財利去姦謟寡色慾持齋守戒為心也一凡奏香時存五色炁自五蔵出結為華盖上通空玄上帝在空中彷彿瞻見如此則所奏必逹也一凡書符當入室存定染筆成符閉息心呪不得作聲握固勃然有勿犯之色身正而心正心静而神應矣一當以一真合道當離一切外事勿得千心見物莫生貪念當思世事無常惟道長乆當在一真則虚無當應一靈矣一毎出入當存天丁將吏功曹玉女右左羅列座下邪不敢侵正炁縱私動止存之如故一如毎月十直庚申甲子本命三元三會朔望八節五臘當異𥨊思真常能各居敬如賔友則尤為至妙一不得内藴狡賊之心外示慈詳之態不得貪非巳之物應營求當以義合得之違者許自省愆攺行謝過不許重犯忌之一事父毋以孝不以貧冨易其心順奉常令喜恱一咈所親之意是謂不孝不孝罪大無所貸原一父毋殁當随力精思祈告上帝㧞度岀幽上生天堂若父毋不出幽隂自巳仙功亦不能成矣一兄弟宗族外親逺戚待以和好不許各黨其一而生事生嗔怨以失骨肉之恩違者三界鬼神不伏使役冝謹之一當行規矩凖䋲之内存心一有不合冝事随心攺正期與聖賢比肩不可自卑常萌妄作之心醮事儀範章太乙齋帝王修之以展禮配天也九天齋金籙齋國家建之祝延國祚也玉籙齋修之以保祐后妃六宫也黄籙大齋皆有品第要當叅考成法勿得女為之其士庻所建止可謂之醮儀河圖玄靈等醮緫有数十名目皆醮也古謂醮者祭之别名也降天帝致萬神莫大於醮一國家建醮有三日七日之儀按靈寳經齋法凡二十七目杜光庭醮品有七十二等皆國家所用如三洞品格俱有定式一官民士庻之家設醮齋止以一晝夜為則亦有建三晝夜七書夜者不無亵凟反為招譴如官長尚不至於士庻之家經宿乆留况上帝髙居九重下臨凢俗豈有經三七日晝夜而不𨑰乎今定醮例凡修醮一日先陳設至期則以黎明肅啓深夜觧散庻㡬不致瀆聖也其科儀品格載諸玉宸玄範行移等書臨事取而観之可也一開壇建大醮必湏洞天福地宫観之中為上其立壇湏是方位端正坐北面南如宫観元有壇䖏坐向方位或偏别净宇下依式立壇行事亦可一凢建醮湏是量力所為冨則備物貧則随冝所巿醮需母用非義之財及與人争較價直之物及力有餘而苟且營辦力不及而勉強經營者皆為不誠難於感格如齋主係忠孝之家誠殚力之師為代出龍繒之属凢事從省應干文字醮獻等亦自然感徹矣一醮儀中修用存思詇法並載幹運造化章其樂具仙仗見天樂儀仗章更不扵此詳註一文字行遣俱依玉宸玄範行移所行及酌叅古式檢目用之如奏帝尊前用奏状餘並用申状神司用公牒之𩔗一奏状並稱臣申状称名天樞院状称本司前用司額関帖牒等称當司一奏申状前空一掌後空兩掌紙髙一尺四寸餘則用展劄紙為隹醮請獻状止用状𥿄如式一奏状内聖位並用黄簽帖臨時書填一奏状前帖黄髙三寸二分濶二寸四分或髙三寸六分濶三寸為則分單行冩貼黄後合縫䖏書臣名用印一奏状内倚黄用小黄簽側貼太𡻕下古式如此今少用一奏申状可漏單聖位者用黄簽側貼兩位三位四位者用稍濶黄簽當中貼三位五位以中為尊兩位四位以右為尊聖中冩䘖前及聖前或止冩最前一位亦可下界神祗状用白簽在人審而用之一奏申方凾面上並不用貼黄亦不称臣止書姓名章詞表外凾同此如申状内聖位多者方凾止題最前一位一奏申状上帝状称道慈勑㫖帝尊称聖慈𧇖㫖二后称宸慈聖㫖三清四帝称陛下二后称殿諸帝尊稱御前諸真称聖前下界神祗称神前治前之𩔗一牒関劄後並批朱公牒書名押字関劄只押字牒皮正面上書謹字中印法階書名押字下書封字用二印背書司額牒上書主者用二印関劄正面印法階只押字下書封字前用一印後用一印奏申状並半年用印合縫者書臣名後用一印可漏下用一印方凾正面上下通用三印凡牒関帖牓等押字並用印公牒并榜太𡻕一行用四印前用三印関劄半年用一印凡用印並從後起一符簡告文年月一印可漏正面用二印後用一印一符文作方凾發者依方凾式用印一奏状及上界申状用三炁飛玄玉章或用都天大法主印方凾兩頭一同或用通章印正面用靈寳大法司印中下界申状用靈寳大法司印一長生符用元始一炁印救苦印用青玄救苦印玉札用玉魁司主印凡符文属玉清者並用元始印属東極者並用救苦印属上清者並用三天太上印一章表並用九老仙都印青詞用三炁玉章外凾同奏状式用印當中用三炁玉章兩頭或用三天太上印或通章印亦可一書章毎行十七字相去一寸四分乃為一行紙髙一尺二寸書表毎行二十四字為則紙数及行数要合竒数為佳前空兩行後空三行依常式書一書青詞與章表同格不拘字数前空一掌後空兩掌為則可漏用黄𥿄三寸套封外用方凾一書奏申童表等專擇静僻一室中設香案母令外人得入書冩人湏令沭浴更衣入室凡書章奏等並用𥿄遮護兩頭母令衣着其上務在至誠嚴㓗一冩奏申文字不得以人姓名與鬼字為首不得垂生露死抽破人姓名一齋官上奏有官位具官無官称奉道弟子若父母之䘮則称孤子哀子是不忘古人之規範也一冩文字之人到局日便令沭浴浣濯衣服務在清㓗方可立局下手繕書冩人并幹局人不許歸家宿食别委一人與之供備飲食宿卧去䖏仍專委一人掌管書冩如有錯誤不許剔𥙷並要冩換一副母得苟且一髙功法師湏備受三五都功籙正一盟威籙靈寳中盟五法籙靈寳十部妙經及行靈寳大法方可依科修建如止受都功盟威二籙靈寳衆經及行天樞天心追攝錬度等法亦許攝行奏申儀中称靈寳太法司去䖏及齋科称盟受三洞寳文玉字金書等皆合随文換易一法師止受都功職籙及昇玄陽光洞淵等籙却不受盟威籙或止受都功職籙及中盟五雷法籙不受盟威籙或止受都功籙及上清籙不受盟威籙或止受都功籙不受盟威籙或止受盟威籙却不受都功籙並不許開建靈寳齋科盖出三五正一官吏二籙不備受則出官有碍皆不可行齋事一都講以下之職亦湏備受三五正一靈寳陽光等籙方可同預壇席一請同齋道衆湏是平日耐扵拜跪甘扵淡泊專修香火不貪貨財方可結立誓盟俾登壇席要與醮主各殚誠慤祈叩穹旻以昭感格若只務声音韻羙注念不專非惟枉役精神虗費財寳切恐反遭咎責勞而無功修建之法全在擇人不可不謹一執威儀道童湏要先習歩虗詞舉唱華夏吟令熟登壇旋遶時随聲讃詠一建醮當竭誠恪營辦龍繒璧劍之𩔗務在精好香花油燭一一所需並要㓗净不使穢觸若臨用有缺則反招譴矣凡設醮以精專為先龍繒為上香燭䖍㓗次之苟若有一闕亦醮之瑕玷也修奉之士尤宜謹守一若停枢在室不宜開壇建醮如屋宇深濶䘮在别䖏不干壇界亦可修奉若有生死厭穢未經觧除者亦不敢扵家庭建立醮壇深宜戒之一燒香不得用灶中灰火焚燎錢幣等不得用油燭燈火㸃發天心玄秘章昔元始天王懸黍珠扵黎圡命皇人以演洞章太上老君陞玉局扵成都張道陵而受經訣道法四十二壇醮科七十二等流布塵寰宣揚教化後之歷代嗣教之士積功累行與道合真心動神随法靈教闡是以道法符章分枝異𣲖延蔓繁多流傳于世法術有三千餘階不䏻俻載今以一二畧舉其大㮣耳天醮一十四壇黄帝醮告章曰凡世人禳禱祭告薦㧞祖祢及禳灾救病除道家奉天之士有祈天醮告之儀其後非奉道教者若有禳禱薦㧞之事止許召請城隍社令圡地地府𡨋官母母請天帝神祗是以雷霆乃立斬勘之司敢有非道教奉天之士而冐干天帝者斬神誅魂奪𥮅㓕夀可不畏乎金籙普天大醮三午六百分位玉籙周天大醮二千四百分位黄籙羅天大醮一千二百分位大乙醮九天醮河圖三十六天醮玉匱盟真醮靈寳自然醮洞淵三昧醮消灾醮禄馬轉案醮九幽醮迁㧞醮報孝追薦醮按道門定制云金籙玉籙黄籙三醮聖位醮状分数巳有定式其常醮有四十八壇奏獻錢状或設二十四分三十六分四十二分六十分七十二分一百二十分二百四十分三百六十分位醮事之禮像世威儀道在人弘不可執枸道法三十九階靈寳度人上經大法無上三天玉堂大法清㣲元降大法清㣲神烈大法上清天心正法北極天心正法靈寳六丁秘法魁罡六鎻秘法三辟五觧秘法六甲祈禱祕法貫斗武侯秘法玄一五雷秘法恊神五應秘法𣑽氣雷法上清靈寳大法玉清真王紫宸大法净明忠孝道法五雷考召大法玉清緫攝法五雷斬勘法洞玄祈禱法先天一氣大法回車畢道正法九老伏魔法天地教燈水法混元攻氣法紫庭追勞法飛神謁帝法通章大法六丁六甲遁法掌心雷法祈晴禱雨祈雪法㔶盖法五雷法靈寳法天蓬法天樞法趙侯南法結旛祈禱法考之道法各有傳𣲖不一今以世人多行者録之及有天雷鄷嶽諸將之法其名繁多難以盡述錬度法七階清㣲煉度法太極祭錬内法玉陽祭煉法净明一暘煉度法靈寳錬度法玉宸經煉法三光煉度法告斗法一十四階清㣲玄樞奏告太乙火府奏告灌斗五雷奏告玄靈觧厄奏告清㣲紫光奏告神霄奔宫奏告清㣲祈禱奏告神霄火鈴奏告净明奏告璇璣九光奏告允天奏告孫真人竈告開雲現斗奏告擁雲現斗奏告天髄靈章大法一十二階混天法此法䏻開天門役使天神住日留月変晝為夜夏雪冬雷移地法此法䏻指地地動指山山揺指海海竭晝地成河移山塞海降伏鬼神萬勝法此法䏻令决勝無窮変化章木金石皆䏻化人𨼆體藏形降龍法此法䏻乗龍飛空変物成龍騰雲入霧躡氣凌虗伏虎法此法䏻伏虎豹一切猛獸蛇䖝起雲法此法䏻興雲起霧化生五色祥雲駕雲昇天逰日宫月府去住自然生風法此法䏻生萬里威風行船遇㓂起塵迎敵吹砂走石障蔽太空随機而應伏刃法此法䏻使刀劍自碎入兵不傷萬刃不于如遇賊㓂䏻禁止刀劍不䏻出鞘弓弩反折不䏻為害变物法此法䏻生一切草木及乗駕空中䏻使用木人木獸從波法此法䏻使山陵変湖漲溢江河㴞天之濤拍山之浪興雲致兩躡波渡江入水不溺烈暘法此法䏻生烈火巨𤔵燒天焚營燋寨蕩㓕妖邪神火一過萬禍俱消長春法此法䏻頃𠜇生一切草木五穀𤓰果蔬菜之𩔗䏻変土成金化石為玉𨼆身入圡前十二法上天秘傳之靈文出世𩀌塵之妙法必遇天人授受方得行之縱得其書𥿄上虗文枉勞心力玄圃山靈金籙大法三十六階發籟震霈𦈢覆星决雲壅水凝河㓕火馭雲震陣伏申出泉火箭結華隂草木化人坐馭水行起光𨼆質変物附夣祛毒禁唇斬妖怪金剛札無碍通神行無盡丹不竭壺水火瓢盆取魚煑水石佯死飛空住𥿄鶴飛銕其身入壺玉虗天書大法一十八階𨼆形蔵體驅神入室逰魂三界超脱生死借屍火假屍體水假金假火假木假圡假木牛流馬不用火湯缾自沸喝石石行煎泥成金化銅鉄為寳移𣗳移物可至千里木雞報曉泥犬吠夜通靈秘術大法一十六階変化附夣変形空中飛行入石壁𨼆形救死囬生夜行不照燭長生不死呆賊不去縳賊自至役五通追萬物招神穿地㝷尸神恠耳報通天寳籙大法三十三階長生乆視延年益夀昇天入地出幽入明神逰月宫一葦渡江千里神㑹借潮生風其舟日可至萬里投胎奪舎日行萬里躡鴻毛騰空騎草龍飛空煎泥成金九轉靈舟乾汞成銀㸃銅鉄化金銀養砂澆淋湧泉丹頭縮貨成寳糁制㸃化靈砂寳𪔂㸃辛為庚召鶴圓光附体舞仙童過隂追攝降筆太極鵉筆架鵉懸絲鵉封匣鵉道門官制章國朝品級正二品嗣漢天師真人正六品道録司左右正一從六品道録司左右演法宫観提㸃正八品道録司左右至靈從入品道録司左右玄義從九品道紀司都紀未入流道紀司副都紀道正司道正道㑹司道㑹真人漢張道陵以天師賜號真人唐李泌以承相歸道賜號真人加正一品余酒周成王時以彤伯為祭酒以主親属後宣王時大祀南郊以仲山甫為祭酒以主祀事故後世以道士為祭酒之職以主郊天祀事之禮以統道教此道士有祭酒之職自此始道官周穆玉以道士髙栱宸為祭酒祀元始天皇於尹真人草楼此道官之始也道録宋太宗増道副録都監首座通舊為入員巳上緫知教門公事道封後周武帝時衞元嵩封蜀郡公盖道士受封之始也葉法善玄宗時亦封越國公道贈唐王知逺贈昇玄先生葉法善贈金紫光禄大夫越州都督道士之褒贈盖自王知逺始也道謚陶弘景羽化梁帝賜謚正白先生此其始道紀老子曰䏻知古始是謂道紀故以僧官設僧綱道號黄帝称牧馬童子曰天師始也漢張道陵亦有天師之称道家立名立號皆取老子道徳經中之㫖道字玄字妙字今非中國之教外夷皆竊取之衣紫唐李必生而神靈自孩童時身軽䏻舉母嘗聞空中絲竹之聲恐飛昇而去母以葱蒜為汁洒其首後代宗時拜相時李輔國專政常妬之泌知其不可久䖏其位乃告歸𨼆乞為道士帝乃賜紫衣金𢃄之服道士赐紫自泌始也黄冠道士黄帝内傳曰凡奉天道者曰道士周穆王扵尹真人草楼之観召幽逸人祀其香火以奉天帝謂之道士此道士扵宫観祀天帝自此始盖道士之衣冠皆黄帝之衣冠故名黄冠所行者黄帝之事所言者老子之道故名道士不異服非先王之法服不敢服不異言非先王之言不敢言不去姓不忘親也不毁形不忘孝也以道為教不悖天也不事外教不悖土也以中國人奉中國之道是体天之道因地之利以修身也故能飛昇冲舉慿虚御風神超物外上朝太清得造化之妙與天為徒可以通天地之靈格神明之徳役鬼神驅雷電致風雨握星辰斬邪精消疫癘致太平此自三皇開闢以來試之驗者也道之為教見扵此都監隋文帝始以玄都観主王延為威儀之官如今之監齋之職是也周避諱攺為道録監義宋真宗時置首座監義分領本階事上座宋太宗始之法官漢張道陵始有驅雷役鬼之事行其法者曰法官赤文天律章止取生人所犯天條者録之其鬼神所犯者不録見女青天律一法官四季天地赦日不得行符呪水看閲條律違者先滅一身後殃九祖一法官行法並陽行隂報不得始勤終怠違者滅身殃及九祖一行法官𥙷奏弟子衘位籍注左判官方許𥙷左大判官次許補右大判官違者並各徒九年知而保奏者並各除名㓕身罪殃三代一法官及道士俗人六戊日而燒香進章上表関申天曹者㓕身知而故犯者殃及九祖風刀萬刼不原非佩籙者滅三等一行法官非斬鬼而口中非時称急急如律令者㓕夀半紀一行法官篆符而以筆頭指左者徒九年知而故犯者㓕夀一紀一行法官敕水而以水盂左轉者徒九年知而故犯者㓕夀一紀一行法官妄以正法示之非人者㓕夀一紅一行法官不得私祀鬼神惟二月八月祭竈違者徒三年故犯者加一等一行法官所在去䖏見水旱盗賊若為害扵民者狡猾之人許令立便申奏待天譴誅戮違者徒三年若差官誅戮而其人不如所申狀内之意者加一等若有人果如申状内坐說者加二官一行法官行持不精到䖏行役神吏不擇𥿄筆便冩符敕水者天司奪飬道之資令使見身窮窘一行法官非時妄動䄂吏侵害生民者㓕夀半紀一行法官無故不得妄入正神廟宇及持正法而妄擒正神者徒二年如是法官出入正廟前後不迎送加辠者非一行法官受民間詞状而不能即時行遣者徒一年如状不合格式者非一行法官出入見民間私𣏌邪神滛鬼者仰即時遣神吏擒縳依律断罪如或見聞而不根治者徒三年一行法官持齋奉戒而或犯者徒七年一行法官被人陽病而故意行陽符隂病而行隂符或左煞而右生有傷扵人徒九年如未有昭報不辨隂陽者非一行法官妄以行法増崇一言毀及同寮應行法者徒五年如辨論公事曲直及探正法而争者非一行法官妄以正法傳之非人意求財利者减夀一紀一法官職列七品者録功不書過若能進章表知其官職恃而作過者减夀半紀一法官以正法而為戯者徒三年一行法官被民間請符乞水而妄以人情艱阻者徒六年被請符而反軽正法不給付者非一行法官篆符故意倒書横冩及朱書不從左墨書不從右者徒一年一行法官奏弟子傳法度師北院岀官者令從北院計衘南院出官者令從南院計衘違者徒八年一行法官奏弟子傳法看其人心術正方可保奏如或人情或以勢力而乱奏者並各徒三年若得其人者補三官一行法官奏弟子名姓用庚申甲子二日保奏不論有無品人並得参佩正法及便宜申請令入四五品官者聴一行法官非庚申甲子日而輙欲申請非次遷擢者並各徒九年再三申請者减夀半紀一行法宫傳弟子正法者湏得巳身佩受一千日外方許保奏違者除名落職徒三年一法官傳受弟子正法湏得給統兵印并都攝符令其統制䄂吏驅役鬼神統兵印文仙都搃攝之印作兩行疊篆都攝符即三元符也以黄絹篆之扵符兩節冩墨敇給付某人收執驅斬一切神鬼後度師冩姓名僉押違此者神吏不聼傳法人驅使遂為虗設非徒行法無益又且天譴必臨一法官傳受弟子有始而無終者不盡其所學者徒九年如弟子學而有始無終者亦如之知而故犯者加一等若弟子而不問師而不傳者非一法官傳受弟子不問男官女官並湏得人而傳不得妄泄違者徒三年一法官說話口是心非者徒二年如事出不得巳者非諸法官妄以巳身尊崇斥叱弟子者徒三年一法官見世間有異常人者許令上章表或申狀被坐此人所為外凾上冩朱表不下天曹直進太上御前以待差官超擢填上元八品仙官見缺如是常日章表申状而不經諸司檢驅者徒八年一法官傳受弟子秘訣而𨼆真出偽或傳而留一字或呪是而訣非或訣是而呪非者徒六年知而故犯者加一等一法官職列仙卿者許奏斬伏魔等使違者准前律一法官職列帝君品者許辟奏五嶽四賣等官及充替應有司仙官鬼官者許一法官職列髙真者許奏洞陽等帝君違者准前律一法官職列上章典者許進章表違者徒六年一法官不受都功籙者不得申黄剌及進章表違者徒三年知而故犯者㓕身或不知者積罪愆貫盈差三官追取令使萬刼受罪或入石炭等獄一法官職列七品不許牒天曹并五嶽及六品官方許違者减夀半紀知而故犯者加一等一法官職列南司及品官者許令其便宜申奏一法官職列北司及品官者許遷入南司從别計衘違者除名落籍舉過不論功一法官職列九品者不許牒地司及八品方許違者徒三年一法官職列八品者許奏左大判宫違者准前律一法官職列五品者許奏七品官職違者准前律論罪一法官職品者許奏從六品官職違者准前律一法官職列四上仙者許奏上宰違者准前律一法官職列真人者許奏使違者准依前律一法官職列四相者許奏仙卿違者准依前律断罪法官職九天諸使者許奏仙卿違者准依前律一法官職列諸司君者許奏上宰及真人并判鄷都等使違者准依前律一傳法人見度師純懐精粹不以師禮相待者徒三年說謾師保者徒八年知而故犯者加二等一法官不䏻相思扵人責望弟子𥙷報其功徒二年一法官有功扵人而自稱說者徒一年一弟子妄罵師保者减夀半紀知而故犯者加一等一法官以勢而欺辱下賤及不孝父母者减夀半紀一法官行符呪水符篆未曉者湏得務求勝巳之師問之如或未曉為曉未通為通妄以已勝他人者徒三年一法官進章上表朝禮而失儀减三官官卑者徒九年一法官道士俗人為人設醮衣冠不整肅而輙登壇者减夀半紀茹葷酒者永入鄷都七祖受罪如未開壇而登壇者非一法官道士行持㓕裂為人関奏進上表章而不如式希求財利及不至誠者减夀半紀知而故犯者加一等一法官道士入壇関白章表言語重疊及朝禮非儀存念雜真并以手觸天門先以右足登壇者徒三年一行法官道士申状内坐說某時拜上朱章而非其時者徒九年一法官道士受三洞大洞籙經者不論天下極品仙官及鬼神並可指揮驅使或受經而無籙或受籙而無經者同一法官道士䏻以秘文呪法而身歷天曹進章上表朝禮上真者湏得經諸司取禀然後方得前徃如官及七品者非得經歴諸司者聴違者除名一法官道士能以太上秘文呪訣進章拜表得報應而泄人者减夀一紀一法官道士進上章表惟天樞院申状玄都黄剌章表頭上醮意不得差錯一字違者醮為虗設章表不逹上醮官関奏名各徒五年一法官道士列衘差錯及冐稱官位者减夀半紀一法官道士俗人受正一籙者方許関行文牒及申黄剌違者徒九年一法官道士拜表上章而不五重下封者徒四年一法官道士申狀不合稱臣而稱者减夀半紀知而故犯者加一等一法官道士申状合稱臣而不稱者徒三年知而故犯者徒九年一法官道士進章表醮意不得過一百七十六字違者並各徒四年醮詞冐凟聴者同知而故犯者加一等一法官道士為人申章進表湏得如法其餘醮筵随力建功請行法事如或貧窮下賤力所不及一燈一花亦自足矣但不至誠者徒五年一法官道士設醮登壇而下恭謹反語𥬇喧譁斜目曲視背立唾痰呼童呌僕不以臣禮者减夀半紀知而故犯者加一等一法官道士進章上表而不合格式者徒二年錯二字者加一等錯二字者不逹髙功醮主並徒九年一法官道士進遷㧞章只填金籙白簡八十副黄籙齋只得奠簡八十副進八十一說章只得奠八百副過此数副者並不執用醮主関奏並各徒九年知而故犯者加一等一法官道士不及五品已上並不受都功籙而関行女青詔書追魂者减夀半紀知而故犯者加一等一法官道士官及五品而行詔書者湏得朱書牒内云伏覩混洞赤文女青詔命許令告下十方無極世界禱官之庭遷柭亡人進人道宫以副太上好生者如違此語詔書隂界並不執用関奏醮主各徒三年一奠簡毎面長九寸厚二分濶二寸四分正而冩呪背面篆符外用青絹或紗盛之如力不及𥿄亦可用違此式者南昌地府並不許執用遂為虗設関奏醮主並各徒二年一民間設醮不得燒檀香安息香乳香但只以百和香則上真降鑒有力者燒䧏真香足矣違者三代家親責罪巳身受殃法官道士减夀三年一生民毁謗正法背正向邪者誅五代巳身萬事不遂父母妻子咸受其殃身殁之後送下鄷都萬劫不原一生民以正為邪以邪為正謾罵法官如此之人身殁之後考入鄷都七祖九先咸受其禍巳身見在必多殃咎如佩籙者加二等巳甚者校罪多寡减夀一生民恃勢損壊宫観毀經罵道侵尅良民者减夀巳甚者㓕身殃九祖一生民狡猾為害扵人者九祖受殃身謝之後淪沒隂司萬劫不原法官道士見㓕巳身一生民扵観宇名山及經書符篆所在之䖏腥言穢語者徒一年法官道士加一等一生民妄效法官歩履星斗者徒二年履真人星者减夀三年法官道士加一等一生民呪詛天地日月躶露三光呵風指雨怨咎天地者徒九年法官道士加一等一生民以灶内火燒香對比小遺被人持戒者徒三年法官道士加一等一生民茹葷飲酒登上三清殿及對上真者徒六年知而故犯者加一等法官道士加二等一生民妄祀滛鬼及不干祀典神鬼者徒二年一生民病苦求覔符水而不至誠者徒二年一生民建齋設醮反不至誠者徒三年一生民將經書文字秘訣符篆入穢汚之䖏者徒二年行法官道士加一等一生民不奏名姓傳受秘法盗視靈文者徒三年一生民不行正法若家盗蔵秘法者徒二年一生民怨望君主不孝尊親不友兄弟不信師友不睦夫婦不恤貧窮反憎凌辱者徒二年甚者㓕身清規儀範章陪四太極法師曰夫齋醮清規威儀至重凡此禁制皆玄都上宫明科舊格戒其隋慢検其愆違察其行蔵観其誠志若有過失随事紏舉盖不𣣔使其因齋獲罪故開紏罪之門知過䏻改罪亦消焉庻得弘整紀綱恢宣玄化登壇之士勉而戒之醮壇職名髙功一名左闡道其職也道徳内充威儀外俻天人歸向鬼神共瞻躡景飛章承領宣徳恵周三界禮絶衆官都講一名右闡道其職也洞輔德通法度明錬讃唱儀矩領䄂班聮玄壇歩趍陞座講說昭符人望黙契人心監齋一名左輔教其職也緫握憲章典領科禁紏正壇職振肅威儀周宻察非從容受簡有嚴有翼毋濫毋隳侍經一名右輔教其職也嚴㓗几案整齊卷軸開凾啓奏收櫝敷陳調和衆音表儀庻職觀聼𠃔睦幽顯交歡侍香一名左拱宸其職也精飾䁀彛㓗嚴案席廵行焚炷始終芬芳玄鍳昭彰丹誠露逹母獲中絶有越初忱侍燈一名右拱宸其職也整辦缸篝嚴㓗燈燭髙下照徹内外輝華際夜續明華晨收𤔵上明道境下煥幽都錬師其職也内外貞白心若太虚徳体好生誠推惻𨼆致坎離之妙用合造化之元功煉質升真超凢入聖攝科其職也嚴格威儀宣揚玄範端臨几席宻邇道前音傳金玉之聲嚮荅琳瑯之韵必敬必戒以謝以祈正儀其職也通貫科儀整肅玄綱務在老成之士方嚴中正之規髙功對越之有虧尤資輔恊監齋紏舉之或失必藉考稽監壇其職也激濁揚清攝邪輔正陞壇𨽻事先湏嚴㓗之功通真逹靈必假監臨之力事湏䖍恪母令差遲清道其職也肅清雲路蕩滌塵氛祛魔魅不侵扵黄道斥妖邪勿近扵仙班母或後貽屇期先導知爐一名左司儀其職也玄教威儀仙班領䄂從容禮節持誠必在扵端荘嚴整規䋲臨事勿違扵先後禮宜周偹事勿参差知磬一名右司儀其職也吟詠洞章歌揚玄範調和氣宇歩虗聲徹扵雲霄浄一身心華夏音傳扵壇墠弘敷至道㑹感真靈詞懴一名左直籙其職也宜堅正念對越天皇通誠意扵上穹懴愆嘏扵下庻真儀嚴重勿致怠荒表白一名右直籙其職也奏陳䖍恪注念精專宜罄竭扵一光庻誠通扵三界威儀敬慎䂓矩宜遵醮壇清規登壇失儀者清規有例當罰香油以贖其過止罰拜以准之若登壇之士各賫巾褐簡履不得臨時交換彼我公事有闕勿得牽引非巳之服若登壇起居皆當関白法師一拜禮香三拜而去還入如之若陞壇履屦不整罰二十拜若坐起不庠序罰五拜若倚斜不正坐罰五拜若臨壇唱讃法事與外人交言罰二十拜若翻覆香火罰十拜若講及世務罰二十拜若語言戲笑罰十拜若綺言互䀨罰五拜若飜覆燈油罰五十拜若巾褐不整罰十拜若都講讃唱失儀罰二十拜若執紏見過不弹私𨼆罰六十拜若侍經不整飾髙坐觸物有闕罰十拜若侍香香煙中絶罰四十拜若侍燈燈火中㓕罰二十拜若醮主内外不相檢叱音聲髙厲罰五十拜若聴經倚㩀不執簡罰十拜若不注念清虗心想意倦為衆所覺罰三十拜若出入醮壇不関白監齋罰二十拜若垂𩬊馳歩罰二十拜若誦經或乱請問敗句罰三十拜若唱讃聲不齊罰二十拜若陞壇不洗手漱口罰二十拜若坐起揖遜失儀罰五拜若旋行不依次第及逆行罰十拜若起行来及還坐不禮經罰三拜徑去者罰二十拜若臨燒香突行罰十拜若醮主供辦觸事有闕罰二十拜若受関不啓上罰三十拜若醮次擅自下壇罰一百拜若犯威儀弹罰不伏者逐出醮壇下用若下坐衆官法事有虧從一至三依科弹罰從三以上退出齋次執紏不弹與犯同罪若上坐法師扵事有虧自取愆失送簡監齋從一至三依科弹罰從三以上断功三百日不得又在法坐官観職名古制宮観道士之職真人祭酒道録道紀道統道正道㑹観主提㸃提舉副宫副観講師都監玄義知事書記諌議監臨戒師上座掌藉都表監齋法師副表直𡻕表白知庫司鑰南極長生宫新増十五職蔵史管蔵殿經籍知院管道院一切事僉院同前主翰職專修撰文章教授道童讀書訓師管教訓道童齋法科教司籍管錢粮簿籍一應文書直殿管殿宇廊廡一應房屋直堂管齋堂飲饌之事知賔管倍迎鵉儔鶴侣之士司廪管一應粮儲司戸管門戸出入之事司工管修造之事司圃管藥圃菜園果園之事司牲管犧牲畜飬之事社主管庄田春種秋收之事宫観清規禁言道化賢𥼶化愚晋成帝咸和間雲門等郡有學佛者八十人告入寺為僧嵩山等䖏有道士二百人告除名入道帝謂王導曰嘗謂人身難得中圡難生今中國之人反棄中國之道願徃生西方為胡人不願生扵中國何愚之至也昔漢章帝所謂道化賢𥼶化愚是乎王導曰誠實言也可為萬世之戒故世方有道化賢𥼶化愚之說自此始雖世常有是言其道士切不可言恐生凾矢大宜忌之按皇甫真人曰聖人設教各随風圡禀受之性所立性識愚鈍者本乎地則以死為樂性識聦慧者本乎天則以生為樂周易所謂本乎天者親上本乎地者親下是也以兎為樂者𣵀槃經佛謂坐㓕㓕矣寂㓕為樂以生為樂者老子謂我命在我不在扵天死生之道賢愚皆有其樂又何必䆒其賢愚哉此篇極說得有理故取之忌争論一大忌與人争論其教道徳經曰夫惟不争故天下莫能與之争清净經曰上士不争下士好争或有横𨒫而来扵言談中用言詆毀則應之曰嘗謂人身難得中圡難生既生中圡正道難遇我中國人也生扵中國奉中國聖人之道是不敢悖所生之天又不敢悖所生之圡以中國人奉中國之道理也若是背了所生之圡而奉别教便是畜生一般忘了天地生成之徳了豈是修行之人教之髙下吾不知也只這等囬荅理不出扵人上矣道𥼶坐次凡𥼶氏至扵宫観道士當譲𥼶氏坐扵上道士至扵寺院𥼶氏亦譲道士坐扵上是以生客賔禮之待也如或他䖏相遇道𥼶皆以年長為尊譲坐扵上雖教有夷夏之别其理以和為貴在人謙退為徳僧道之稱唐髙宗永徽五年因胡僧與道士争稱其名曰只聞人呌僧道未聞人呌道僧胡僧反列扵道士之上帝曰道士乃朕中國人也尔胡人也豈可以夷狄之人列扵中國之上乎中國禮制之所尊外夷冠履之不加貴賤分也帝謂于志寕曰且如世之称夷夏者夏是中國反居扵夷狄之下可乎如言隂陽隂是小人也不吉也陽是君子也吉慶也反居隂之下乎言禍福者何不先言福而後言禍豈是禍為吉乎如言鬼神鬼是下鬼也神是天神也何下鬼反在天神之上乎如言曲直斜正者正之與直皆善事也斜之與曲皆是不善之事也反以不祥之名而為先乎凡世之所称必用先㐫而後吉是以不吉不祥之事在先言之其僧之與道髙下之先後亦猶是而論也其吉㐫之名貴賤之分夷夏之别可得而知矣舉此例知道之尊貴何嘗汚馬禁說因果唐武宗曰昔在梁武天監間立義學生之名毎人要編捏地獄因果之事十篇誑惑世人以化愚俗而求布施共八百餘條散在法苑珠林等胡書之内原有經教之傳肉祖跣足持鉢乞食而為修行之事豈有誑惑世人而求財利者其世之愚夫愚婦莫不惧之乃傾財蕩産而施之者有之而道家乃中國聖人之道切不可言神鬼妖異地獄因果之事沿街抄化玷辱宗風此乃無籍小人無耻之徒非中國人之所為大宜禁革禁止陽精舎利道士陶元素者遇一道士自稱皇甫昕領至一松下見一白髯者捫其頂曰此子頂有竒骨異日可學道父毋遂舎扵昊天宫與道士滕碧霄為徒十九遇一老者授以天髓靈經之書後逰崆峒復入太華而居之至梁天監十三年甲午年一百八十二𡻕矣帝聞有超神太虗之道遣使以璽書迎之不就乃作詩曰歴晋齊梁將二百不妨塵務猶相隔今朝脫却這皮嚢走入太羅天帝側遂嘱其徒曰吾今逝矣當以火化勿留遺骸乃觧衣跌坐而逝時天監十四年乙未正月之一日也其徒遂焚之其骨上皆有紅白二色之珠太如上粒者光瑩耀目其堅如石得三百九十九顆使者奉獻于朝范雲曰西胡房中秘宻之法以合氣而採隂者得之其色紅紫而躰重也胡言舎利西胡有堅固石與之無異多有以堅固石用血竭䤾扵骨者燕辯中國善修飬者以童躰全陽之精結而成者有紅白二色名曰陽精即舎利皆是死人之穢物豈可獻于朝耶既言得道必飛昇扵天不以枯骨遺于人間既有其死焚其尸穢物尚在何為得道其庻人之家凡有一死人枯骨扵宅謂之伏尸故氣不祥之物必用巫祝以驅之况持之入朝使者可斬帝遂不納扵是天師移文天下宫觀曰中國聖人自黄帝立教未嘗以死為得道若言得道何又有死不免為下鬼之稱况留死尸枯骨之上結成陽精誑惑世愚今後敢有以陽精舎利惑人者當以妖論焚修警語按焚修宗㫖云其職也朝暮焚香燃燈酌水獻花誦經禮懴以求褔力常使殿内聖像噐物㓗净齊整勿令一塵所染時時拂拭勿缺洒掃殿宇房屋勿令有塵垢積地是謂勞心于天帝之前委身扵清髙之境此道士之職也苟能如是必蒙福報缺此一事天必殃之尤當盡力扵蔬圃竭心扵炊㸑採薪汲水苦其身心勞其体膚是謂打勤勞之功者所以報天地生成之恩也使其功大則福報不淺若此二者無一扵身則虗負道士之名暗受天人之福身謝之後受畜𩔗報不免刀砧之苦拷罰之殃可不惧哉今以潭州白謹㣲所蓍警語應驗附示于篇末其畧曰昔冦謙之謂凡人生于世值遇晦星命當貧天者皆由夙世業根深重稔積過譴應當捨身出家奉事天帝以求福力然後得免貧天此焚修出家之說由此盛焉昔有京兆徐謐者自㓜多疾術者推曰此兒非但多疾尤不免貧天父母且未信至十一嵗相者曰此兒夀不過十五嵗父母始驚愕曰願求法以免之相者曰若𣣔免厄無非出家庶免苟免扵是捨于城東玄元観為道士謐乃朝暮勤奉香火㓗掃殿廡挾箕擁帚不惮勞於廽廊之間携鎌荷鋤常盡力於園畦之内夜則誦經拜懴囬向端坐焚香稽首致懇當日脩墻𥙷屋勿有虗時手足胼胝皆為龜裂况不食常住之物自化日粮不燒常住之柴薪自採薪汲水而自食人有怜其勞苦者曰子何勤苦之多也荅曰修行之士為生免事大豈可用人服事而自不為乎是以人為我奴反受天人之福也如此者四十餘年一日遇一道士于松隂執手謂謐曰子勤乆矣天帝賜汝夀錫汝爵未㡬名京師朝廷擢為景霄宫道録緫領賜號通玄輔化真人至南齊廢帝欎林王𨺚昌元年夀一百有一嵗北魏主聞之皆遣使遺以金帛道將成遇三道士呼之同逰遂徃梁元帝時有棄佛而學道者入茅山遇謐騎巨羊謂曰汝歸告吾京兆玄元観諸道衆吾今為玄天幕府内䑓左相由是傳其事于世天下出家奉道者始知勤恪吁出家之士始因命運刑冲父母慮其難飬方捨六親委身宫観後世不知因果出家者𩔗多慵惰傲蕩之士食人饈饌受人恭敬求人施捨不生慙愧不顧殿上香火之有無不視堦砌塵埃之㓗否不顧殿屋垣墻之頽漏徒知幽閑快樂以優逰不肯勞苦供奉而誠敬以徐謐之事較之豈不揣于心乎况夫天律嚴峻神目炳窺暫時得安飽煖不免堕為異𩔗鄷都之考庸可迯乎余自八嵗出家今巳白首常對食思𢙨無補教門恐罪戾罙深殃加九祖是以普告出家之士咸宜猛省母堕昏慵庻㡬可共躡扵仙梯同振于玄綱也大宋建𨺚二年三月既望嗣三洞正教清㣲伏魔使潭州夀星観出家道士白謹㣲拜書晨昏朝修道衆凡栖琳宇當以焚修祀事為先宫観之住持毎日集衆陞殿焚香諷經朝真禮聖當体祀天奉教之心以罄修真學道之志𦍤望凡遇𦍤望之辰先日沐浴至期清晨住持領衆衣道服壇簡陞殿序班諷經一以祝延聖夀一以敷揚玄範節屇凡遇節屇日辰當行朝真之禮朝修既畢宜追上古之風以禮㑹筵恪遵宗範莫致怠荒晨昏啓閉宫観門戸最為緊要所以啓閉有時朝則待明而啓暮則猶光以閉其鎻令所司者掌之其鑰扵常住收掌凡遇啓閉依時関領晨昏鐘鼓晨鐘暮鼓以召百靈壮官観之威儀弘山陵之氣象每日晨昏不可有缺清晨㑹湯道士道童毎日陞殿訖湏㑹方丈擺班請揖於住持前次分兩班大衆對揖道士依次序坐道童朝上揖逓湯訖拱立扵下住持叙一日之事若有公私等因該管職事及事干及者禀知住持對衆從公議擬事畢普揖而退以正清規勿隳玄教常住常住者宫観之綱領必擇碩徳寛弘公正之人任之凡錢粮金糓收支耕佈田地山園祗待徃来官客一應等事分設各職輪流執掌或一年二年三年更換務使𠃔當必盡心扵公堂勿故意扵私巳玉蟾真人有云常住金穀有神司之捨者取者各獲果報斯言不虗宜當戒慎齋堂宴㑹赴堂宴㑹坐依次序其尊卑上下之禮不得差互齋堂日食每人一日常住給米一升蔬菜魚肉随其豊儉三飡依時擊雲板㑹衆赴堂食之如遇雲逰客道照依古例止管飯七日若坐鉢過冬過夏者常住管飯百日若扵本宫観叅管職事者與本宫観道士支采同不在是例京師及上清名山有大徳有道之士至本官観欵留倍加其禮供給所需不拘嵗月齋庫日支巳有定例不許私為人情擅自支出與人食用或有粗俗無耻之士索要酒食其管常住者當執法謹守清規違者罰設齋一席自出巳財合宫之衆禮當要到收飬徒弟凡收育徒弟必擇喬木故家聲名昭著鄉里崇道積善之人子孫無𢙣疾違碍者取之以禮結為道親方可與進若若慵俗伎藝之人子孫及有𢙣疾胡𦤀𦤀瞎眼疤面六指瘸跛殘疾之人不可為徒請給度牒凡道童自幻入扵玄門習本教經書長立果有道噐者如遇該年請給預先呈禀道可申送請給庶不乏人使代代相承悠乆之意醮事若有施主賫香詣宫観建醮事干常住差委該管道衆分幹一應等事務要䖍恪冝遵祀天之禮莫負施主之心化縁宫観興修湏慿檀樾常住請䏻事者持䟽化縁金谷以𦔳修造之用先冝訪問逺方殷實有徳之家䏻結善縁果有歡喜布施之心敬叩題縁若雖有資財慳吝不捨者免過其門若不拘髙丁多𦔳寡𦔳随縁布施者尤佳修造修造一事常日不可廢弛委数人時常廵察殿宇墻垣溝渠路道但有損壊即便修理其磚瓦竹木釘鉄石灰等件俱扵常住関領化縁金榖預先准俻上庫收貯以俻修造之用洒掃各殿堂去䖏若欲洒掃必先以水洒之候片時以箒掃量濶方圓五尺攅灰塵一堆不得遍乱混掃不然使塵灰飛揚蒙蔽聖像幡花切宜忌之納粮宫観有錢粮者干扵粮里㑹計或兌運或起運或存留必先請議定奪不得遲悮輸約之時委老誠之人管運赴倉湏先完納免致催徴守庄田田圡有離宫観窵逺者湏立庄屋倉房收貯谷米農具等件必要本圡誠實之人㸔守不得用外郡無籍之人住居不免䑕竊狗偷日乆必有異事累及宜先詳察免後招愆收田租凡宫観有田地廣多湏召無田之人佃佈必先立約議定還净租谷若干秋收之時委人臨田眼同收割管押登塲照約依数趂時取討先禁佃人不得私自割收如此則租粮無虧放榖常住榖積有多餘者宜放借鄉間本分之人食用秋收之時照例起息收取非求利扵常住實周急扵鄉民倉庫積收常住噐用之所湏與住居間隔不得連甍接棟以避風燭之侵掌其事者必湏嚴謹園圃日用家常蔬菜不可有缺常宜㘽沃一切菜皆可食但不宜㘽䓗蒜韮薤荽謂之五葷菜修道之士不可食爾雅云持齋不食五葷者即此五葷也非魚肉𩔗修道持齋者察之告假凡省親訪交出外雲逰必湏請假務要詢問所土之䖏果無違碍方𠃔其請不得托故非為夾𢃄他人牽引是非玷辱教門各宜慎之雲逰道家出逰尋真問道謂之雲逰道士奉天之士也謂本乎天者親上故曰雲逰其雲逰之士必㑹祈睛禱雨祛邪断恠極灾㧞難及善風水䏻風鍳㑹星命䏻吟作㑹書𥁞方可出逰不然則凡俗之士也不取舉薦凡宫観之主直事之人務要擇其有徳有道行者以主其事不肖者不可以私恩保之有徳者不可以𥝠隙如之務在從公可以服衆叅職事不論逺方近䖏有道行䏻管辦事務者當以禮請入宫観以叅職事観主凡宫観之首領如有過衆皆舉之三舉不悛當退堂以薦有德者継之道衆有犯當㑹衆發落軽則面諭其非使之攺過遷善有法所難容者必以清規治之紀其過於簿籍紀三次者凡叙坐列扵末席如建大醮不許登壇有𢙣極重者難以於宫観共䖏㑹衆逐出後以箒随少掃其地絶其踪跡使不復再入宫観故也教成法自古宫観齊教之法立規矩有之其制法論過擬罪比常人犯笞杖律者减半論之如常人犯不應罪笞四十者道家清規止笞二十使之攺過修省而已若有他犯則量其罪過軽重比律議擬此道家教戒之法也若罪犯到官比常人有犯律加一䓁何也以其修道之士當積行累功卑体賤身含垢忍辱是其職也故有犯者為無修道之心䖏扵華屋不耕而食以享天人之福故比常人罪加一䓁可不惧乎清規戒尺式用木造濶一寸四分厚四分長三尺正面背面違犯法律唐髙宗乾封二年戒諭争論勑朕承天命𡘤有萬方敢不欽崇天道以宣天徳比者昊天觀祭酒楊太玄華嚴院僧人宗敬争論後先亦嘗戒諭尚不遵行朕嘗稽之古典乃命儒生校其優劣詳知道佛之後先見夷夏之軽重準今酌古貫理窮源且以天人論之道乃天地萬物之母佛乃修道而成道以天称佛在人列孰敢以人加扵天地之上哉以夷夏断之開道教者朕中國之黄老始佛教者彼西胡之罽賔黄老中國之大聖佛乃西胡之善人以夷夏論之豈可以外夷加扵中國之上哉又以先後論之道乃先天而先地佛乃後出而後興道始於盤古之先佛生扵周荘之世上下相距三百萬七千餘年孰敢以周荘加扵盤古之前哉又以朝代断之道闡於軒轅之世佛出扵漢明之時道在龍馬之先佛来卯金之末孰敢以後漢為尊而以黄帝為卑哉又照僧家舊例首明後先先入寺者雖㓜必列於上後入寺者雖老必列於下此清規不易之理天地自然之勢也况道先佛後又何疑焉朕今敷諭之後二教咸体朕言敢有不遵仍前争論重則加以極刑軽則罰為城旦之㫪令下有司俱從朕断弘道元年禁絶黨𢙣勑朕以菲徳祇紹鴻圖嘗謂立教不明𡚁流萬世知𡚁不革厥罪帷鈞旁求輿論之詳大建扶綱之議昔在軒黄之世巳有道統之傳迨乎漢季之時始有佛法之說原其為教本以化暴歸仁誘𢙣為善夫何自漢靈帝中平𥘉鉅鹿人張角𥘉以符水治病救濟疾苦無不應效可為理矣及乎期年之内四方之人雲輳而歸之角乃頓發侈心𣣔希大位因是作乱自称大賢良師天公將軍弟寳称地公將軍梁称人公將軍聚衆千餘人皆以黄巾為號擾乱天下漢之國本㡬動兵敗被擒黨衆伏誅至若僧徒之𡚁梁天監間僧法慶等與其徒李歸伯作乱自称大乗皇帝以歸伯為十住菩薩平魔軍司定漢王兵火連亘数千餘里干戈遍野数年不止民遭𡍼炭社稷動揺㡬至殞國又若魏太武時奉佛人盖呉與長安寺僧衆僣號称帝而反事覺伏誅隋大業年間群盗数十人自称彌勒佛皆戴毘盧之㡌焚香持花入建國門奪衞士兵噐驟然為乱兵交闕庭血流殿陛㡬至大禍其可畏歟至我朝髙祖武徳元年僧髙曇晟與僧五千人反自称大乗皇帝以尼净宣為耶輸皇后攺元法輪攻破州縣殺戮官軍近者又有僧志覺娶陶氏之女以應桃李之䜟與契丹結謀自称天子又有事佛之徒鉄余等為乱曰聖佛岀世自称光明大聖皇帝殺官軍焚民居以是觀之其二教之為天下患盖不細矣朕歴考古典自開闢至於今日上下百千萬年道之所犯者帷一其禍乃淺自漢明至扵今日不千年而其禍非一而乱且大朕𣣔追上古之風復羲農之治中國之人則奉中國之教夷狄之人則奉夷狄之教𣣔使中國絶其踪跡以杜前禍使道有邪正之辯人有夷夏之别柰何以聖人之心而行外夷之教豈可以姑息之意不忍以廢之也歟今後道釋之徒已有定額敢有私蓄門徒藏匿逃亡誘惑良善聚為黨𩔗更相倣效者許諸人執赴法司推䆒其故苟有不軌誅族無赦故勑朝謁禮凡朝㑹天師當衣法眼冠俯仰之冠執簡愛舄如臨上帝凡為道士者勿論少長當皆衣金襴之服正一之冠執簡常日見帝王不執簡素服不拘全真褐衲如常譬如僧人勿論少長貴賤皆衣金襴袈裟况道士入朝見君反不為禮乎自漢以降大忌雷巾小衫小衫乃流俗之衣也雷巾乃野人之巾山中幽𨼆之士以謢短髮大㮣修道之士存神聚氣㑹三華扵泥丸以避泥丸之開恐風邪之所襲也豈宜戴雷巾入朝謂之無禮岀家以簮戴為名不戴簮冠而戴雷巾禮乎謭薄好矜餙者為之有純徳者必不失其簮戴之禮昔鄭荘公殺子臧以其冠之不正故也是以孔子作春秋首載其事凡為道流者不可不知又見冠服儀制章按元中統四年中書省劄行下諸路行省云自宋季䘮乱天下𥘉定禮法未行其梗化者獨僧道也考之僧人以髠首為修行道士以簮戴為出家今僧徒見僧官及師長入其寺皆去㡌及入朝門反不去㡌見君方去其㡌有是禮乎且僧官道官自古例無冠帶止以髠首簮冠為職自三公六卿見君尚皆免冠叩頭况出家修行之士以卑弱為先謙退為徳反不去㡌而髙抗自尊今後僧道凡見官長不去㡌者笞十七歸俗入朝不去㡌者笞七十徙吐蕃其服制也道士不當用蒙古岀䄂比甲之衣當用軒黄之冠服僧人不當唐扮用武氏之媱衣毘盧之㡌教僧當用西畨之紅氁衫禅僧當用梁武之皂布衲不得衣絲蚕紗羅綾叚之衣尼姑止許照依女冠在家出家不許群居立院因而藏匿男僧雌雄不辯媱風大扇以致嬰孩祐骨堆扵後園事發者数矣致使濁乱風化悉宜禁革敢有仍前違犯者斬一晨昏上殿當鳴鍾鼓早在昧爽之時晚在日沉之後道士先擊聚衆之鼓以齊道衆焚香誦經一過二禮乃退不到罰油五斤准拜五十造言不服者罰油十斤准拜一百下聴拜者㑹衆笞四十不許共食住支粮一年一道士有過者軽則罰之或香燈之属重則鞭之鞭之不攺罰之以供炊㸑飯堂之役或園圃之劳又不攺再犯罰為直厠之奴罰削杖以供厠内之用或一年二年以待更過乃免一道士有累𢙣不悛罪之重者莫大扵不服教訓不守清規及偷盗賊害為兇暴不仁之事者黜之永不許再入本宫觀其本宫觀籍冊以紀其罪傳扵不朽一四方雲水有慕山川之勝福地之靈𣣔修道扵宫觀者供給所需與本宫道士同不可分别敢有嫁言謗訕䜛毀是非而相間諜者笞二十貶徃守庒不許入宫觀一雲逰道士至宫觀倍留十日供給飲饌不可有缺如𣣔過冬過夏者聼如要居住不去者聼果有䏻亊者許叅職事若非有淳徳性剛躁者勿許恐惹禍端一逰方僧人至宫觀如𣣔挂搭結夏過冬供給飲饌常住館榖不可有缺亦當驗其有無度牒真假明文方可安下一凡宫觀當置一薄名曰雲水籍如遇四方雲逰道士至主宫觀者驗其度牒紀其簿曰某州其䖏道士某人㡬年月日至如起单紀其㡬年月日起单恐有迯亡罪人𨼆名逸姓者以累宫觀如無度牒者或有公㩀帖文亦當辯騐不可久留當紀簿籍恐官中挨捕迯亡罪人以慿查照庶得無累天皇至道太清玉冊上卷終天皇至道太清玉冊下卷南極冲虚妙道真君遐齡老人臞仙製宫殿壇墠章宫宫者帝王深居之所曰宫黄帝祀上帝於昊天之宫祀三清於太極天宫故黄帝之受命上天眷命凡有天下者皆曰奉天以承天運此宫之始也觀下仰上曰觀音官上俯下曰觀音貫帝王臨政之所明堂是也居高以臨下之意故曰觀音貫按黄帝内傳西王母授帝白玉元始真容置於高觀之上此觀之始也殿演義殿法也取衆屋擁從摯虞决疑要注曰殿則有階陛堂有階無陛春秋謂之路寢禮記白虎通俱曰天子之堂史記秦始皇作朝宫渭南先作前殿阿房啇君書有言天子之殿則是秦自孝公来巳云然矣盖秦如曰殿也後世祀天帝者有金闕寥陽寳殿無極寳殿太極殿其名極多此殿之始也閣韓詩外傳曰黄帝時鳳巢於阿閣閣亦肇于黄帝也世有祀天帝宫觀建通明閣紫虚閣玉皇閣等名此閣之始也余於長生宫建夀星閣天皇閣為民祈夀祈榖樓史記方士言於漢武帝曰黄帝為五城十二樓以候神人帝乃升幹樓然則樓盖起于黄帝之時世之祀天帝宫觀多建鐘皷楼及有棲真等樓此楼之始也道蔵始老子為周文王守蔵史以東觀蔵書後世道家皆有道蔵蔵經焉鹿皮公置以轉輪懸閣動則鐘皷自鳴中蔵其經外則刻以天神像置之此其始也後世有輪蔵殿曰雲章寳室天章寳蔵飛天法輪等名此蔵之始余攺蔵殿為璇璣殿謂其斡運天道如璇璣玉衡以行天也堂古者羽流建天醮有演法堂堂列六幕設六師位於内以主醮事此堂之始也余攺堂為㤗玄殿天關天関之名自余始之余於南極長生宫建玉宸天関左右列四天帝君一曰承天輔教青靈帝君一曰安邦柱國皓靈帝君一曰保鎮國祚丹靈帝君一曰制御萬神玄靈帝君関之前兩楹有對曰閶闔雲開来三界朝天之仙侣穹窿日霽列四靈輔弼之神君天門皇圖要紀曰軒轅造門户然則門户之制其在上棟下宇之後晨昏啓閉以禁除暴曰門古制有用二龍虎君者有用二天丁者今余所制凡有天丁龍虎君者為之天関無者為之天門以其祀上帝二清之所乃太羅玉清之境故以天門稱之世俗不明理者呼為山門又曰三門去道逺矣鉢堂其堂乃四方鵉儔鶴侣栖真之所自古名山仙蹟之所有之余於南極長生宫建造鉢堂名曰棲真舘掲其名于門楣對曰世間雲水皆居此天下全真第一関堂之前軒扁曰華靈𨼆靄之額軒柱對曰闡中國聖人之大道襲上天仙子之遺風軒之中立啓関閉関之牌中祀王重陽真人後案設金木水火土以相五行造化及金蓮七朶以表七真玄機供列于前中立全真鉢架下列水鼎上懸五鈴一鉢架有對云五鈴齊振弘開太極之関一鉢暫停再入㤗玄之室兩傍對列坐龕一十四單以鈆汞子丑寅卯辰巳午未申酉戍玄為號堂之柱對句云黙朝上帝昇金闕靜守中黄閉玉関左右有二廂房左曰鶴巢右曰麟藪内設雲床一十四坐卧事身品具齋饌器用等物悉皆周備以俟雲水全真棲息之用世之作鉢堂者体此為法圜室以磗砌為室方圓一丈無門止留一竅以通飲食後留一穴以便出穢全真入圜砌其門謂之閉関坐百日乃開謂之開関此圜室之製也其張道陵漢留矦子房之後沛豐巳里中人本太學生舉賢良方正直言極諌科晚乃嘆曰此無益年命遂學長生之道得黄帝九鼎丹法入蜀鶴鳴山坐圜精思鍊志著道書二十四篇三年丹成謂弟子王長曰神丹服之必當冲天吾更湏為國為民興利除害即臣事三境則吾無愧焉帝聞有道授太傅封冀縣矦永夀元年九月九日與夫人雍氏同昇天其圜室自此始也菴匡續夏禹之裔弟兄五人生而神靈長曰續周武王時與老子同為柱下史受老子之道𨼆於潯陽三人結廬于天池之峯二人結廬於虎溪道成冲舉故名其山曰匡廬漢武帝封為大明君國朝攺君為公此菴之始也後遁世之士潜修至道者結茅於岩壑之間亦其事也余故體其製結茅於遐齡之南峯其地產靈芝故名之曰芝菴書其對曰我居方外當離俗誰信菴中别有天其菴内對曰一室斗大寸心天寛黙坐凝神妙思玄造菴之下建白雲之丹室書其對曰栖白雲而煉大還避紅塵而為小𨼆以俟有道者居之其路自飛昇臺之南地齡峯之西有松杉之徑周廻曲折而至其處其徑中有額曰白雲深處書其對曰一壷天地小無限野雲深將至菴所其徑有額曰紅塵不到處書其對曰静裏日月長閑中天地闊䑓古之修道之士有功成道備冲舉者必𨼆名山仙地而上昇余於是立飛昇䑓於遐齡洞天遐齡峰之上以俟成道仙儔必躋䑓上而冲昇矣䑓上石柱有對云九轉丹成舉歩高奔紫極大還錬就騰身直上青旻寺寺者六卿之爵人臣之位大夫居之故秦有太常寺以主祀天之禮漢武帝以道士凌太冲為太常卿乃攺太常寺為承天寺以祀上帝自是祀天以道士為太常之官以主祀事又設祭酒一員以掌醮事以承天寺為道士之官衙祠道家古聖之祠自峨嵋山天真皇人之祠始之古有三山祠是也蜀之峨嵋山昔天真皇人之宫在焉潯陽匡廬之天池及虎溪有大明君二祠在焉晋之五䑓山有二祠一祠紫府鴈門君之宫在焉一祠乃王子晋之弟眉夀修道之宫在焉其三山皆有放光之石遇日生白雲則有五色之光自五胡亂華中原雲擾因其有光皆為石勒姚長所奪為胡廟而中國三山神祠始絶矣舘天真有玄舘有道之士所居之宅謂之玄舘院道衆聚居之宅曰院天宫周穆王太子奉天尊上帝之室名曰天宫自漢晋以下凡奉道之家供奉天尊上帝之室皆名天宫雷壇凡行雷法祈禱之家奉雷神之室名曰雷壇壇墠方氏注曰祭地為墠築上為壇書金縢武王有疾周公為三壇同墠黄帝内傳乃有築壇墠事是其始也皇壇科曰齋荘謹肅秘密混融内真之事也旛幢旌節折旋囘還外儀之事也然誠心合真運用無間與天地為徒則猶待外儀以変化境界凡一俯一仰一進一退眼見耳聞莫非正事邪心無自而入則可通天真格上帝故曰法天象地像世威儀則無徃不肅敬也凡壇墠其制三級盖分天尊地卑之設上一級立虚皇玉京山天寳華䑓供三寳帝師左列建天真命魔之幢右列建獅子辟邪之節左之左設通真之符以䧏千真右之右設逹靈之符以召萬靈中設三晨之符以通萬氣辟除妖氛壇之東植青龍旛符壇之西植白虎旛符壇之南植朱雀旛符壇之北植玄武旛符五方又敷鎮安玉符此上之一級也若不用三級則就堂殿依方設之中一級設八門西北標云玉虚通真之門正北標云清泠玄一之門東北標云鎮静自然之門正東標云青華始生之門東南標云純和剛陽之門正南標云純陽烜赫之門西南標云坤順金和之門正西標云剛眀皓華之門下一級列十二氣子位玄天鬰初之氣丑位北元自然之氣寅位辟非蕩邪之氣卯位始青茂元之氣辰位黄靈高玄之氣巳位鎮静靈寧之氣午位炎真下明之氣未位中一凝真之氣申位厚和肅明之氣酉位剛堅素和之氣戍位真元飬靈之氣亥位返隂囘真之氣巳上三級之壇則成矣皇壇之設非特度生用之凡修詞請命禮聖朝真禳灾謝過為國為民祈夀請福薦㧞宗祖錬度幽靈祈天建醮悉宜用之三級皇壇圖奉聖儀制章天神尊號天尊號書曰天曰神地曰祗人曰鬼天曰神者純陽青靈之氣造化自然鍾氣之靈故曰神地曰祗者秉天地鍾海岳之靈自然之妙故曰祗人曰鬼者凡人有死皆曰鬼雖修道而成不免有死遺枯骨於人間者緃高不妙終為下鬼之稱故曰鬼乃以上天之神尊曰天尊元始天尊造化之主生物之始也莫得其名老子强名曰道乃立其神之名曰元始昊天玉皇上帝即天也不得其名乃曰昊天黄帝稱為玉皇居上天故曰上帝后土皇地祗其山川海岳必有神以主之不得其名黄帝稱為后土皇地祗曰黄帝稱為太陽帝君月黄帝稱為太隂皇君北辰天之樞機也為萬象之主衆星拱之居子位故號北辰五方五帝天有五星以配五行五行之神以主五方東方神曰青靈帝君南方神曰丹靈帝君西方神曰皓靈帝君北方神曰玄靈帝君中央神曰元靈帝君九宸九宸曰長生大帝青華大帝普化天尊雷祖大帝大乙天帝洞淵大帝六波帝君可韓真君採訪真君即元始九炁化生也故號九宸上帝代天以司造化主宰萬靈奉聖儀聖像中國神像以玉黄帝以白玉元始真容置于高觀是也後世無玉止以土塑按申失之土也餙以五彩兼備五方之属以正中國之氣凡東方之神像以木雕西方之神像以金鑄南方之神像亦用木取木生於火也北方之神像亦以金鑄以金生於水也皆取像於所属聖像寳座龍床之式屏風用龍頭口㗸五色結綵屏風皆用衮龍不許用靠光花草之飾當以中國體製為正三清殿兩旁當塑九宸九帝玉皇殿兩旁當塑三十二天帝二殿之壁上當𥁞以萬聖朝元之班像玄帝殿兩旁當塑雷部諸神殿内壁上當𥁞玄帝修真事蹟許真君殿兩旁當塑列仙殿内壁上當𥁞㧞宅飛昇冲舉之乗鵉跨鶴御風馭龍浮逰仙侣故事祈夀宫觀殿内正面堂塑長生大帝左長生保命天尊右延夀益筭天尊為主兩邉用南北二斗左南斗益筭右北斗延生南斗六尊當用夀星湊七尊以對北斗夀星閣以福星禄星置于閣上其下塑夀星之像龍牌道家龍牌不用玲瓏余更其制度實刋如碾玉狀龍在外全身現脊為邉粧用金龍雲用五色以表兼備五方之徳自余始之龜鶴爐丹陛上兩傍宜用銅鉄鑄成龜鶴二對為爐凡建醮事焚香於内可以通仙靈香氣可逹上蒼旛道家所用之旛以表天地人三才之象吾更其古製旛頂用桐梓之木為之上用日月星辰雲霞内𥁞天尊像於二以表天也旛腹書天帝之名脚俱用龍鳯兩邉帶取象於手皆以雲龍飛鳳為副之取象扵人也墜脚亦用桐梓之木𥁞山河大地五岳四瀆取象於地也自古未有此製自余始之世俗之旛皆用荷葉為頂蓮花為墜鄙亦甚矣日月燈凡殿兩楹之間必用魚魫為燈以雲霞覆之高聳於楣枋之間左用紅以象日右用白以象月自余始供花用桐木刻以靈芝以表仙瑞之物也牡丹一莖而花五色高九尺飾以金縷以按韓湘子頃刻之花自成五色仙瑞之應也供物當用五行金木水火土以表天地造化相生相尅之治而合神明之徳金以銅鉄造成錠金鉑貼之若用真金恐盗所窺木香是也以香刻成假山供之水净水是也以盂盛之火燈是也土以黄土取方一塊八方刻以八卦供之供果當用木雕夀桃交梨火棗玄圃梅崑崙瓜供香降真香乃祀天帝之靈香也除此之外沉速次之信靈香可以逹天帝之靈所忌者安息香乳香檀香外夷所合成之香天律有禁切宜慎之信靈香品降真鬰金沉香速香各五錢藿香八錢藁本甘松白芷陵零各一兩六錢大黄香附玄參各二錢凡合香於甲子前一日於静室合香之所置五子牌位以香燈供飬務要㓗净其神主有五甲子之神丙子之神戊子之神庚子之神壬子之神合信靈香法甲子日攅香品丙子日碾戊子日和於一處庚子日丸成供於天壇之上壬子日装入葫蘆挂起至甲日焚一丸以祀天其後不許常用凡遇有急禱之事焚之可以通神明之徳如出行在路或遇惡人之難或在江湖遭風浪之險危急之中無火所焚將香於口内嚼碎向上噴之以免其厄天樂儀仗章天樂乃殿上陳設之樂也天樂之始昔黄帝會羣靈於崑崙之西山命伶倫取嶰谷之竹作笙竿簫笛以引鳳鳴作鐘磬以叶律吕以定嵗之閠餘取䕫之皮作皷以享天帝乃取伏羲所製之琴瑟合之為樂於是羣神皆集百獸率舞鳳凰来儀至堯大祀圓丘以享天帝用之去古既逺失於其真漢武帝乃命樂師矦調作箜篌以配神靈之音重訂是樂乃命道士大合天樂於昊天之宫以祀三清上帝命其名曰三清天樂三清天樂章仰瞻龍馭𠔃昊穹帝陟䧏𠔃琳宫霓旌羽盖𠔃天人景從臣率羽士𠔃下方奉迎鍳臣愚忱𠔃精誠上通謹拜首稽首𠔃祈生民夀筭増崇祝皇圖萬世𠔃家國興隆願千秋王業𠔃福夀無窮以此寳香上告穹蒼普供養天皇一縷祥烟遶上方黎庶音仰望恩光願賜夀無疆樂具震天集靈之鼖焱豊皷也焚碧霄震空之鏞洪鐘也萬金錚鏦之鐘架上十六應候之鐘羣玉琳琅之磬架上十六應候之磬瑶池靈明之鼗音扛皷也桃逹悃通真之磬手磬也玉霄紫金之鐘金鐘也玉清天球之磬玉磬也太昊咸和之琴琅霄遏雲之管即葭管湘靈空漬之瑟太虚仙音之籟似箜篌而𥱧絃瑶臺夜月之阮檄龍命鴉之𣟄青華瑶天之笙玄洲洞靈之簫嘯風凌雲之笛靈鼍嘯風之𥀷杖皷也名玉礼璚䑓碧玉之板震空丹霄之璈叶和衆音之塤保合太和之箎五音翕和之祝八音九成之敔此樂黄帝祀三清之樂也今之所用但鐘皷笙簫雲璈仙籟而巳凡陞壇朝真謁帝則用之其行道誦經止用常日之仙樂帝鐘黄帝㑹神靈於崑崙之峯天帝授以帝鐘道家所謂手把帝鐘擲火萬里流鈴八衝是也天丁之所執者又謂之火鈴代宗時令胡僧不空設盂蘭㑹取道家帝鐘以代磬後攺其首為鈴用之鐃鈸蚩至尤驅虎豹與黄帝戰黄帝作鐃鈸以破之其虎豹畏鐃鈸之聲故也况亦驚逐魔恠唐武后時僧懐義謂佛在世日有魔申日申波旬匿之衆設毒飯火坑䧟佛以糞血戯佛以象踏佛佛欲滅之其魔有曰吾種𩔖甚多日後當破尔道故懐義凡建齋用之以為驚逐魔恠之噐武后日鐃鈸雖能驚去魔鬼其所薦祖宗之魂靈安得来享魔恠尚尔况其鬼不驚乎令道門亦有建隂陽醮者皆用之大宜禁革天真皇人曰昔元始天尊演法靈寳玄妙超度法門會集群仙於虚星天寳之䑓諸天隊仗紛紜日月星宿璇璣玉衡靈獸鸞鳳丹輿緑輦幡盖霓旌来朝夫行道之士開建壇陛亦遵上天之儀以度下世兆民者也余嘗於空中見天人之羽幢絳節龍旂鸞輅乃體其製攺其古法創為仙仗今列其像如左肅清黄道之斾一封昭告萬靈之旛一對震攝百魔之帗一對九皇萬齡之縷一對三清神霓之旌一對太㣲命靈之麾一對太清極玄之幢一對一面𥁞龍一面𥁞虎五靈綘霄之節一對九天伏魔如意一對九霄雲翰之扇一對鬰羅慶雲之扇一封神飈飛霞之盖一對破暗燭明之燈一對丹霄神𤔵之燈一對天衢欎霄之燈一對丹鳯呈祥之輦香亭是也巳上仙仗用硃竿寳盖珠綱綿帛繒綵為之務在装𥁞整肅列於外壇四面毎朝奏歩虚旋行之際則道童各執仙仗和華夏吟隨班旋遶皇壇之上非登壇朝奏不用則列于壇之四面架之後世道運否塞其教弗興皆以𥿄為之醮終焚化與𡨋噐無異大宜忌之天真命魔之幢命魔幢身六面符一面二面三面四面五面六面獅子辟非之節符節右天真命魔幢設於天寳䑓左辟邪獅子之節設於天寳臺右用硃竿寳盖珠結幢身桐木造成六面毎面篆符一道硃𣾰装金餘各依式造之凡法師歩虛旋遶之際二道童執之侍於法師左右同行旋遶是故道以威儀而尊嚴心因法像而敬畏不致荒迷妄亂也夫學仙之士心虚性静道備真王一念感通天心混合亦何假外儀之可通真耶然古制既有今豈可廢焉故取之天壇燈圖醮壇所用燈圖古有一百餘様其式繁多難以備載今取常用者一十様録之于左玉皇燈圖周天燈圖本命燈圖北斗燈圖南斗燈圖斗三曜燈圖九天玉樞燈圖火德燈圖九宫八卦圡燈圖血湖地獄此燈染紅砂鋪燈圖錬度燈此燈染紅砂鋪圖太微廻黄旗無英命靈旛全真儀式章凡坐鉢一鉢或八人或十二人或二十四人止大鉢堂者或百人不在此限設四職一主鉢二副鉢領左右兩班坐於上座以主其事又設左右直堂二人在於兩班近門向上坐之以主坐功進退起坐安鉢起鉢以定時刻不廵堂不提坐不挂針不見責既入圜堂道衆坐鉢之功自畏生死之大修煉身心欲出生死之苦而躋超凡入聖之階豈可以勢力逼責而為之悉皆革去坐鉢有用六時者運用不至多致風癱之疾莫若止用子午卯酉四時取天地之正氣為妙入圜中者是下死工夫習以静㝎煉柛錬形百日方啓若非真師口訣自已運用不至者名致成疾反為害身之術切宜慎之坐鉢自二月十五日起至五月十五日止自七月十五日起至十月十五日止自十月十五日起至正月十五日止一年止坐二鉢夏天炎熱不坐鉢堂外置雲版一木魚一左右直堂坐單前置小鐘二右曰動鐘𡉄曰静鐘凡每日子午卯酉時至期陞堂入單聴直日者敲擊以㝎啓関閉関動静次序毎日陞堂入單禮見後外門設一啓閉関之牌用紅牌金字如上座以閉関二字朝扵外一應人等不得入如下座聼雲版之警乃以啓関二字朝於外定鉢之法天色晴明之日先以鉢置於水鼎之上以日晷定之如日影方至午時初初刻逺以鉢置於水鼎之上至午未交未初時鉢務要沉以墜五鈴相擊之聲方淂一時乃可起座如時至而鉢不沉者将鉢下水眼稍放大如未至時而先沉者水眼大也再整之以小務要與時相對如午時初𥘉刻下鉢道衆上座至午末將未初鉢既沉水五鈴之聲乃振方可起座依此定之則時刻不差後之作者當体此為法鉢架式古制作一小房如香亭様用一太極之圈以繩繫於亭之梁上圈中懸一鈴以鉢繫於圈下用一水缸以盛鉢而定時刻余今更其制度改為一架架之両頭懸以綵結中懸寳盖置一磬以五鈴安於内以鉢又繫於寳盖之上如時至水滿鉢沉則五鈴齊振不與世俗所有者同自余始之全真叅堂禮全真有雲遊者初至宫觀入鉢堂叅見祖師司賔者引領至祖師前先三上香司賔白叅堂文畢行九拜禮然後退堂與大衆相見㑹茶叅堂文為覔知音飄然湖海短笻輊笠半生散誕無拘野水閑雲十載遨逰已倦佩一柄椅天之長劔使萬靈振服於空中抱三尺横𣍿之枯桐發靈籟一天之爽氣使猿驚鶴唳於空山虎伏龍吟於秋水乃與太虚為隣風月為友如斯清致偉矣仙哉况杖頭㸃破了無限青山脚跟踏破了十方雲水雖然未能打破虚空湏要錬成凡骨鐡杵尚可磨針金丹如何不就倘投機秘道合希夷所學者非傍門不經之異端所修者乃中國聖人之大道可以破鬼關削籍於黒書可以昇天府注名於金籙待他年上青霄騎白鶴翶翔於琅風之上且如今啖黄精茹紫芝栖遲於岩壑之間也曽切清風批明月曽咀道妙也曽扣金鐘揮玉塵曽究玄機遍天涯去訪高人頑鉄尚未逢磁石針芥故未可相投是以今日特為㝷真偶然到此敢僣叅師祖之圜堂有愧行野人之村禮謹以信香上吿道祖軒轅黄帝道祖太上老君南比二派歷代得道仙真聖衆恭惟鉢堂上座尊師琳宫之内仙侣真儔道骨巳成仙風乆著某等草木微軀烟霞賤質宿以毫𨤲之根氣得同無上之妙門大許陞堂庸行初禮暫移瓢挈笠以相從論道談玄而共處從兹叅禮敢乞㮛携夜寒𥘉共守庚申與相伴說来生話下拜禮畢受茶生鉢安單禮太香案於鉢前大香爐一手爐二主鉢副鉢左右直堂同大衆照依班次兩座合班擺定朝上拱立令一道童白致語入圜致語伏以金蓮獻瑞七真傳底藴之言雲篆垂芒萬世仰希夷之妙盖圜定之設所以歸根而復命而鉢堂之坐所以捨妄而歸真四大端時頓覺乾坤在我五鈴振處審知體用同源尚祈天地加黙佑之功造化𦔳精㣲之念山靈鎮静境界清閑十方清浄瑩無瑕闡幽㣲顯一㸃紅塵飛不到煉神歸虚道通象帝之先身在清都之上今道衆宿因㣲善得處名山愧無仙葩真乳之奇徒有夜月碧潭之想勇於修進當不讓於他為非道弘人乃自加於克巳洞天在平地看呼鸞喚鶴於青𡨋世界即吾身且人馬拴猿於圜室今日也試教黙朝上帝昇金闕旦看静守中黄閉玉關致語畢左直堂執手爐引主鉢詣香案前三上香退復位右直堂執手爐引副鉢詣香案前三上香退復位次同大衆朝上總行九拜禮左直堂引左班自主鉢起至下座止一一安單上座毎位止行一揖禮乃退方自上本座單位右直堂亦執手爐引右班安單上座其禮同前止行一揖之禮不行拜大右直堂擊動鐘三通畢直日出單放鉢岀門擊雲版三聲畨牌閉關可堂詣香案上香三大畢次上手爐香執爐至主鉢前一揖次至大衆依次序皆一揖畢至香案前上香三拜畢左直堂擊静鐘三下直日方入單坐候鈴響畢右直堂擊動鐘五下直日者起身開門擊雲版五下畨牌啓關毎日陞堂入單禮但遇子午卯酉時至期直日者先擊木魚六聲集衆陞堂八單畢右直堂擊動鐘三通畢直日放鉢岀門畨牌以閉關二字向外次擊雲版三聲囘堂詣香案三上香三禮畢次上手爐香執爐至本鉢前一揖依次序各單大衆前皆一揖不行拜禮復至香案前上香三拜畢直日方入單坐左直堂擊静鐘三下候鈴太右直堂擊動鐘五下直日者起身開門擊雲版五下畨牌啓關大衆出單冠服制度章陪六冠服古之衣冠皆黄帝之時衣冠也自後趙武靈王改為胡服而中國稍有變者至隋煬帝東巡使於畋獵盡為胡服獨道士之衣冠尚存故曰有黄冠之稱通天冠余所製也內用束髪冠頂用三台前南斗後北斗左右用日月上用捲雲之冠以纓繫之衣通天服則戴之謂之主冠非王者不敢用通天服余所製也服用玄色黄裏上衣下裳胸前用朱雀背後用玄武左肩用青龍右肩用白虎以表四靈皆用織金前用龍虎二帶下裳用十二幅以應十二月用邉襴所以取範圍之象乃帝王得道飛昇冲舉之冠服也及奉天祀神用之非常人所宜也結巾余始製也以玄色為之冬夏各有二様不拘紗帛自成一家製度不同於俗非王者不宜用雪巾余始製也以玄色紵絲為之以天鵝皮為裏凡雪天嚴寒皆用之以護腦雷巾山中道士燕居之巾野人冠服之属古無網巾戴之以籠亂髪各則護寒以褁其首豈宜入朝堂見帝王而為禮哉山野修道之士不論貴賤皆戴之今之謭薄之士欲為自尊以為有直事者戴之吳草廬有雷巾詩曰山野猥慵可護寒豈宜褁却謁時官時澆世態非純俗反棄玄門正一冠正謂此也網巾古未有之自我朝洪武開創始製有也圏用大環不同於俗㡌㡌之製任用絁巾縵飾即同世用藤竹軽羅細紗裝之亦可漆㡌如雲笠様布台黒漆不用幕雨笠織竹箬及樺皮為之以禦雨露日光最軽省世以藤竹䔷根作之亦甚軽妙而嫌其太華也其大而置肩謂之簦此尤為修道全真雲水之用也雲笠頂六方上小簷闊用皂絹或紗幙其上以避風沙日色尋真問師雲逰用之野笠以竹為台用小槲葉塩水煑過砌之於上以隔雨雪山居可用法服黄帝見天人冠金芙蓉冠有俯仰于上衣金星斗雲霞之法服執玉圭而前曰帝勞心天下為生民主可謂徳矣帝始體其像以製法服為道家祀天之服上清法服紫青作帔紫於外青於内帔廣四尺九寸以應四時之數長五尺五寸以法天地之氣表裏一法表當令二十四條裏令一十五條以應三十九帝真之位尔者身佩帝皇之服故也無此服不得妄動寳經此法服給玉童各十二人不得妄借異人并犯厭穢軽慢神服女真衣紫紗之褐用二丈四尺身䄂長短就令取足當使兩䄂作十六條身中二十三條合三十九條又作青紗之𢂽令用紗十五尺作八幅幅長四尺九寸餘作攀腰分八幅作三十二條此則飛青之𢂽也無此法服不得詠於上清寳經此服給玉女十二人不得妄借異人并犯厭穢軽慢神服洞衣㓂謙之所製袍經云鶴翅森霜之袍今世人襦之安下襴廣尺者其製與鶴氅同鶴氅凡道士皆用其色不拘有道徳者以皂為之其㝷常道士不敢用裘上古之世皆衣毛革道士多用鹿皮為裘取其仙之物後世多用狐褐襖襖者襦之異名自古有之凡出家之人及居山修道者既未䏻迯隂陽却寒暑故冝俻此以禦風寒之用不可有缺半臂半臂之製短䄂衣也道家用之以為灌花種藥之服也抱肚其制亦同世間者綿夾之厚任其所宜居山學道之年老者尤切用之汗衫汗衫刀近身之服最湏洗濯潔凈使不䙝穢可也短衫其制以蔽至腰者名為短衫山居野外所以便登渉之用古之修真者或指以為採芝之像也䙱道經曰青裙羽䙱龍文鳳衣古有明光飛雲之䙱今謂綽䄂耳盖大䄂而身短下裙之装也學道者必服之裩渾如裙形兩頭各安腰及帶每日一洗易之修道出家之人夜蹔寢息勿脫内裩大小綿夾皆湏清净常使香氣薰蒸免生穢氣袴單夾綿各時製洗易亦宜勤數臂衣衣之所設一取䕶净二則禦寒修道之士不可缺行縢今謂行纏修行入山飛歩特宜具之尤緊靴圓頭闊底之製古謂之靴履諸穢處耒皆勿登堂盖人間所用山中則不宜矣鞋鞋以木皮竹苧麻葛芷等各任所為不當用結絲錦綵繡綺皮𩔖過於侈靡則不宜坐褥道士女真體佩經戒符籙天書在身真神附形道氣營衛仙靈依託所着之衣名為法服神靈敬護坐卧宜清净或赴人間不可將法身混同俗事凡人牀席穢氣稍多宜各作坐褥方四尺素裏帖縁若大徳法師及具上法者用紫餘皆瓌色不得用綺錦繡𥁞珠絛帖絡其道士女真尋常敷設單祫坐褥以隔净穢分别尊卑應湏自隨不得蹔離及登壇入宣行道就齋香爐坐褥亦帶隨之各宜自勉毋得妄用修真噐用章如意黄帝所製戰虽尤之兵噐也後世改為骨朶天真執之以辟衆魔仙鉢鉢之製甚古唯仙家雲水之士有之多用鉄為凡入山採藥採芝終日不𨑰可以炊飯居家齋堂用者皆以木涞為之陽燧古者以陽燧取火𤑔香降靈也凡修丹者皆用此火不用凡火故道家皆用之盖火出於燧燧圓而火不圓叅同契謂陽燧以取火非日不生光以燧向日以艾承之可以得火方諸水岀方諸方諸方而水不方叅同契亦謂方諸非星月安䏻得水漿其法以之向月以盃承之可得水也凡道家修大丹不用凡水故用此水震靈杖其全其皆用净鏟為便於除糞也甚鄙之太俗余乃以銅為如意其簳長六尺下用鉄鑚有鈎搭挂包於上上挂藥壼丹經於如意之上自余始之卧具卧具皆用細布絹為之其出家之人卧被不得用緋紫青緑雲碧纈間褥錦綺繡𥁞珠條帖絡正與科戒相違不可用之褥褥之製所以却地尸惡氣也隨人所用若坐卧之褥但雅淡典净而巳氊氊者非出家人之衣服盖羊毛有羶穢之氣觸突真聖深宜慎之若入壇行道不用氊矣此道家科條嚴謹可知其常用雨具則隨人用之被被宜取軽細布作之不帖縁弦盖以淡素不尚華侈也單即卧單也以軽細絹為之不湏縁飾亦不用過闊枕枕用木或紀𣾰正四方作之不得斜曲為異形木履木履之製七魄化為龍虎伏在履屐之下今道士朝拜宜躡屐舄也散行則着屐令七魄有所棲也屐凡受受法者三魂五神之炁常薰於巾服之中七魄九靈之神常棲於履屐之下故上道之人勿令他人犯履屐弄巾褐者此也屧屧在浴室濯足處着之餘皆不得着履架凡履下皆有龍虎神伏夜可置於版簀牀杌上不得遽爾頓地學道之人宜持受道冠履衣服不得軽棄薰衣籠衣服常湏香氣薰之務使芳盛香㓗庶得登齋演法與道合真牀坐卧牀四脚長八尺正方高三尺巳上令絶地邪氣不得雕飾又謂紫玉榻三素玉榻高三尺離地盖地尸惡氣五毒之薰常起一尺不然則烟翳形身心念不感徹於上聖也牀最為栖形之噐大抵欲其高仰明㓗也䋲牀䋲牀曲机盖吐納導引安居穩便所前賢已有舊制常以白檀香作紫絳條裝其制亦佳道家之風清高如此席席宜用新净者席有多種各隨時所有笙蕟之屬皆湏清净不限麄細任意置用梳箱髪者星辰之象也又玄雲華蓋血之餘也亦云髪者紫舘之璚林腦神依棲之所而梳理有法道家故湏立梳箱以貯乎梳也梳梳者齒之踈者以理髮踈通血液之要噐也不可蹔時闕之壯年老日始終梳理則有延夀之道也枇齒之密者除頭中垢穢用之以黄楊或柞木金荆作之大士適宜道家其骨角牙玳皆不宜用鑷鼻為天門氣之出入所由常當開通令氣流行則神眀隆也鑷以銅鉄為之所以㧞鼻中毫也刷刷故用之除梳箟中垢膩以㯶絲或馬蘭根等為之最佳剜耳杓耳者魂門魄户也使之清净則魂魄徃来不去身也耳乃皮之餘用金銀銅鉄竹牙等物作之以除耳之之垢穢也剔甲刀天騶甲卒之神在手之爪端甲者筋之餘道家皆以吉日剔之則三尸沉零穢惡不生故湏畜其刀也以備修甲之用爪袋上清經所戒不得燒除爪髪博物志云梟夜收人爪置目中知金吉凶干金方亦曰甲入腹成病治之不愈按靈書經十敗不許燒爪髪或言鬼得人爪髪則繫三魂多魘魅以此詳之故爪袋不可不設𩬊袋身体髮膚不可毀傷梳得亂髪當作袋貯之多則理之不可亂自抛擲歴古所戒修道之士切宜記之箆登壇入静皆洗濯手足整理鬂𩬊然後朝禮先湏篦以沐畧垂𩬊也牙竹木等隨宜製之澡豆袋世之去油膩者多方其沐浴所用皆不如烏豆麪也契作袋或盒貯之以備洗濯之用塩盆齒者骨之餘常湏洗濯口齒使諸陽聚首周旋口齒之間則自然通格神真也况塩者凝血去風堅齒所以貯塩末数揩拭之為佳拭巾梳𩬊之時湏一巾藉腖復以一巾拭手面學道之人常湏澡漱口齒剪替爪𩬊薫香清净則神靈䧏附思念感通鹿反袋貯藥物之用雲水雲逰之士用之非鹿皮則不宜也水羅凡道家用水皆先濾過後用以緻絹細紗為之若麄踈物則漏小虫不免傷生矣鼎鼎之制不備言其詳皆載於丹書而學道者首當究之不待載扵此也釡古者有金釡九鼎丹釡之名凡道家錬丹藥用之盆仙家當用陶冶者為隹瓮與人家用者同但以㓗净為用忌其葷腥油膩甑金釡玉甑之名修仙者有是名爾雅甑謂之甗又名鬵京洛用瓦為之即盆之無底者江淮呉楚以木為之嶺表人有截大竹箘作者以備蒸炊藥物之用道門所用亦不可缺瓶道經云玉京金瓶京洛間呼甖之小者之牙盤供飬穏便又作大圓盤安脚皆佳上𥁞飾雲華蟠龍舞鳳自鶴翔鸞之彩擎盒今世罍下安堂舉者曰擎上下相盖曰盒並天尊前供養噐具其𩔖實繁注盌凡道士女真居處先湏備澡盥注盌或盆噐貯净水舉動運為湏漱口洗手其噐金銀銅瓦任時所有皆安㔶盖無使風塵虫物穢之令其精㓗尤非常噐之比漱盤登壇入室皆清水漱口吐水壷盤中勿噀地上盖奉天如奉君事師如事神也對經像不得涕唾漱口吐水高語大聲恒若對明君焉且奉師尚如之况經像乎登壇入静不宜洗漱狼狽穢濁左右宜畜漱盤以隨之衆生食盤古制凡齋堂前置衆生盤䑓毎食所出之食使净人廵行歛之然後散旋於外一者獻先二者薦地祗三者㫁邪謂不岀此食則鬼物兢侵毒入人腹四者慈仁憫念一切衆生同得法味普皆飽滿故謂之衆生食盤自鄭思逺葛洪諸公以来有此盤矣今不可玉笈靈文章仙道辯南極翁問於遐齡老人曰儒者謂神仙之說荒唐渺茫不足論也凡物之於天地也有為瓶瓶則甖甀之異名其用於人尤為不可缺也匿音旋去声匿者竹噐也圎而淺江淮間用簸掦簡擇米麥乎爲匿箕者亦此道門山居之所不可缺箕京洛間以柳作之後勾而圎前方而綽用以㨂米麥者曰簸箕深廣其腹又竹作而蜜闊腹深肚大者名爲篣箕楚人呼為筲箕炊蒸所要又曰撮箕箒几殿堂皆以細箒掃拂不得雜用仙家用騏毛鳯羽赤随其所有耳其貴者用龍鬚江淮多用茅華京洛用穄苖各随土所出也然上殿貴乎細膩者掃殿宇不𤘽麄者皆用殿宇用者他處不敢用笊今世為𥭲箽也漉藥及米麥等俱為山居所用藇音郁古謂之竻䉛以竹為之狀如螺容三二斗漉米所用道士修真之䖏皆不可缺齊噐凡齋醮天尊前皆有供献随時花果以盡䖍心其噐真所用並湏清净不得穢𢙣及非法之噐皆不得上齋列供真誥云道士受齋之食勿令非士動之犯則尸注魄刑餓鬼來侵神也所以特立齋噐者此也盤今卋所製之盤皆方大其下安牙脚謂榮必悴有成必改有生必死豈曰神仙可得不死而與天地齊年不亦謬乎道成而有冲舉昇入天關列為上真不亦欺乎是欲握無影之風捕難執之影索不可有之物行不得到之路不亦難乎子學仙之徒也必知其說為我辯之老人曰吾嘗聞之草木皆春生而冬枯獨松栢而不凋禽獸皆有生而必死獨龜鶴而長年草木禽獸尚爾况人為萬物之靈其若是乎又若水性凉也而温谷有湯泉出焉火性熱也蕭丘有寒熖岀焉石況物也而南海有浮石生焉羽毛軽物也東海有弱水況焉此天地生物之理亦有不凡於常物者又若雉化為蜃雀化為蛤壤虫假翼川蛙翻飛水蠆為蛤荇苓為蛆田䑕為鴐腐草為熒牛哀成虎楚妪為鼍鼍能化虎蛇能化龍枝離為柳麥化為蝶楓化為人秦女化石此皆得天地之靈異世人之所莫測堅人之所難明此天地之所神其神變化之理有也又何况人禀賦天地川岳三光之靈秀得其道者莫若草木無情之物乎且如甘矢以藥置于魚口烹於釡申無藥者巳熟而食之矣而有藥者逰於釡中終日如在江海又以藥掺於桑葉之工而銅蚕蚕食之經年不老又以駐年之藥喂新生之雞雛及新生之犬子終身則不長又以返白之藥喂白犬百日其毛皆黒此皆藥之神也豈庸人得其方乎此又知丹藥之可至長生之驗也又若黄帝煉九鼎於荆山丹成有黄龍垂髯下迎帝御八十一女乗龍上昇群臣攀龍髯抱帝弓而上昇者七十一人今星宿之次有軒轅十七星在焉共工氏之于勾龍爽者得其道上昇南極今井宿之次弧南有老人一星在焉其傳說奚仲皆湯之相也得其道也乗箕尾而上為列星今尾宿之次有傳說一星在鳥女宿之次有奚仲四星在焉王良造父周之善御者也得其道上為列星王良五星列于奎宿之次造父五星列于危宿之次此皆天文之所載天象之所見明明日星萬目可視萬手可指豈得無仙哉且又以變化論之夏之世宫中女子化為龍復化為婦人商之世女子化為丈夫周敬王時女子化為丈夫漢哀帝建平中男子化為女人嫁其夫而生子漢獻帝建安中男子化為女人此皆變化之理有矣魏明帝太和間太原人發古塜棺中有一女子年及三十猶生岀之妻其夫復生子晋武帝咸寕間琅琊人顔畿死朞年聞其聲開棺視之如生晋惠帝元康中梁國女子巳聘其夫其夫戍于邉經年不歸女家以更適之女不樂而死乃葬之數年其夫還至其墓開棺視之女遂活娶之此皆死而復生之理又有矣死者尚可復生况生者得造化之妙豈得不仙乎此皆岀於典籍班班可考也今又以畜𩔖而論之龜千𡻕而五色具焉其額上兩骨起似角䏻觧人之言浮於蓮葉之上千嵗之鶴色純白而腦盡成丹䏻登於木未千𡻕者不集於𣗳獮猴夀八百𡻕變為猿猿五𡻕變為玃攫千𡻕而不死蟾蜍夀三千𡻕騰黄吉光之夀皆三千嵗麒麟夀二千𡻕鹿兎夀千𡻕滿五百者其毛變白狐狸狼八百𡻕滿五百𡻕者善變為人䑕三百𡻕滿百𡻕者變之為白善憑人而卜名曰仲䏻如一年終之吉凶及千里外事蛇有無窮之夀凡人面鳥身之禽皆有萬𡻕此皆禽獸得天地之靈氣者尚䏻夀延千萬之𡻕而不死又况人為萬物之靈而不仙乎此皆岀於誌書之可考只以此而辯之神仙之説有矣翁曰終古以還未聞有是言也今聞子之言則可以破其惑矣得遇道難按真誥曰夫人離三惡道得為人難也既得為人去女為男難也既得為男六情四體完具難也六情既具得生中國難也既處中國值中國好道父母國君難也既得值好道之君生好道之家有慈仁善心難也善心既發信道徳長生者難也既信道徳長生值太平壬辰之運為難也可不朂㢤論道縁金碧龍虎古經云凡宿世前生從夷狄中来者及從禽獸報縁中轉生為人者不得聞至道也其宿生不種善根不積功行者今世縱遇正道亦修之難而失之易也盖縁分軽淺隨景而轉鮮見有所成馬修無上至真妙道者由其昔積功徳行隂隲為人方便救人患難天地鬼神自然扶𦔳賛襄方得遇至人易成易就所謂道有邪正遇之不難而守之尤難也鍾離子曰人求道易道求人難謂不得其人而傳也後之學道者雖專於道尤防邪教異端之外誘心不專一則去道逺矣可不慎而䆒竟㢤論秉賦抱朴子曰命属生星則其人必好仙道好仙道者求之必得命属死星則其人亦不信仙道不信仙道則亦不自修其事也所樂善否判於所禀移易于奪非天所能譬猶金石之銷于爐冶瓦噐之甄於陶竈雖由之以成形而銅鈇之利鈍罌瓮之邪正適遇所遭非復壚竈之成也道有邪正在天地未判之先與天地並立化生萬有亘萬古而不息生民日用者皆道也故曰天生烝民又曰惟天隂隲下民故為之正道是以黄帝乃宣其道自堯舜萬湯文武三伐之世所有周公孔子之世所行莫不奉天道正人倫有君臣之禮有父子之親有綱常之道此所謂中國聖王之道也故謂之正道非堯舜周孔之世所有孔子謂索𨼆行怪後世有述焉吾弗為之矣異端起而大義華也故為之邪僧義安問道晉成帝攺元咸康元年有僧義安問於陶侃曰世之奉佛者多奉道者少何也侃曰麟鳳不易岀蓂莢不常生凡物少者必貴多者必賤如人之賢者常少愚者常多道之為教岀五行陶冶之外得之者白日上昇起天地以獨存歴萬刼而不朽故其教幽奥玄遠愚者難學非人不傳所以奉之者常少若尔之教止是一箇話頭於二三十年或四五十年静中悟得謂之打破疑團盖以色身是幻貴乎寂㓕為樂大㮣不欲復生人間得阿羅漢果謂之不来果是也其法雖至愚下士人人可得而為之所以奉之者常多義安曰誠實論也故棄僧學道更名曰杜守静此篇極說有理故紀之勾庚㸃茅太上丹竈鉗槌云勾庚㸃茅乾汞縮貨與賊無異不特害已而且害人尤甚故以賊名之可謂痛切矣而或有為者而甘心為賊貨悖而入者亦悖而出吾見其折盡前程終身益困而巳葛仙翁𥘉學丹竈時曾有人傳㸃茅之方用藥㸃銅非惟透白又且軟而不燥後見仙翁造為酒噐皆就㡳鐫不堪典賣四字有客問其故則曰此茅銀也家雖薄無以備噐用以代一時之用慮盗者以典以賣遂䥴而知之使不致䧟溺矣仙翁晚年悉毀之後之修煉者悉宜禁革按宋仁宗景祐二年毫州僧人福清上言臣僧徒不務祖風悖毁本教皆慕長生乆視之道希望飛昇天闕乃傳黃老之道今雖有坐禪之名實非有觀心究性之㫖内則皆竊道家煉身中之鉛汞以求長生乆視外則修青黄白之術貪其財利原其所為皆是勾庚㸃茅乾汞縮貨為假金銀騙許世人取獲財利與賊無異不懼天譴不畏王法不避神誅豈是出家修行之事其丹道之事本道士為之宜也而道家知其丹經之禁戒天律甚嚴故不敢為獨臣僧家竊而為之操心險惡䧟害世人破家廢産者多矣先儒所謂道家寳蔵盡為釋氏偷去正為此也悉冝禁革帝乃下令道士敢有勾引僧徒貪其財物傳授道法及僧敢有不務祖風竊修道教私造假金銀㸃茅勾庚乾汞縮貨者悉皆遷徙遼西邊戍以備契丹自是丹道不傳下士者自此始論尸觧人死必視其形如生人皆尸觧也視足不青皮不皺者亦尸觧也要目光不毀無異生人亦尸觧也頭髮盡脫而失形骨者皆尸觧也白日尸觧自是仙非尸解之例也方諸國按真誥曰東海之外有修佛道者其國曰方諸其人以長生為道不死為樂其方諸之國其國四正一面長一千三百里四面合五千二百里故謂之方諸上高九千丈有長明太山夜月高丘各周𢌞四百里其地草木茂蔚而華實有不死草蒨粲而不凋萬𡻕常青食之不死有甘泉水所在有之飲其水亦不死人皆長生其國有青帝君宫在東華山上方二百里中有天仙上真宫室在烏金玉璚瑶雜為棟宇又有玄寒山山上列為外官宫室周二百里中方諸東西二面各有小方諸去大方諸三千里小方諸亦方面各三百里周𢌞一千二百里亦各别有青帝君之宫室在焉中有天真居之一云開闢有之矣莫知其𡻕其山岀靈鳥靈獸莫知其名大方諸對㑹稽之東南看去㑹稽七萬里東北看則有湯谷建木鄉又去方諸六萬里大方諸之西小方諸之國多有奉佛道者有浮圖以金玉鏤之或數百尺而層樓突起其工人極孝而不死是食不死草所致也皆服五星之精日月之華晝服日光夜服月華讀夏歸蔵之經用之以飛行大方諸之東小方諸上多奇寳甚靈異有玉酒金漿在馬青帝君畜積天寳之噐物盡在於此亦多有仙人食不死草飲此酒漿身作金玉色常多吹九靈簫以自娯樂䏻吹簫者聞四十里簫有三十孔竹長二三尺九簫同唱百獸抃舞鳳凰群至鳴舞以和簫聲此國之樂也與西胡之佛法大不侔矣西胡之法謂吹大法螺擊大法皷其樂不同况其法也𣵀盤經云生滅㓕矣寂㓕為樂是以生為幻死為樂方諸國以生為樂死為患也故稱佛法不稱佛道出真誥按文獻通考曰東海之外有浮鵠山者梁武帝時其山漂至浙東海中上有修道者女仙三百餘人皆三四百𡻕有二師各千𡻕其山出朱草以為蓆獻於帝言草中皆有赤鳥帝命繪其像乃丹鳳也旬日其山復浮而去夷狄奉道朝鮮之國自武王封箕子於其國其中國之禮樂制度衣冠文物醫巫卜筮皆在焉周人有半萬啇人渡遼水之說是也所帶中國五千七百八十八人至其國至今禮樂制度詩書文物皆在焉頗有中國之遺風非可與夷狄之邦共語也惜乎天道之秘不傳異言之域故無道教又按道鑑載新羅人金可奇者耻其國言語之鄙有夷狄之俗乃入中國習中國之言學黃老之道二十四年忽遇異人授以天心靈秘之要飛昇變化之道於是精思妙道誦道教諸品仙經九年不輟天帝鍚以靈範於是隠於終南山至唐宣宗大中十一年二月十五日上表於朝言臣奉玉皇詔陞臣為英文臺侍郎明年二月十五日臣當上昇帝異之遣中侍視之其飛昇之日居民環堵而觀者萬計皆聞空中神人之語曰新羅王尚仁柔多大徳不以强凌羽侵鄰國之地無欺大國之心母遏中國之貢不尚戰攻而殘殺生民之命金可竒者新羅王之族人也上帝有詔白日冲舉陞英文䑓侍耶其新羅朝鮮耽羅百濟東海之濵所有國土皆有王以主之皆属東華帝君所掌凡强國奪其地為属郡遏中國之貢為巳有尚𢧐殺而殘生民之命者死乂九幽風刀考身萬劫不赦侵人之國工者子孫生則天殃其身死則為彼國之狗過刀砧百世以償之除勑各國山川之神徃𨑰之報不赦獨新羅人有功於世故能上昇天闕言畢忽聞簫皷震空鸞鶴翩躚幡幢自空而下迎之昇天而去以是論之新羅朝鮮百濟耽羅皆在東海之濵得天地清靈之氣皆可學道是其驗也皇南真人曰東海之濵其髙麗耽羅新羅百濟等八國其國與篷萊之境地脉海泉相接其人皆可學道學者皆能長生乆視惜乎反棄東方生氣之國仙源之脉而奉西方金氣肅殺寂滅之教以死為樂以生為幻以金尅木之故自䘮真仙道而不能長生乆視獨新羅金可奇者知東方之國皆有仙氣属春属水其天地發生之所太陽所出之方皆可學道故入中國尋師問道乃得白日上昇碧霞翁曰夷狄之邦福氣所薄其人宿生無有修積者善根淺薄不能生於中土故語言不通其道難以筆舌所言是皆口口相傳心心相授要在心與妙融道與契合故言不通故不可傳也囘鶻之教按囘鶻謨素児馬儀教門之經漢譯其名曰太上老君徃西域化胡得道天經曰人子之道在於忠孝既知忠孝要知身體從何而来乃是父母之遺體以成子身既有此身便要知孝道之理用於君必要盡人臣之義不敢悖乎天道其大道也獨主一元造化為天地日月星辰萬物之主至廣至大至尊至貴無極無一之道是以包含萬象萬教千門皆從此岀故為天地萬物之母其為人也天之所生天之所覆只知有一箇天故曰奉天為教偈曰有物先天地無形本寂寥而為萬象主天道自昭昭以是論之太上之設教雖蠻貊之邦異言之域莫不化之以仁而教之以義備見於此矣故回鶻之人修其教者三百嵗者有之是其驗也故囘鶻之人不悖其天而奉其教焉其教也止知有天更不奉其他神每日朝暮何天呌天而求福以手接之捫之於面揣之於懷謂天賜福矣此囘鶻奉天之教也宋理宗皇帝御製化胡辯朕嘗觀滅儒道諸書胡人皆忌其老子有化胡之說言老子生於定王之世佛生於老子出關之前在昭王之日因與中國儒書所載不同朕以儒典考之通鑑内當幽王之世洛河竭有老子嘆河竭之說皆載之史籍矣幽王乃定王之十世祖也在定王前相隔十世之前何先有老子之名也又考之漢劉何所編老氏傳載老子在啇為西伯之守蔵史又考之儒典曰老彭啇之賢大夫也又考之回囘経書皆載老子化胡成道事蹟以是推之老子生於啇可辯矣盖當是時受天命而君天下者曰天王周以文王之徳皇天眷命奄有四海為天下君其德澤化被萬方無思不服是以萬方来朝皆沐天子之徳澤所致也其老氏乃周天王之臣也以天于之徳化西岀凾谷化被𦍑酉其治教皆出於中國如言修道學道者道之一字乃老子所起既曰修道即老子所化而無疑矣豈非老氏之徒乎中庸曰修道之為教既言修道即是修老子之教也復何疑焉其佛也載諸梁武帝與昭明太子所編文選其佛生之日巳有證矣其文曰周魯二荘親昭夜景之鑑謂恒星不現也漢晋兩明並勒丹青之飾謂其教始興也謂佛生於周荘王之九年當魯荘公之七年佛法漢明帝時始来其教晋明帝時始興故曰二荘而生兩明而興此梁武帝命載諸儒典為天下萬世之證此萬世之公論不可改也豈非天意之有在是知中國聖人誕生之跡化胡之事天道有不可冺者矣鳴呼艱哉今故考之道釋二教凾矢之生者始於王浮初為生因其聰慧絶倫衆僧妬之酖之不死浮遂畜髪為黄冠陞為祭酒因與僧家有隙乃攺古本化胡經増其偽說互相抗壓於是移老子生於㝎王之世移佛生於昭王之時在老子西化出関之前自是亟矢之生非一日也余謂其化胡之事不可憑道釋二家之書當以儒典證之則知何人為之立教為何人所化也其事見乎括地志四夷部魏畧西戎傳陏史西域傳裴楷上漢桓帝疏及所註三國志崔元山瀬鄉記皇甫謐嵇康等傳范蔚宗書宋雲南行記唐太宗實録八學士議状歷代帝王之賛唐玄宗宋光宗之序俱有載也皆出於儒書及見囘回謨素児馬儀經事之虚實昭如日星不可掩也此天下萬世之公論明矣吾復何言㢤校其佛氏之教導之以慈愛黄帝之教導之以仁義老氏之教導之以道徳陳之以忠孝孔氏之教導之以禮樂陳之以綱常此三教開化之本莫過止於一善而巳豈可以同藝相妬而相攻耶陮夷夏之不同風俗之各異而其為善一也自漢之先中國止知有儒道二教儒者尚以楊朱墨翟為異端而攻之至宋亦以濂洛諸儒為偽學因其各立門庭不循先王之軌轍也盖聖人立教必有妙理如孔門尚謂理有未窮知有未盡聖人尚爾况庸夫俗士安能測識㢤豈可妬其所長而毁天帝貶孔老而嫉之也是謂非聖人者無法此大亂之道也豈不然乎元學士吳澄諌追薦冥福按呉草廬文集其畧曰英宗至治三年勑寫金字佛經既完乃命中書左丞速速傳㫖令翰林學士呉澄譔佛經序傳奉勑㫖曰寫經者專為追薦列聖為人主祈天永命為萬民祈福三事可作序澄曰主上寫經之意為國為民甚盛舉也惟追薦𡨋福臣所未知盖釋氏因果之說自古未有蠱惑世人愚者莫不喜聞且國初以来凡寫經追薦之事不知其幾若超㧞未効是無其理矣若超㧞巳効是誣其祖矣撰為文辤不可以示後世左丞曰上命也先生請俟駕還自奏之英宗至柳林為御史大夫帖失弑於行幄帝即位澄泣告於帝謂祈福返至於滅身之速而死於賊臣之手梁武齊㐮亦其事也其無益可知矣况追薦祖宗要皆徃生西戎不願生中土誠可為萬世笑帝乃命道士建祈夀醮有曰朕昔荷祖宗之積徳上天之眷命受天明命為華夏主奄有四海願與生民同躋夀域使無天札之灾咸遂生成之徳上帝好生允兹所請又建薦祖醮有曰朕聞人身難得中土難生朕祖生於朔漠受命上天朕生中夏曩者前聖皆薦祖徃生西戎今復因朕所薦願使九廟神靈悉上昇于天闕勿使徃生西戎於是令天下諸省毎遇節屇聖夀之日令道士禱天為天子祈夀為萬民析福薦祖宗昇天其薦㧞祈夀二醮乃命道録郝冲霄重編儀式布諸四方凡建國醮當依是理行之修真口訣凡服食藥物不欲食蒜及石榴子猪肝犬頭肉至忌都絶為上道士自不可食猪犬肉而交房中既令藥力不行又計食一斤損筭百日子其慎之此彭祖弟子撰傳者凡服神藥勿向北方大忌亥子日不可唾亡精失氣减損年命藥勢如土岀神仙傳凡道士求仙勿與女子交一交而傾一年之藥力若無所服而行房内减筭三十年出青童君日訣凡修道之士服食勿食血物若食之使不能去三尸止可食乾肉耳見葛洪内篇凡學道之士有疾閉目内視使心火燒身身盡存之使精如彷彿疾病即愈若痛處存其火至必驗岀神仙傳凡修道求仙不欲見死人尸損神壊氣之極人君師父親愛不得巳而臨之耳所以道士去世不事王矦是無君也塊然獨存是無友也唯父母師主不得不臨䘮致感極之哀不要性命之傷耳苟以此故而傷是以無傷之也吾其秘之故口傳焉出神仙傳凡學仙者三月九日六月二日九月六日十一月三日是忌日若入室不可見女子六尸亂則蔵血擾潰飛越三魂失守神彫氣逝積以致死所以忌此日者非但塞遏滛泆而已特以安女宫女宫在申男官在寅寅申相刑刑殺相加是日男女三尸出於日朱瞳之中女尸招男男尸招女禍害徃来䘮神𧇊命雖人不自覺而形露巳損由三尸戰于眠中流血于泥丸也若至其日雖至寵之女子親愛之令婦固不可相對昔先師但修此道而仙矣復不及至親無心者矣子其慎之凡修道之士夜卧側睡存斗覆身坐則存日在泥九月在臍臨卧兩手用双雷訣閉氣提縮下部九次如忍大小便狀方睡如睡覺再作睡必屈二足則無走失之患切宜慎之凡遇甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席大有所忌凡山居修真學道者慎勿言有多為山神百精所試夜卧閉目存眼童子在泥丸中令内視身神長生升天昔劉京亦用此術出神仙傳凡山行必用雲笠以皂絹寵之以障風日塵沙冬則有雪巾鹿裘左腋必用鹿皮袋以貯藥餌丹砂拯生救人之物不可缺或歩行用震靈杖以辟邪氣或乗騾則令童子挾其杖而後隨自是道人標格不與世俗同也凡山居有幅巾者俗謂一字巾以一幅褁於首布衲草屦長絛是山中幽𨼆學道之士所用也凡採藥入山未至山百歩先却行百歩反足乃登山山精不犯人衆邪伏走百毒蔵匿岀神仙傳凡行經山及諸靈廟祠間存口中有真人字赤靈丈人侍以玉女二人一女名華正一女名攝精丈人着赤羅袍玉女二人上下黄衣所存異乃叱吒曰廟中鬼神速来使百邪詣赤靈丈人受斬死衆精却千里此是三天前驅使者捕鬼之法出劍經神仙傳凡夜行先黙念金光呪出戸存巳身之光籠𦋇其身念天蓬呪勤数叩齒以兩指捺人中上鼻孔内則邪鬼不敢犯若有鬼現形則曰吾奉天帝勑主管鄷都六天宫門一曰紂絶隂天宫二曰㤗煞諒事宗天宫三曰明辰耐犯武城天宫四曰恬照罪氣天宫五曰宗靈七非天宫六曰敢司連宛屢天宫敢有犯我者女青有律勿赦復叩齒念天蓬呪則鬼逺遁百里魔無干犯也凡修真之士理髪及飲食施履屐枕褥勿令非道之士見其理髪干其飲食動其履屐用其枕褥彼俗尸魄形中之鬼来侵我神也所以道士棲山林而幽身者皆欲逺兹囂穢絕放人間之業是恐外物凡百犯其性命也秘之出神仙傳朝修吉辰章陪七正月元日天中節㑹之辰元始天尊登九玄天太極金書于天帝君太上老君降現昊天上帝統天神地祗朝三清東方七宿星君下降徐来勒真人於會稽上虞山傳經于葛玄真人初二日天曹掠剰下䧏𥘉三日太白北斗星下降初四日開基節玉晨大道君登玉霄琳房四盻天下
酸棗芽中脯山裏紅水中魚脯莙蓬菜蓎薹脯百合白脯樟柳地脯菖蒲山鹿脯麋鹿細鱗油蜜餅子大牢牛少牢羊天酒泉水大𦎟肉汁也不和無塩梅也太古初變腥但煑肉而飲其汁未知調和後人祭也既重古故但盛肉汁謂之大𦎟玄酒凡祭祀之時陳列酒尊玄酒在三酒之上是玄酒之尚謂尊尚其古故設尊在前也欎鬯周人尚其灌用欎鬯合鬯臭隂逹於淵泉灌以珪璋用玉氣也芻狗祭天禱雨之物也三代以前有之其食用皆與世俗同止酒茶椒花酒屠蘇酒千日酒千里酒豆腐皆是道門所始酒黄帝内傳曰王母㑹帝于嵩山飲帝以護神養氣全液流暉之酒又有延洪夀光之酒然黄帝時巳有矣但不知杜康何世人而古今多言其始造酒也屠蘇酒屠蘇愽雅云孫思邈庵名謂屠絶鬼氣蘇省人魂故也孫真人始之食與椒花酒同椒花酒𡻕時記元日進椒花酒椒是玉衡星精服之令人身軽能走延年益夀進酒次第以年老少為先千日酒劉玄石從中山沽千日酒一醉千日千里酒梁劉杳曰桂陽陳鄉有千里酒飲之至家而醉自鄉始茶周昭王時老子出凾谷関令尹喜迎之於家首獻茗此茶之始老子曰食是茶者皆汝之道徒也後世俗凡客至家者必先獻茶此其始茗者茶也一曰茶二曰檟三曰蔎四曰茗五曰荈豆腐淮南王得飛騰變化之道錬五金成寳化八石為水得草木制化之理乃作豆腐其時長安豆一斗值千錢今世之齋素者皆用之其詩曰舉家學得淮南術後世人喫豆腐自淮南王始之龜桃黄帝祀天以麵為龜桃以表仙家之獻饌也後世凡齋醮者皆用之自黄帝始也夀旦慶夀籛鏗于堯夀旦之日獻香雉𦎟一手帕一為尭慶夀堯封鏗為彭城君後世人生辰逓手帕慶夀自此始天皇至道太清玉冊下卷終

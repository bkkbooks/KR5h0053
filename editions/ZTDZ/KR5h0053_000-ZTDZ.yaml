front:
  text: 天皇至道太清玉册序陪一猗歟盛哉余謂世有非常之人而能為非常之事不然則天道之幽玄道源之深𨗉孰能䆒其實哉夫破白雲攀倉藤躋翠阜登層峦渉萬仭之險昇泰岳之巔下視寰塊自以為髙也孰不知披天風躡鴻毛履長虹跨蒼虬遨逰乎太虗之表捫日月握星斗䑛青𡨋俯視塵壤其志又何其大也自非咀三靈之華吸九光之芒潄紫瓊之腴嚅元氣之真者安能逰神玄閫駕景閬風履空青而闡天道哉今是書之作也若義馭之出滄溟杲日之破昬暝可以滌凡塵之俗陋藻太華之神英是以駐心靈域探至道扵天津黙契太玄握神樞扵紫極而日嘗蹟至真之神奥䆒造化之樞機亦有年矣扵是剖玄黄之未造劙混茫於先天泄泰鴻未露之機明太素生物之始上自溟涬之未判下至人文之始着自有道教以来三皇建極五帝承天其奉道而修天道者其教之事物有未俻言奥有未宣制度有未傳儀制有未正余乃考而新之非余則孰能為焉扵是三沭熏修質扵神明吿扵天帝大發群典纉𩔗分徧悉䆒其事大宣玄化其天地之始分造化之始判道統之始起儀制之式噐用之備衣冠禮楽之制天心靈秘之奥道門儀範之規立為定制舉道門之所用皆載此書也扵是命其名曰天皇至道太清玉冊自開闢以来至于今日上下百千萬億斯年有國有家者莫不上奉天道下修人事所以建圜丘以祀天立方丘以祭地皆以天道為尊也凢誥命之端必曰奉天承運周書曰上天眷命湯書曰明王奉若天道未甞不奉天道而承天運也吁玄風之不振也乆矣余扵是使道海揚波再鼓拍天之巨浪神光驟發重開絶域之幽隂正所謂望洪濤之暨天非起于洿池之中覩玄翰之汪穢非岀扵章句之徒余豈敢自矜者哉是書也乃若叱咤風霆鞭蒼龍而沛時雨其宣道也若翺翔天宇駕黄鶴以凌空明其制度也若恍𠔃振靈籟扵丹霄其製物也若豁𠔃發神颷於銀漢一新玄造何其壮哉遂夀諸梓使天下後世知夫天皇之大道有如此之盛者不亦偉歟皇明苐二甲子正統之九年正月之九日也南極遐齡老人臞仙書原道

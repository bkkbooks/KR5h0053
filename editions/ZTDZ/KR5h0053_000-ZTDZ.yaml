body:
  text: 南極遐齡老人臞仙撰臞仙曰稽夫道教之源昔在混茫始判人道未備天命我道祖軒轅黄帝承九皇之運乗六龍以御天代天立極以定三才當是時也天地尚未昭晣無有文字結䋲以代政無有房屋巢居以穴處無有衣裳結草以蔽体無有器用汗尊而杯飲我道祖軒轅黄帝始創製文字製衣服作宫室制器用而人事始備今九流之中三教之内所用之文字所服之衣裳所居之房屋所用之器皿皆黄帝之始制是皆出於吾道家黄帝之教焉且天老子謂生天生地生人生萬物必有所生者曰吾不知其名強名曰道強字之曰大故曰大道其教曰道教世方有道字之名以是論之凢言修道學道者是皆竊老子之言以道爲名也豈非老氏之徒乎又若老子所謂玄之又玄爲衆妙門玄妙二字又皆𥨸之為名用之於經者是皆用老子之言也又若荘子書曰有大覺而後知聖人此大覺二字乃荘子所立之名徽宗取之而封金仙其經皆用之是皆出於吾道家之書黄帝老荘之教也昔西伯以二童子侍老子老子與其名一曰吉祥一曰如意後人皆用之是皆𥨸老氏之言也豈非老氏之徒乎其黄帝之爲教也創制萬物以宣天道爲治世首君自謂觀天之道執天之行盡矣見乎隂符經老子之爲教也按爾雅及藝文志曰清虚以自守卑弱以自持人君南面之術也合於堯舜之克讓易之謙謙一謙而四益此其所長也故以國爲身治國如治身是謂貴以身爲天下若可寄天下愛以身爲天下乃可托天下皆脩齊治平之道也見乎道德經此皆中國聖人之道也故曰正道所謂正道者何中國者居天地之中得天地之正氣其人形貌正音聲正其教也不異言非先王之法言不敢言是無翻譯假托之辭也不異服非先王之法服不敢服所服者黄帝之衣冠是以有黄冠之稱也不毀形身體髪膚受之父母不敢毁傷孝之始也得其道者白日上昇飛騰就天以顯父母孝之終也不去姓不忘其親不㓕其祖人子之孝也朝修有儀行君臣之禮臣事上帝人臣之義也讀聖人之書行聖人之道循乎禮義儒道一理也其道在天地未分之先所有其教在三皇之世所立又非孔子所謂後世有述焉異端起而大義乖也其徒中國者列之於上外夷者列之於下教有先後之别人有夷夏之分貴賤之殊也其女真之修道也不出閨門不羣聚於宫觀不蔵匿於女男衣衫有辯教無邪僻也不以因果禍福報應之說惑世誣民也不以捨身捐資布施爲福逼人以取財也不悖所生之天不忘所生之土生於中國奉中國之道不忘乎本理也反此道者則不正矣其教也施諸四海行諸天下極天所覆極地所載日月所照霜露所墜凡有生之民所稱之道所用之字所服之衣所居之室所用之器皆吾中國聖人黄帝老子之所製也豈非皆出於吾道教哉周書曰域中有四大曰道大天大地大王大三界之内大無加於此也孔子曰生而知之上也學而知之次也困而學之又其次乎凡有修有爲之法聖人之所不取故不爲大况非在開闢與天地並立而有者乎是以道教以天爲主曰天道者何其盛歟余嘗見㓕儒道之書有云其㓕道也使大羅玉帝魂驚於九天之中元始天尊胆落于三清之上等語惡言蜂生難以筆述其㓕儒也謂孔子之教治世少用不逹性命惟說見世止可稱賢人不足稱聖又云孔子名位同俗不異常人祖述先王自無教訓止可修述非爲教源孔子所言矯世法也孟軻所言疾專一耳儒宗齷齪但釵俗中之一物耳是皆用黄帝所製之文字而作書反滅黄帝之教詆孔老之學毀天帝而自尊不亦過之甚矣噫老子曰上士不爭下士好爭太惟不爭故天下莫能與之爭此聖人巳有見於先也余年方十有一在齠此時遇一青衣老媪謂曰爾切勿忘夙念六十年後方許開口余故直書其事曰于昔在少昊之四十七年當昭陽赤奮若之歳奉太清之命封河東冥亰之主至啇武丁三十一年柔兆崦茂之𡻕一千二十九年上昇太清特進南極冲虗妙道真君居南極九十四宫之位在天二千六百九十九年太清授以蓬萊玉璽太陽金符令予下降人間以匡天道使振玄風握靈樞而闡玄化也於是立勲三界注名天府又何偉歟乃作是書發天地秘蔵之奥襲日月霄漢之光彼燐火之縱横妖芒頓息令玄風之普扇大道開通使千載之幽隂重開於化日繼萬年之道統再續於今時以明吾中國聖人之道鳥謹執筆焚香告扵髙厚而書之南極冲虗妙道真君遐齡老人臞仙頓首書原道終天皇至道太清玉册目録上卷開闢天地章道教源流章天皇龍文章幹運造化章醮事儀範章天心玄秘章道門官制章赤文天律章清規儀範章下卷宫殿壇墠章奉聖儀制章天樂仙仗章全真儀式章冠服制度章修真器用章玉笈靈文章朝修吉辰章數目紀事章醮獻祭品章目録終天皇至道太清玉册南極冲虗妙道真君遐齡老人臞仙製開闢天地章其道也得之者可以超天地以獨存歴萬刼而不杇天道臞仙曰其道也老子所謂昔在天地未判之先有物混成先天地生惟象無形𥥆𥥆冥冥寂寥淡漠不聞其聲強為之名曰道夫道者髙不可極深不可測包褁天地禀受無形源流泏泏冲而不盈約而能張幽而能明柔而能剛含隂吐陽而張三光山以之而髙淵以之而深獸以之而走鳥以之而飛星暦以之而行以亡取存以卑取尊以退取先故視之不見听之不聞無形而有形生焉無聲而五音鳴焉無味而五味生焉無色而五色成焉故有生扵無實生於虗以一之理施于四海之嘏察扵天地其全也敦𠔃若撲其散也渾𠔃若濁濁而徐清冲而徐盈澹然若大海汜𠔃若浮雲若無而有若存而亡韋氏得之以挈天地伏羲得之以襲氣毋維斗得之終古不忒日月得之終古不息崑崙馮夷得之以逰大川有吾得之以䖏太山黄帝得之以登雲天顓頊得之以䖏玄宫禺強得之以處北極王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五百傳說得之以相武丁奄有天下乗東維騎箕尾而上為列星是以孔子問扵老子曰今日宴閒敢問至道老子曰汝齋䟽㵸而心澡雪而精神培擊而知夫道窅然难言哉將為汝言其涯畧夫昭昭生扵𡨋𡨋有倫生扵無形精神主於道其来無跡其徃無涯無門無房四逹之皇皇也其用心不勞其應物無方天不得不髙地不得不廣日月不得不行萬物不得不昌此其道歟使道可以進人則人莫不各進之扵其親矣使道可以告人則人莫不告之扵其兄弟矣使道可以傳人則人莫不各傳之扵其子孫矣然而不可者無他術也因中無所主則道不可得而知也子若歸而求之扵其身則道不逺矣孔子歸三日不談子貢恠而問曰夫子見老聃亦將何規哉孔子曰鳥吾知其能飛魚吾知其能㳺獸吾知其能走飛者吾可以矰㳺者吾可以綸走者吾可以網至扵龍合而成軆散而成章乗雲氣而上天吾所不能測也今見老聃其猶龍乎吾口張而不能嗋神錯而不知所居吾又何規老聃哉是以顔子賛聖人之道仰之彌髙鑚之彌堅瞻之在前忽然在後與夫老子所謂視之不見听之不聞迎之不見其首随之不見其後即此道也故曰皇天無二道聖人無両心然如是子當整襟肅容抗手髙揖為智者一言之且曰刼外有香應不逺吹入珍瓏仙子家若向這裏認得親切只湏這一個道字若不具眼又向鼻孔裏翻身去也咄因開口為君咲不覺西山生白雲元氣有物混成先天地生獨立而不改周行而不殆可以為天地毋未有天地之時其氣混沌如鷄子溟涬始芽鴻濛滋明太極元氣凾三為一極中也元始也清軽者上為天濁重者下為地冲和之氣為人芒雜之氣為物昔在天地未分之前元氣混而為一是太𥘉太乙也道徳經曰道生一一生二即此太極之元氣也太極無極而生太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽両儀立焉両儀生四象四象生八卦造化定矣謂天理之尊號也極者至極之義樞紉根柢之名所謂天之樞紐根柢也天地元氣既分隂陽始判无声無臭軽清者上浮為天重濁者下沉為地天行徤運行而不息日月星辰繫焉萬物覆焉天大地小表裏有水地乗氣而立載水而浮天運如車轂之運如笠之冐地表裏元氣之上譬覆奩以抑水而不流者氣充其中也天論曰天圓如倚盖地方如棋局天旁轉半在地上半在地下日月本東行天西旋入于海牽之以西如蟻行磨上磨左旋蟻右行磨疾蟻遲不得不西地常動而不止譬人之在舟中閉牗而坐舟行而不知此則元氣之剛徤浮㳺而不息也通鑑外紀曰天地混沌如鷄子盤古氏生其中萬八千歳天地開闢陽清為天隂濁為地盤古在其中一日九變神扵天聖扵地天日髙一丈地日厚一丈盤古日長一丈如此萬八千歳天数極髙地数極深盤古極長然則生物始扵盤古天地萬物之祖也其死也頭為五岳目為日月脂膏為江海毛髮為草木又曰盤古泣爲江河氣為風聲為雷目瞳為電喜為晴怒為隂秦漢間俗說盤古頭為東岳腹為中岳左臂為南岳右臂為北岳足為西岳後乃有三皇此天地人之始也数起扵一立扵三成扵五盛扵七處扵九故天去地九萬里天地度数天体東西南北徑三十五萬七千里每一方八萬九千二百五十里自地至天八萬里以日照陽城之半為中乃体正圓也南極七十二度𨼆而不見為下規北極七十二度見而不隠為上規毎度二千九百三十里七十一歩二尺七寸四分緫而論之毎度三千里自下度之毎度如正午日輪之大三百六十五度下至泉壌苐一壘上至星天九萬七千二百里下至九幽洞淵上至星天一千二百一十八萬里黄帝考之数也方隅里数東極日出之所西陲日沒之所徑過二億二萬三千五百里零七十二歩南極至北陲徑過二億三千五百里零七十五歩比東西少二萬里零四歩禹命臣章玄歩之数也中央得天地之正氣兼備五行之化在天曰五星在地曰五行在人曰五常故人之生也形貌正聲音正故軒轅以配天以中央之色曰黄故其教也以天為主故曰天道凡帝王之有天下者莫不奉天以承天運欽崇天道以治天下故曰受天明命奄有四海東方日出之所發生之氣在焉主春属木其人仁名東夷夷从人乃得天地之氣清者也蓬萊三山方壺十洲在焉故人以長生為樂西方日落之所肅殺之氣在焉主秋属金其人狠名羗胡名犬戎从羊以犬乃得天地之氣濁者也鬼戎鬼隂𩔗在焉故以死為樂南方離明之所炎熱之氣在焉主夏属火其人狡変詐萬状名田蛮从虫苗僚瓠之属乃得天地駁雜之氣者也剪髮跣足之國在焉故以賊殺為樂北方積隂之所嚴寒之氣在焉主冬属水其人勇名北狄曰玁狁曰突獗从犬乃得天地隂晦之氣者也契丹匈奴在焉故以病終為不祥𢧐死為吉利日月帝王五運歷年紀曰盤古死後左目為日右目為月山海經曰東南海之外甘水之間有羲和之國有女子曰羲和羲和者帝之妻是生十日郭璞注云羲和盖天地始生日月者也日者山海經曰犬荒之中暘谷上有扶素十日所浩九日居下枝一日居上枝皆有烏扵中淮南子曰日實也大明盛實日中有踆烏謂三足烏也山海經曰鍾山之神名曰燭隂視為晝暝為夜吹為冬呼為夏身長千里人面蛇身赤色又曰蠋龍天不足西北無隂陽消息故有龍𠷢火精以照天門也月者淮南子曰月天之使也積隂之寒氣久而為水水氣之精者為月月者隂之宷是以月毀而魚腦减吕氏春秋日月群隂之本月望則蚌蛤實群隂盈月晦則蚌蛤虗群隂揫星辰星之為言精也萬物之精上為列星又曰水之精也又曰山川精氣上為列星又曰陽精為日日分為星故其製字以日生二字為星辰者北辰也謂之北極展星焉緫通暦曰地星氏定星辰後漢天文志注曰黄帝分星次常明者百二十四古名者三百二十㣲星萬一千五百二十黄帝創制之也禮記乃云帝嚳能序星辰盖地皇氏始定為星辰黄帝又名之至帝嚳而又序之也北辰北極有五星太乙常居中是極星也辰非星只是中間界分也夫宸極居中則列宿齊其軌自開闢有之星次帝王世紀曰黄帝受命乃推分星次以定律度漢志亦曰黄帝定星次即今尔雅所記十二與二十八舎之度皆自黄帝剏之也宿度庖犧視五星之文分畧之度史記暦書曰黄帝名宿度驗臣瓉謂名宿度候察進退三辰之度吉凶之驗也又曰漢武招致方術士唐都分天部漢書音義云謂分部二十八宿為距度而晋書天文志亦曰庖犧氏立周天暦度也雲埤雅曰天地之氣噓而成雲噫而成風雲之為言運也觸石而起謂之雲霧騰水上溢故為霧又曰隂陽之氣乱則為霧又曰地氣上升天氣不應為霧雨隂陽之氣和而為雨水從雲下為雨雨者輔也輔時養也八風白虎通曰風者何謂也風之為言萌也養物成功所以象八卦陽立扵五極扵九五九四十五日変変以為風隂合陽以生風距冬至四十五日條風至條者王也四十五日明庻風至明庻者迎衆也四十五日清明風至清眀者清芒也四十五日京風至景大也陽氣長養四十五日凉風至凉寒也行隂氣也四十五日閶闔風至戒收蔵也四十五日不周風至不周者不交也隂陽未合化也四十五日廣莫風至廣莫者大也同陽氣也故曰條風至地煖明庻風至萬物産清明風至物形乾景風至𣗥造實凉風至黍未乾閶闔風至生薺麥不周風至蟄虫匿廣莫風至則萬物伏是以王者承順之條風至則出軽刑觧稽留明庻風至則修封彊理田疇清明風至出幣帛使諸侯景風至則爵有徳封有功凉風至報地徳化四鄉閶闔風至則申象刑飾困倉不周風至則築宫室修城郭廣莫風至則断大辟行獄刑天漢起于東方箕尾之間謂之天河亦謂之漢津乃分為二道其南經傅說魚星天籥天弁河鼓其北經龜貫箕下次絡南北魁左旗至天津下而合南道乃西南行又分夾匏𤓰絡人星杵造父螣蛇王良附路閣道此端門太𨹧天舡卷舌而南行路五車經北河之南入東井水位而東南行絡南河関丘天狗天紀天稷在七星南而沒張衡云津漢者金之氣也其本曰水漢星多則水星少則旱雷電淮南子曰隂陽相薄感而為雷激而為電述異曰電者天公與玉女投壺偶矢不接天為之𥬇所以為電霜雪天地之氣凝肅以露氣為霜雨水為雪霰雹隂陽相脅而成負隂抱陽扵中虹蜺隂陽不正之氣純陽之攻隂也雄曰虹雌曰蜆隂陽春秋内事曰伏羲氏定天地分隂陽五行史記暦書曰黄帝建立五行起五部應劭曰金木水火土也孟康謂天有四時分為五行火始扵燧人氏上古之人皆食果蓏蚌蛤生啖之害腹胃而多疾聖人乃鑚木取火教民炮生為熟而食之故號燧人氏立傳教之䑓為日中之市與交易之道人情遂通傳世諸書所載不同太史司馬光劉恕有天下百餘氏八萬年或云萬二十年或云傳四世未知孰正十二辰黄帝立子丑十二辰以名月又以十二名獸属之生人之始風俗通曰俈說天地開闢未有人民女媧搏黄圡為人𠟵務力不暇供乃引繩絙泥中舉以為人故冨貴者黄土人也貧賤凡庸者絙人也淮南子曰象帝生隂陽土駢生耳目桒林生臂手此女媧所以七十化也許慎注云象帝古天神所造人時化生隂陽土駢桒杯皆神名又曰突生海人海人生若菌音群若菌生聖人聖人生庶人凡庸者生庶人突人之先此人之始也𡻕星木星也降扵人間為貴人東方𦍤乃木星之精也自生而木星不現觧幘飛去翌日太史奏𡻕星現即其事也熒惑火星也降扵人間為児童歌謡嬉戲填星圡星也降扵人間為婦人太白金星也降扵人間為状夫處扵林麓之間辰星水星也降扵人間為婦人吉凶晦吝休咎之徴天垂象以在凢降必有所主霊星漢有天下髙祖制詔御史令天下立霊星祠盖祈糓也道教源流章道教之来自太始太素之先鴻濛未兆之𥘉天地溟涬混沌始芽扵是時也必有主乎造化者存乎其間有能肇造天地建立三才當其日月未生山川未著事物未形理象未顕之時其為象也渾渾噩噩大易所謂未畫之前即有主宰之者然而無形無名杳杳邈邈畢竟莫知其名然生天生地生人生萬物者何物也老子始發其妙包舉二儀乃強立其名曰道開闢天地始肇萬有者必有其神莫淂其名乃強名曰元始故有元始天尊之名為開天闢地之祖按洞元霊寳真誥元符經其畧曰昔天地未分隂陽未判溟涬大𣑽寥廓無光太上以三炁化生三境至老君而傳經傅教然後萬範開張天真皇人見八角垂芒经文麗天九霄煥爛則而冩之科始有傅歷古迄今道教所以垂萬世而無窮焉凡帝王之所受天命者曰天子是以子之事天以天為父故仲虺之誥有曰欽崇天道永保天命太甲日先王顧諟天之明命以承上下神祗是以受天眀命奄有四海上以奉天道下以治人事又曰上天眷命又曰奉天承運是皆奉天也故其殿曰奉天門曰奉天承天未甞不以天言也是以道之為教以天為主故曰奉天之道名曰道教上三皇天皇即玉清聖境元始天尊盤古氏是也昔在象帝之先空洞自然之中有百千萬重正炁結而化生妙無聖君歴尊號曰大羅元始尊旡為自然妙旡上帝後人謂之旡上道寳為萬炁之祖元象未著之𥘉所謂道生一也一云未有盤古氏之前太𥘉太始太素之先化生三才者其造化之主宰不得其名亦弥為元始又非盤古氏也地皇即上清真境霊寳天尊地皇是也昔在延康遐劫之先大𣑽溟涬之始有百千萬重真炁結而化生妙空聖君歴尊號曰玉宸大道君妙空上帝後人謂之太上經寳傳經傳教肇開道範所謂一生二也人皇即太清仙境道徳天尊人皇是也昔在赤明混沌之中有百千萬重道炁結而化生妙有聖君歷尊號曰五霊元老君混元太上道君萬教之祖妙有上帝後人謂之玄上師寳垂法演教使萬象具俻所謂二生三三生萬物者也中三皇天皇即天寳君也以元始之玄炁化生中三皇之天皇氏也地皇即霊寳君也得元始之元炁化生中三皇之地皇氏也人皇即神寳君也受元始之始炁化生中三皇之人皇氏也下三皇天皇即大昊伏羲氏以木徳王也以元始之玄炁化生者也紀號曰東華至真蒼天上帝仰觀俯察得龍馬負圖而畫卦命象始制書契以開萬有地皇即神農炎帝氏以火徳王也得元始之元炁化生者也紀號曰南極朱陵丹天上帝始甞百草教人醫藥播降百榖始有飲食人皇即黄帝軒轅氏以圡徳王天下也受元始之始炁化生者也紀號曰太乙黄天上帝始製衣服宫室禮樂文字舟車噐用民生衣食之道扵此俻矣帝鑄九鼎扵荆山丹成有黄龍垂髯下迎帝與御女八十一人從臣七十二人乗雲龍而登天按太史玉暦觀象天文云柳宿之下星宿之次有軒轅十七星是其驗也後世始有煉丹飛昇之道傳扵世太上老君按聖紀云太上老君居太清仙境之上乃元炁之祖宗天地之根本扵至寂至虚之内太𥘉太始之先開闢天地化生萬物之主宰也推数御運布氣融精開化天地所歴成壊二儀不可量計其化身周遍塵沙世界非可以数紀極開闢之後觀世道之澆淳随時立教代為帝師建立法度或流九天或傳四海自三皇而下歴代帝王咸宗奉焉是知天上天下道炁之内皆老君之所化也垂億萬之法無不濟度盖百姓日用而不知者也此太上老君之垂號扵此見焉老子名耳一名聃字伯陽父真人李霊飛之子也在周之時有大徳者皆称父如孔子称尼父是也非太上老君按商史謂老子楚人也當殷陽甲十七年庚申始示誕生之迹自太清道境乗太陽日精化五色玄黄之珠大如弹丸玉女晝𥨊流入口中吞之有孕懐八十一𡻕至武丁九年庚辰自玉女左腋而生生皓首號曰老子生扵李𣗳之下即行数歩一手指天一手指地曰天上天下三界之内生天生也生人生萬物皆道之所化故惟道獨尊指李𣗳曰此吾姓也遂名耳字伯陽自武丁九年庚辰下生厥後大闡其道後世見其道之大遂亦以為太上老君之称君者帝聖之称子者男子之通称盖老子所闡之道即老君之道也若其前後化生下降之迹則世代有之故能垂範立教太崇玄風萬世又以老子為教主矣所以後之宗其教者亦尊之為老君不知者因悮以為三清之老君也當商之時老子為西伯之柱下史在周武王時為守蔵史歴商至周九百年而西昇崑崙按太史公史記曰莫知所終孔子請老彭商之賢大夫也劉甸紀老子乃商人也此儒典之所載明矣其㓕道之書忌其老子於昭王之二十三年出関西化之說乃移老子生於定王之世其通鑑載幽王之時巳有老子嘆河竭之說幽王乃定王之十代祖也相隔十世巳有老子之名矣其䚹謬不可掩也按梁武帝與昭明太子所編文選一書乃取齊王簡栖之碑文以證其偽矣此萬世不易之公論也孰先孰後則可知也其文有曰周魯二荘親昭夜景之鑑漢晋兩明並勒丹青之餙五臣註曰二荘而生兩明而興此儒典之所載非道家之書所有魏明帝有序歴代帝王有賛老子之生皆載之簡册其證明矣又按唐八學士之議状考論又明矣將欲欺人安能欺儒典乎鳴呼艱哉按列傳老子至秦昭王九年當周赧王之世周道衰赧王入秦獻地而大周華命老子知秦暴虐其道不行乃西昇崑崙而莫知所終此其實也荘子得老子之道通神明之徳橾天地之玄知運㑹之数明天地斥降之理察世態治乱之機謂齊人郁禎曰後一百五十七年周運當亡一百七年當甲寅之𡻕老子知周之將亡扵秦至秦道蓮否塞老子必隱老子曰老聃芁秦佚吊之三號而岀死者道䘮也故以秦佚為人之名佚者以立人旁加失字曰佚故以秦佚二字為人之名謂秦失人也乃曰秦佚吊之三號而岀者一曰吾道䘮矣二曰我何為矣三曰秦夫人矣此荘子通神明之道見於此也秦始皇時老子降于下邳圯穚投張良素書號黄石公漢文帝時老子降于陜河之濵號河上公亦曰河上文人帝親訪之太上授以道徳經成帝時老子平經並明安帝時老子降于㤗山名江夏定天下順帝時老子降于盟威秘籙桓帝時老子降于注生之法又降于邪之法靈帝時老子降下天台山授葛玄上清雲寳太洞等經魏陳留王時老子降于隴右臨洮郡謂王始曰天下不乆當太平後魏明帝時老子降于嵩山授道士㓂謙之雲中音誦新科之戒太武皇帝時者子降于嵩山命謙之授帝以太平真君之號遂攺元太平真君隋煬帝時老子降于終南山語山人李淳風以唐公受命之符唐髙祖時老子降于羊角山語吉善行言唐祚事五月告以成業髙宗時老子降于太極殿諸王大臣及妃御咸拜禮之又降于陽清廟武后時老子降于號州言武后不可革命事又降于春明門玄宗時老子降于蜀又降于五鳳楼之通衢告鍚靈符在尹喜之故宅又降于乾元閣遂攺閣為降聖閣又降于太白山又降于和州以示收禄山之兆肅宗時老子降于通化郡雲龍岩敬宗時老子降于太清宫宋徽宗時老子降于茅山欽宗時老子降于洛陽告李若水母其子忠感天地上帝陞之為天官矣自金虜乱華変夏為夷世不一出矣以是考之老君化身之迹渺渺萬劫升降徃来杳乎不測歴代尊崇封謚垂法帝王所以昭其教於無窮馬此老子之事實也其教傳漢張道陵為天師代天宣化也天師六合無窮髙明大帝天師姓張緯道陵字輔漢沛豊邑人其先出自姬姓軒轅子青陽氏苐五子揮為弓正始造弓矢主祀孤星世掌其職賜姓張氏周宣王時有張仲其後傳八世相韓昭侯其後生平平生良字子房仕漢封留矦留矦子不疑不疑次子髙髙子通通子無妄無妄子里仁里仁子覺覺子起起子大順天師乃大順長子也漢建武十年甲午正月十五日生扵吴天目山暨長入龍虎山合九天神丹太上授以經籙秘文是為玄教之宗玄帝按道蔵真誥稽神樞曰玄帝者昔軒轅子昌意娶蜀山氏之女生髙陽徳號顓頊頊父居弱水之鄉頊身陶七河之津是為玄帝也仗萬靈以信順監衆神以導物役御百氣召致雷電扵是乗結元之輦北廵幽陵南至交阯西濟流沙東至蟠木動静之類大小之神日月所照莫不属焉四行天下周旋八外諸有洞䑓之山隂宫之丘皆移安息之石封而填之鑄羽山之銅為寳𪔂各獻以一扵洞山神峯不獨句曲一山而巳此所謂玄帝其真誥之所載也又按古史云古者民神異業少皞之衰九𥠖亂徳民神雜操不可方物顓頊乃命南正重司天以属神北正𥠖司地以属民使復舊常無相侵凟始作暦以孟春為元是為暦宗也去古既逺其道蔵雖為胡火所蝕而真誥一書事蹟尚存盖亦天道之有在也且古有黄帝玄帝之称者謂軒轅黄帝顓頊玄帝也南極老人星共工氏之子勾龍爽得道千有餘𡻕上昇居南極為夀星去極一百四十三度入井宿三度在弧矢星之南一曰南極常以秋分之旦見于丙春分之夕沒于丁常以秋分侯之南郊明大則主夀昌主天下生民夀筭盖北極在丑艮故南極在未坤南極入地三十六度不可得而見也故其精神出地以見乎南謂之南極老人然其出地亦不甚逹故𨼆見不常見則為祥其勢位等威盖與中斗相並以輔上帝故雖在井宿之南不在井宿之次常以二月二日以大牢祀之八月二十六日下降人間為有徳者増夀此天文志所載也南𣲖自漢始鹿堂趙昇華陽李亞鍾離權吕岩劉海蟾張紫陽冲昭王馬自然石杏林薛道光陳泥丸白玉蟾等始之北𣲖自宋始王重陽至東海見海中金蓮七朶師曰此處當有七真岀扵是度丘劉譚馬郝王孫七真今全真之教自此始天皇龍文章陪二道蔵三洞經目録大乗上法洞真寳經九聖之道一十二部無極大道元始天尊以龍漢劫𥘉居清㣲天玉清境所出號洞真經計二十四萬九千三百八十卷太玄部八千卷妙林部五百卷太清部八百卷徹視部八千卷上清部八千卷開化部八千卷元陽部一萬八千卷妙真部一萬五千卷開山部七千卷十仙部八萬八千卷玉林部八萬四十卷黄老部五千卷中乗中法洞玄寳經九其之道一十二部三界醫王太上道君以延康劫𥘉居禹餘天上清境所出號洞玄經計八十五萬八千一百二十卷靈和部八千卷靈寳部一百二十卷通神部十萬卷無量部一萬卷集仙部十萬卷内秘部十萬卷至真部十萬卷集善部八萬卷錬精部八萬卷生死部八萬卷官圓部十萬卷錬魔部十萬卷小乗𥘉法洞神寳經九仙之道一十二部十方道師太上老君以赤明劫𥘉居太赤天太清境所出號洞神經計七十七萬四千卷太真部八千卷至徳部九萬卷黄庭部八萬卷錬炁部八萬卷道徳部八萬卷元神部八萬卷大劫部八萬卷内簡部十萬卷神呪部八萬卷三皇部八千卷按摩部八萬卷小劫部八千卷自黄帝演道老氏傳經至宋上下百千萬億餘年所有道蔵經書一百八十八萬一千五百卷自經胡火今止存者五千一百三十四卷昔在金虜蒙古之時當宋季中㣲之日其羗人呼延邁妬中國道蔵内有蔵天𨼆月之經玉緯九天等經皆上天極玄至秘之書乃詒胡主蒙哥忽必烈盡令燒毀其令有曰漢人則興漢人之教蒙古必興蒙古之教豈可使漢人的經書勝俺蒙古的凡有一書一字見疾燒毁勿留人間今故絶而無傳馬亦間有存者未人經蔵今我大明麗天其中國人必尊中國之道故紀其名目于左蔵天𨼆月經玉緯經九天經上清經赤書度命經赤書經靈寳二十四生經聖紀經十三虚無經五公問虚無經謗道釋經道先生三清經南斗經西昇經化胡經太上實録混元皇帝實録玄元内傳髙上老子内傳樓觀先生内傳辟邪歸正議辯仙論欽道明證論輔正除邪論道佛先後論明真辯偽論十異九迷論三破論齕邪論十小論歴代帝王崇道記三天列記青陽宫記出塞記三教根源圖歴代應現圖帝王師録猶龍傳紀勝賦䨜雷經太上化胡書至正辯偽録唐八學士議狀心傳玉堂𥘉階宗㫖心傳玉堂宗㫖太清玉冊太清天籙太清玉譜重編猶龍傳重編龍虎經闡道論三教本末造化鉗槌神𨼆太𧩦丹髓庚辛玉冊遐齡洞天誌篷瀛志玉宸玄範玄範行移式北辰奏告儀水火錬度儀禳五部儀玉樞㑹醮儀圜堂儀水府㧞幽燈儀祈天懴保命燈科肘後神樞肘後靈樞肘後經運化玄樞乾坤生意夀域神方神應經十藥神書天地卦北斗課渉世圖茶譜洞天神品秘譜神功妙濟丹方註觧道徳經註觧清静經註觧大通經註觧洞古經註觧太上心經註觧素書註觧長生乆視經唐聖祖傳劉基曰元者祥邁等妬中國道教之經典皆天章龍文之書琅函玉笈之典時儒者多尚之釋氏歸道者十有七八祥邁乃詒胡主忽必烈盡焚中國道蔵經書其令有曰敢有收執片𥿄𨾏字者勿赦自是中國道蔵經書始絶時值宋遇傾圯胡虜亂華離明有晦幽隂侵陽故也自靖康徽欽北狩當金虜亂華之日羗胡乃作㓕中國大道之書至胡元二百七十二年之間所作妖書九十卷假以唐人道宣道世玄嶷智昇法琳等所作而滅中國之道其辯偽録有曰使大羅玉帝魂驚扵九天之中元始天尊膽落扵三清之上萬天教主羞赧難神九府洞仙慚惶無地毀天帝㓕孔老貶黄帝之惡言不可盡書盖黄帝乃継天立極之始祖也老子乃唐之祖也安有當時之人自㓕時君之祖豈中國人自㓕中國之道實遼金胡元之人所作宋理宗端平間因胡㓂鈔邉乃得是書一二卷帝覧書嘆口縱尓百千萬卷只以中國夷狄之道論之其髙下不待辯而可知矣故紀滅道妖書